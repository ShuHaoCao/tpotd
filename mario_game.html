<!doctype html>
<html lang="zh-Hant">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-0VSMGFF0E6"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小瑪莉：黃金傳說</title>
    <style>
      :root {
        --post-green: #00a447;
        --post-green-dark: #003b20;
        --post-yellow: #ffde00;
        --gold: #ffd166;
        --gold-deep: #b86b00;
        --hot-red: #ff315a;
        --neon-pink: #ff2bd6;
        --neon-cyan: #00e5ff;
        --violet: #6d35ff;
        --cabinet: rgba(28, 13, 29, 0.96);
        --glass: rgba(255, 255, 255, 0.12);
        --text: #fff7d6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: clamp(12px, 2.2vw, 30px);
        color: var(--text);
        font-family:
          "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
        background:
          radial-gradient(
            circle at 18% 12%,
            rgba(255, 43, 214, 0.35),
            transparent 30%
          ),
          radial-gradient(
            circle at 82% 10%,
            rgba(0, 229, 255, 0.32),
            transparent 28%
          ),
          radial-gradient(
            circle at 50% 100%,
            rgba(255, 209, 102, 0.22),
            transparent 38%
          ),
          linear-gradient(145deg, #12000d 0%, #120827 42%, #030007 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(
          to bottom,
          transparent,
          #000 15%,
          #000 80%,
          transparent
        );
      }

      #loader {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle, rgba(255, 222, 0, 0.12), transparent 35%),
          #030006;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        letter-spacing: 0.08em;
      }

      #loader h2 {
        color: var(--post-yellow) !important;
        text-shadow: 0 0 18px rgba(255, 222, 0, 0.9);
      }

      #load-status {
        color: rgba(255, 255, 255, 0.72);
      }

      .game-container {
        width: min(100%, 760px);
        position: relative;
        padding: clamp(14px, 2.4vw, 26px);
        border-radius: 34px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.12), transparent 18%),
          linear-gradient(180deg, rgba(59, 25, 70, 0.98), rgba(21, 8, 25, 0.98));
        border: 2px solid rgba(255, 209, 102, 0.75);
        box-shadow:
          0 0 0 8px rgba(0, 0, 0, 0.28),
          0 0 38px rgba(255, 43, 214, 0.22),
          0 0 62px rgba(0, 229, 255, 0.16),
          inset 0 0 35px rgba(255, 209, 102, 0.08);
      }

      .game-container::before,
      .game-container::after {
        content: "";
        position: absolute;
        left: 26px;
        right: 26px;
        height: 10px;
        border-radius: 999px;
        background: repeating-linear-gradient(
          90deg,
          var(--post-yellow) 0 18px,
          #ff315a 18px 36px,
          var(--neon-cyan) 36px 54px
        );
        filter: drop-shadow(0 0 14px rgba(255, 222, 0, 0.65));
        opacity: 0.88;
      }
      .game-container::before {
        top: -7px;
      }
      .game-container::after {
        bottom: -7px;
      }

      .display-header {
        display: grid;
        grid-template-columns: 1fr minmax(130px, 0.8fr) 1fr;
        gap: 14px;
        align-items: stretch;
        margin-bottom: 16px;
      }

      .display-header > div {
        position: relative;
        padding: 10px 12px;
        border: 1px solid rgba(255, 209, 102, 0.36);
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.28);
        box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.04);
        text-align: center;
        color: rgba(255, 247, 214, 0.86);
        font-weight: 900;
      }

      .lcd-screen {
        margin-top: 5px;
        min-width: 80px;
        padding: 8px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 49, 90, 0.62);
        background:
          linear-gradient(
            180deg,
            rgba(255, 49, 90, 0.14),
            rgba(20, 0, 8, 0.95)
          ),
          #190004;
        color: #ff4d69;
        font-family: "Courier New", monospace;
        font-size: clamp(24px, 4.5vw, 38px);
        font-weight: 900;
        text-align: center;
        letter-spacing: 0.08em;
        text-shadow:
          0 0 9px rgba(255, 49, 90, 0.95),
          0 0 22px rgba(255, 49, 90, 0.55);
        box-shadow:
          inset 0 0 18px black,
          0 0 18px rgba(255, 49, 90, 0.28);
      }

      #player-name-display {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        color: #fff !important;
        font-size: 15px !important;
        line-height: 1.35;
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.7);
      }

      .slot-machine {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(6, 1fr);
        gap: clamp(4px, 0.8vw, 8px);
        aspect-ratio: 8 / 6;
        position: relative;
        padding: clamp(7px, 1.2vw, 12px);
        margin-bottom: 18px;
        border-radius: 28px;
        border: 2px solid rgba(255, 222, 0, 0.65);
        background:
          radial-gradient(
            circle at center,
            rgba(255, 222, 0, 0.16),
            transparent 38%
          ),
          linear-gradient(145deg, rgba(0, 229, 255, 0.16), transparent 28%),
          linear-gradient(180deg, #150014, #050006);
        box-shadow:
          inset 0 0 26px rgba(0, 0, 0, 0.85),
          0 0 30px rgba(255, 222, 0, 0.2);
      }

      .slot-machine::before {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 21px;
        pointer-events: none;
        border: 1px dashed rgba(255, 255, 255, 0.18);
      }

      .cell {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 236, 190, 0.86) 52%,
          rgba(255, 174, 56, 0.38)
        );
        box-shadow:
          inset 0 2px 8px rgba(255, 255, 255, 0.85),
          inset 0 -8px 16px rgba(118, 56, 0, 0.24),
          0 6px 14px rgba(0, 0, 0, 0.35);
        transition:
          transform 0.16s ease,
          box-shadow 0.16s ease,
          filter 0.16s ease;
      }

      .cell::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.45),
          transparent 38%
        );
        pointer-events: none;
      }

      .cell img {
        width: 86%;
        height: 86%;
        object-fit: contain;
        filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.25));
        z-index: 1;
      }

      .cell span {
        z-index: 1;
        color: #311300;
        font-size: clamp(10px, 1.55vw, 13px);
        font-weight: 1000;
        text-align: center;
        line-height: 1.1;
      }
      .cell.has-image span {
        display: none;
      }

      .cell.active {
        border: 3px solid #fff;
        background: radial-gradient(
          circle,
          #fff 0 18%,
          var(--post-yellow) 46%,
          #ff7a00 100%
        );
        box-shadow:
          inset 0 0 18px #fff,
          0 0 20px #fff,
          0 0 34px var(--post-yellow),
          0 0 56px var(--hot-red);
        z-index: 20;
        transform: translateY(-7px) scale(1.12);
        animation: activePulse 0.42s infinite alternate;
      }

      @keyframes activePulse {
        from {
          filter: saturate(1.15) brightness(1);
        }
        to {
          filter: saturate(1.75) brightness(1.23);
        }
      }

      @keyframes rainbow-flash {
        0% {
          background: #fff;
          box-shadow: 0 0 20px #fff;
          transform: scale(1);
        }
        50% {
          background: var(--post-yellow);
          box-shadow: 0 0 42px var(--post-yellow);
          transform: scale(1.06);
        }
        100% {
          background: var(--hot-red);
          box-shadow: 0 0 25px var(--hot-red);
          transform: scale(1);
        }
      }
      .full-flash {
        animation: rainbow-flash 0.1s infinite !important;
        z-index: 25;
      }

      .cell.special {
        background:
          radial-gradient(circle, rgba(255, 255, 255, 0.85), transparent 22%),
          linear-gradient(145deg, #ff315a, #7a00ff);
        color: #fff;
        font-weight: 1000;
        text-align: center;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.86);
      }

      .center-area {
        grid-column: 2 / 8;
        grid-row: 2 / 5;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 24px;
        border: 1px solid rgba(255, 222, 0, 0.78);
        background:
          radial-gradient(
            circle at center,
            rgba(255, 222, 0, 0.24),
            transparent 32%
          ),
          linear-gradient(
            135deg,
            rgba(0, 164, 71, 0.85),
            rgba(8, 18, 40, 0.94) 46%,
            rgba(83, 0, 96, 0.88)
          );
        box-shadow:
          inset 0 0 28px rgba(0, 0, 0, 0.48),
          0 0 24px rgba(255, 222, 0, 0.2);
      }

      .center-area::before {
        content: "";
        position: absolute;
        width: 150%;
        height: 150%;
        background: conic-gradient(
          from 0deg,
          transparent,
          rgba(255, 222, 0, 0.18),
          transparent,
          rgba(0, 229, 255, 0.18),
          transparent
        );
        animation: spinGlow 8s linear infinite;
      }

      @keyframes spinGlow {
        to {
          transform: rotate(360deg);
        }
      }

      .center-bg-img {
        position: absolute;
        width: 72%;
        height: 72%;
        object-fit: contain;
        opacity: 0.22;
        filter: drop-shadow(0 0 18px rgba(255, 222, 0, 0.85));
        animation: floatLogo 2.4s ease-in-out infinite alternate;
      }
      @keyframes floatLogo {
        from {
          transform: translateY(3px) scale(0.98);
        }
        to {
          transform: translateY(-5px) scale(1.03);
        }
      }

      .jp-text {
        position: relative;
        z-index: 2;
        margin: 0 0 4px;
        padding: 4px 14px;
        border-radius: 999px;
        color: var(--post-yellow);
        background: rgba(0, 0, 0, 0.3);
        font-size: clamp(16px, 3vw, 28px);
        font-weight: 1000;
        letter-spacing: 0.12em;
        text-shadow:
          0 0 10px #000,
          0 0 16px rgba(255, 222, 0, 0.95);
      }

      .jp-text::before {
        content: "GOLDEN MARIO";
        display: block;
        color: #fff;
        font-size: 0.45em;
        letter-spacing: 0.28em;
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.95);
      }

      .msg-box {
        position: relative;
        z-index: 2;
        min-width: min(84%, 430px);
        padding: 8px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        background: rgba(0, 0, 0, 0.42);
        font-size: clamp(18px, 3vw, 26px);
        font-weight: 1000;
        text-align: center;
        text-shadow: 0 0 12px rgba(255, 49, 90, 0.85);
        box-shadow: inset 0 0 16px rgba(0, 0, 0, 0.42);
      }

      .leaderboard-link {
        position: relative;
        z-index: 2;
        margin-top: 10px;
        padding: 7px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 222, 0, 0.55);
        color: #fff;
        background: rgba(255, 222, 0, 0.12);
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
        transition: 0.18s ease;
      }
      .leaderboard-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 16px rgba(255, 222, 0, 0.38);
      }

      .center-controls {
        grid-column: 2 / 8;
        grid-row: 5 / 6;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px clamp(6px, 1.3vw, 14px);
        gap: 14px;
      }

      .btn-main {
        flex: 1;
        height: 100%;
        min-height: 46px;
        border: none;
        border-radius: 999px;
        color: #fff;
        font-weight: 1000;
        cursor: pointer;
        font-size: clamp(15px, 2.4vw, 20px);
        letter-spacing: 0.08em;
        transition:
          transform 0.12s ease,
          filter 0.12s ease,
          box-shadow 0.12s ease;
      }
      .btn-main:active {
        transform: translateY(3px) scale(0.98);
      }
      .btn-reset {
        background: linear-gradient(180deg, #6c7283, #252936);
        border: 1px solid rgba(255, 255, 255, 0.32);
        box-shadow:
          0 6px 0 #12141c,
          0 0 18px rgba(255, 255, 255, 0.08);
      }
      .btn-start {
        background: radial-gradient(
          circle at top,
          #ffea75,
          #ff315a 42%,
          #94001f 100%
        );
        border: 2px solid rgba(255, 255, 255, 0.7);
        box-shadow:
          0 7px 0 #47000d,
          0 0 26px rgba(255, 49, 90, 0.65);
        animation: startBreath 1s ease-in-out infinite alternate;
      }
      @keyframes startBreath {
        from {
          filter: brightness(1);
        }
        to {
          filter: brightness(1.18);
        }
      }
      .btn-start:disabled {
        filter: grayscale(1) brightness(0.75);
        cursor: not-allowed;
        animation: none;
      }

      .bet-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: clamp(9px, 1.7vw, 14px);
      }

      .bet-button {
        position: relative;
        display: flex;
        min-height: 86px;
        overflow: hidden;
        cursor: pointer;
        border-radius: 20px;
        border: 1px solid rgba(255, 209, 102, 0.42);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 35%),
          rgba(0, 0, 0, 0.36);
        box-shadow:
          inset 0 0 18px rgba(255, 255, 255, 0.04),
          0 9px 18px rgba(0, 0, 0, 0.28);
        transition:
          transform 0.16s ease,
          box-shadow 0.16s ease,
          border-color 0.16s ease;
      }
      .bet-button:hover {
        transform: translateY(-4px);
        border-color: rgba(255, 222, 0, 0.88);
        box-shadow:
          0 12px 24px rgba(0, 0, 0, 0.34),
          0 0 20px rgba(255, 222, 0, 0.18);
      }
      .bet-button:active {
        transform: translateY(-1px) scale(0.98);
      }

      .bet-img-area {
        flex: 1.05;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 8px;
        background: radial-gradient(
          circle,
          rgba(255, 222, 0, 0.22),
          transparent 56%
        );
        border-right: 1px solid rgba(255, 255, 255, 0.16);
      }
      .bet-img-area img {
        width: 92%;
        height: 92%;
        object-fit: contain;
        filter: drop-shadow(0 7px 9px rgba(0, 0, 0, 0.36));
      }

      .bet-info-area {
        flex: 0.95;
        display: flex;
        flex-direction: column;
      }
      .rate-display {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 4px;
        color: #fff7d6;
        background: rgba(0, 0, 0, 0.28);
        font-size: clamp(10px, 1.6vw, 13px);
        font-weight: 900;
      }
      .count-display {
        flex: 1.45;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #3b1400;
        background: linear-gradient(
          180deg,
          #fff8b6,
          var(--post-yellow) 45%,
          #ff9f1c
        );
        font-family: "Courier New", monospace;
        font-size: clamp(28px, 4.5vw, 40px);
        font-weight: 1000;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .leaderboard-modal {
        position: fixed;
        inset: 0;
        z-index: 9998;
        display: none;
        place-items: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.72);
        backdrop-filter: blur(8px);
      }
      .leaderboard-modal.show {
        display: grid;
      }
      .leaderboard-card {
        width: min(92vw, 460px);
        border-radius: 28px;
        border: 1px solid rgba(255, 222, 0, 0.72);
        background: linear-gradient(
          180deg,
          rgba(58, 22, 62, 0.98),
          rgba(9, 3, 18, 0.98)
        );
        box-shadow:
          0 0 50px rgba(255, 43, 214, 0.2),
          0 0 34px rgba(255, 222, 0, 0.18);
        padding: 22px;
      }
      .leaderboard-card h2 {
        margin: 0 0 14px;
        color: var(--post-yellow);
        text-align: center;
        text-shadow: 0 0 16px rgba(255, 222, 0, 0.65);
      }
      .leaderboard-list {
        display: grid;
        gap: 8px;
        margin: 0 0 16px;
        padding: 0;
        list-style: none;
      }
      .leaderboard-list li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-weight: 800;
      }
      .modal-close {
        width: 100%;
        padding: 12px 14px;
        border: 0;
        border-radius: 999px;
        color: #3b1400;
        background: linear-gradient(180deg, #fff8b6, var(--post-yellow));
        font-weight: 1000;
        cursor: pointer;
      }

      footer div {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
        text-align: center;
        opacity: 0.82;
        margin-top: 22px;
      }

      @media (max-width: 640px) {
        body {
          padding: 10px;
        }
        .game-container {
          border-radius: 24px;
          padding: 12px;
        }
        .display-header {
          grid-template-columns: 1fr 1fr;
        }
        .display-header > div:nth-child(2) {
          grid-column: 1 / 3;
          order: -1;
        }
        .bet-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .bet-button {
          min-height: 78px;
          border-radius: 16px;
        }
        .slot-machine {
          border-radius: 20px;
          gap: 4px;
        }
        .cell {
          border-radius: 9px;
        }
        .center-area {
          border-radius: 16px;
        }
        .center-controls {
          gap: 8px;
        }
      }

      @media (max-width: 430px) {
        .bet-grid {
          grid-template-columns: 1fr;
        }
        .display-header {
          gap: 8px;
        }
        .slot-machine {
          aspect-ratio: 8 / 7;
        }
        .btn-main {
          min-height: 40px;
          letter-spacing: 0;
        }
      }
    </style>
  </head>
  <body>
    <script src="script_mario.js"></script>
    <!-- Firebase SDK：使用 compat 版本，避免改成 type="module" 後 onclick / 全域函式失效 -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <div id="loader">
      <h2 style="color: var(--post-yellow)">遊戲最佳化，請稍待片刻...</h2>
      <p id="load-status">正在載入圖形與音效資源</p>
    </div>

    <div class="game-container">
      <div class="display-header">
        <div>
          本次獲得籌碼
          <div class="lcd-screen" id="win-display">0000</div>
        </div>
        <div
          style="
            color: var(--post-yellow);
            font-size: 12px;
            font-weight: bold;
            text-align: center;
          "
        >
          <br /><span
            id="player-name-display"
            style="color: #fff; font-size: 14px"
          ></span>
        </div>
        <div>
          籌碼
          <div class="lcd-screen" id="credit-display">0100</div>
        </div>
      </div>

      <div class="slot-machine" id="machine-grid">
        <div class="center-area">
          <img
            src="titlename.png"
            id="center-img"
            class="center-bg-img"
            onerror="this.style.display = 'none'"
          />
          <h1 class="jp-text">小瑪莉：黃金傳說</h1>
          <div class="msg-box" id="game-msg">載入完畢</div>
          <div class="leaderboard-link" onclick="showLeaderboard()">
            查看排行榜
          </div>
        </div>
        <div class="center-controls">
          <button class="btn-main btn-reset" onclick="resetBets()">
            全部收回
          </button>
          <button
            class="btn-main btn-start"
            id="start-btn"
            onclick="startGame()"
          >
            試試手氣
          </button>
        </div>
      </div>

      <div class="bet-grid" id="bet-panel"></div>
    </div>
    <script>
      let playerName = "";

      // Cloud Firestore 排行榜設定
      // 這組設定會把所有不同電腦、手機玩家的紀錄寫進同一個 Firebase 專案。
      const firebaseConfig = {
        apiKey: "AIzaSyCX5p1hll1sIjR4Gsp6o1_v1wQgvyXWUfo",
        authDomain: "fir-game-64891.firebaseapp.com",
        databaseURL:
          "https://fir-game-64891-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fir-game-64891",
        storageBucket: "fir-game-64891.firebasestorage.app",
        messagingSenderId: "357308899829",
        appId: "1:357308899829:web:1a0dd9206e55947b20c0bc",
        measurementId: "G-CPZGMGGYRR",
      };
      let db = null;
      const LEADERBOARD_COLLECTION = "mario_rankings";

      try {
        if (window.firebase && !firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        if (window.firebase && firebase.firestore) {
          db = firebase.firestore();
        }
      } catch (error) {
        console.warn("Firebase 初始化失敗，排行榜將暫時使用本機備援。", error);
      }
      const sounds = {
        bet: new Audio("bet.mp3"),
        reset: new Audio("reset.mp3"),
        start: new Audio("start.mp3"),
        tick: new Audio("tick.mp3"),
        winSmall: new Audio("win.mp3"),
        winBig: new Audio("big_win.mp3"),
        onceMore: new Audio("bonus.mp3"),
      };

      const items = [
        {
          icon: "💰",
          img: "bonus.png",
          label: "年終獎金",
          type: "bonus",
          rate: 100,
        },
        {
          icon: "🌙",
          img: "overtimepay.png",
          label: "加班費",
          type: "ot",
          rate: 50,
        },
        {
          icon: "🏖️",
          img: "vacation.png",
          label: "公特休假",
          type: "leave",
          rate: 40,
        },
        {
          icon: "🍐",
          img: "wendan.png",
          label: "麻豆文旦",
          type: "pomelo",
          rate: 30,
        },
        {
          icon: "📦",
          img: "momo.png",
          label: "MOMO包裹",
          type: "momo",
          rate: 20,
        },
        {
          icon: "🧳",
          img: "wanguo.png",
          label: "萬國行李箱",
          type: "box",
          rate: 15,
        },
        {
          icon: "🚛",
          img: "17toncar.png",
          label: "17噸郵車",
          type: "truck",
          rate: 10,
        },
        {
          icon: "🛒",
          img: "parcelcart.png",
          label: "包裹籃車",
          type: "cart_f",
          rate: 5,
        },
        {
          icon: "🗑️",
          img: "blankcart.png",
          label: "空籃車",
          type: "cart_e",
          rate: 2,
        },
      ];

      // 關鍵修正 1：重新對齊內容與座標 (順時針順序)
      const pathData = [
        { type: "item", id: 0 },
        { type: "item", id: 8 },
        { type: "item", id: 7 },
        { type: "item", id: 6 },
        { type: "special", label: "ONCE MORE" },
        { type: "item", id: 5 },
        { type: "item", id: 4 },
        { type: "item", id: 3 },
        { type: "item", id: 1 },
        { type: "item", id: 8 },
        { type: "item", id: 7 },
        { type: "item", id: 2 },
        { type: "item", id: 6 },
        { type: "special", label: "ONCE MORE" },
        { type: "item", id: 5 },
        { type: "item", id: 4 },
        { type: "item", id: 3 },
        { type: "item", id: 0 },
        { type: "item", id: 8 },
        { type: "item", id: 7 },
        { type: "item", id: 6 },
        { type: "item", id: 5 },
        { type: "item", id: 4 },
        { type: "item", id: 2 },
      ];

      const coords = [
        [1, 1],
        [1, 2],
        [1, 3],
        [1, 4],
        [1, 5],
        [1, 6],
        [1, 7],
        [1, 8],
        [2, 8],
        [3, 8],
        [4, 8],
        [5, 8],
        [6, 8],
        [6, 7],
        [6, 6],
        [6, 5],
        [6, 4],
        [6, 3],
        [6, 2],
        [6, 1],
        [5, 1],
        [4, 1],
        [3, 1],
        [2, 1],
      ];

      let credit = 1000,
        win = 0,
        isPlaying = false,
        currentIndex = 0;
      let currentBets = {};
      items.forEach((i) => (currentBets[i.type] = 0));

      async function preloadResources() {
        const imgSources = [
          ...new Set(items.map((i) => i.img)),
          "titlename.png",
          "bonus.png",
        ];
        const loadImg = (src) =>
          new Promise((res) => {
            const img = new Image();
            img.src = src;
            img.onload = res;
            img.onerror = res;
          });
        const loadAudio = (audio) =>
          new Promise((res) => {
            audio.addEventListener("canplaythrough", res, { once: true });
            setTimeout(res, 2000);
          });
        try {
          await Promise.all([
            ...imgSources.map(loadImg),
            ...Object.values(sounds).map(loadAudio),
          ]);
        } finally {
          document.getElementById("loader").style.display = "none";
          initPlayer();
        }
      }

      function initPlayer() {
        let savedName = localStorage.getItem("post_player_name");
        if (!savedName) {
          savedName = prompt(
            "歡迎來到小瑪莉：黃金傳說！請輸入您的暱稱：",
            "阿嘉",
          );
          if (!savedName) savedName = "無名小卒";
          localStorage.setItem("post_player_name", savedName);
        }
        playerName = savedName;
        document.getElementById("player-name-display").innerText =
          `玩家：${playerName}`;
      }

      function getLocalLeaderboard() {
        try {
          return JSON.parse(localStorage.getItem("post_leaderboard") || "[]");
        } catch (error) {
          return [];
        }
      }

      function saveLocalLeaderboard(record) {
        const board = getLocalLeaderboard();
        board.push(record);
        board.sort((a, b) => b.score - a.score);
        localStorage.setItem(
          "post_leaderboard",
          JSON.stringify(board.slice(0, 10)),
        );
      }

      function escapeHTML(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      async function updateLeaderboard(finalWin) {
        const cleanName = (playerName || "無名小卒").trim().slice(0, 20);
        const score = Number.parseInt(finalWin, 10) || 0;
        const record = {
          name: cleanName,
          score,
          dateText: new Date().toLocaleDateString("zh-TW"),
          createdAt: db
            ? firebase.firestore.FieldValue.serverTimestamp()
            : new Date().toISOString(),
        };

        if (!db) {
          saveLocalLeaderboard(record);
          return;
        }

        try {
          await db.collection(LEADERBOARD_COLLECTION).add(record);
        } catch (error) {
          console.warn("Firestore 排行榜寫入失敗，已改存本機備援。", error);
          saveLocalLeaderboard(record);
        }
      }

      async function loadLeaderboard() {
        if (!db) return getLocalLeaderboard();

        try {
          const snapshot = await db
            .collection(LEADERBOARD_COLLECTION)
            .orderBy("score", "desc")
            .orderBy("createdAt", "asc")
            .limit(10)
            .get();

          return snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
        } catch (error) {
          console.warn("Firestore 排行榜讀取失敗，已改讀本機備援。", error);
          return getLocalLeaderboard();
        }
      }

      async function showLeaderboard() {
        const list = document.getElementById("leaderboard-list");
        list.innerHTML = `<li><span>讀取排行榜中...</span><span>雲端連線</span></li>`;
        document.getElementById("leaderboard-modal").classList.add("show");

        const board = await loadLeaderboard();
        list.innerHTML = "";

        if (board.length === 0) {
          list.innerHTML = `<li><span>尚無紀錄</span><span>等你封神</span></li>`;
          return;
        }

        board.forEach((record, idx) => {
          const li = document.createElement("li");
          const dateText = record.dateText || record.date || "--";
          li.innerHTML = `<span>${idx + 1}. ${escapeHTML(record.name)}</span><span>${Number(record.score || 0)} 分｜${escapeHTML(dateText)}</span>`;
          list.appendChild(li);
        });
      }

      function hideLeaderboard() {
        document.getElementById("leaderboard-modal").classList.remove("show");
      }

      function playSound(name) {
        if (sounds[name]) {
          sounds[name].currentTime = 0;
          sounds[name].play().catch(() => {});
        }
      }

      const machine = document.getElementById("machine-grid");
      pathData.forEach((data, idx) => {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.id = `cell-${idx}`;
        cell.style.gridRow = coords[idx][0];
        cell.style.gridColumn = coords[idx][1];
        if (data.type === "special") {
          cell.classList.add("special");
          cell.innerHTML = `<span>ONCE<br>MORE</span>`;
        } else {
          const item = items[data.id];
          const img = document.createElement("img");
          img.src = item.img;
          const span = document.createElement("span");
          span.innerText = item.label;
          img.onload = () => cell.classList.add("has-image");
          img.onerror = () => (img.style.display = "none");
          cell.appendChild(img);
          cell.appendChild(span);
        }
        machine.appendChild(cell);
      });
      document.getElementById("cell-0").classList.add("active");

      const betPanel = document.getElementById("bet-panel");
      items.forEach((item) => {
        const btn = document.createElement("div");
        btn.className = "bet-button";
        const cost = Math.max(1, Math.ceil(item.rate / 2.5));
        btn.innerHTML = `
            <div class="bet-img-area"><img src="${item.img}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"><span style="display:none">${item.label}</span></div>
            <div class="bet-info-area"><div class="rate-display">x${item.rate} (費:${cost})</div><div class="count-display" id="bet-${item.type}">0</div></div>
        `;
        btn.onclick = () => {
          placeBet(item.type, cost);
        };
        betPanel.appendChild(btn);
      });

      function placeBet(type, cost) {
        if (isPlaying || currentBets[type] >= 99) return;
        if (credit < cost) {
          document.getElementById("game-msg").innerText = "籌碼不足！";
          return;
        }
        playSound("bet");
        currentBets[type]++;
        credit -= cost;
        updateDisplay();
      }

      function resetBets() {
        if (isPlaying) return;
        playSound("reset");
        items.forEach((i) => {
          const cost = Math.max(1, Math.ceil(i.rate / 2.5));
          credit += currentBets[i.type] * cost;
          currentBets[i.type] = 0;
        });
        updateDisplay();
      }

      function updateDisplay() {
        document.getElementById("credit-display").innerText = credit
          .toString()
          .padStart(4, "0");
        document.getElementById("win-display").innerText = win
          .toString()
          .padStart(4, "0");
        items.forEach(
          (i) =>
            (document.getElementById(`bet-${i.type}`).innerText =
              currentBets[i.type]),
        );
      }

      function fullHouseEffect() {
        const allCells = document.querySelectorAll(".cell");
        allCells.forEach((c) => c.classList.add("full-flash"));
        setTimeout(() => {
          allCells.forEach((c) => c.classList.remove("full-flash"));
        }, 3000);
      }

      // 關鍵修正 2：確保步數計算正確對應視覺位置
      function startGame(isFree = false) {
        const totalBet = Object.values(currentBets).reduce((a, b) => a + b, 0);
        if (isPlaying || (!isFree && totalBet === 0)) return;

        isPlaying = true;
        playSound("start");
        const cabinet = document.querySelector(".game-container");
        if (cabinet) {
          cabinet.animate(
            [
              { transform: "translateX(0)" },
              { transform: "translateX(-3px)" },
              { transform: "translateX(3px)" },
              { transform: "translateX(0)" },
            ],
            { duration: 180, iterations: 2 },
          );
        }
        document
          .querySelectorAll(".btn-main")
          .forEach((b) => (b.disabled = true));
        document.getElementById("game-msg").innerText = isFree
          ? "FREE SPIN!"
          : "正在處理運送中...";

        const targetIndex = Math.floor(Math.random() * pathData.length);
        const totalSteps =
          pathData.length * 3 +
          ((targetIndex - currentIndex + pathData.length) % pathData.length);
        let currentStep = 0,
          speed = 150;

        function run() {
          document
            .getElementById(`cell-${currentIndex}`)
            .classList.remove("active");
          currentIndex = (currentIndex + 1) % pathData.length;
          document
            .getElementById(`cell-${currentIndex}`)
            .classList.add("active");
          playSound("tick");
          currentStep++;
          if (currentStep < totalSteps - 12) speed = Math.max(30, speed - 20);
          else speed += 40;
          if (currentStep < totalSteps) setTimeout(run, speed);
          else handleResult(currentIndex); // 使用最終停下的索引判定
        }
        run();
      }

      function handleResult(index) {
        const res = pathData[index];
        if (res.type === "special") {
          playSound("onceMore");
          document.getElementById("game-msg").innerText = "加碼再一圈！";
          setTimeout(() => {
            isPlaying = false;
            startGame(true);
          }, 1000);
          return;
        }

        const landed = items[res.id];
        const prize = currentBets[landed.type] * landed.rate;

        if (prize > 0) {
          win += prize;
          credit += prize;
          document.getElementById("game-msg").innerText = `獲得 ${prize} 分！`;
          if (landed.rate >= 100) {
            playSound("winBig");
            fullHouseEffect();
          } else playSound("winSmall");
        } else {
          document.getElementById("game-msg").innerText = "再接再厲！";
        }

        items.forEach((i) => (currentBets[i.type] = 0));
        isPlaying = false;
        document
          .querySelectorAll(".btn-main")
          .forEach((b) => (b.disabled = false));
        updateDisplay();
        checkGameOver();
      }

      function checkGameOver() {
        if (
          credit < 1 &&
          Object.values(currentBets).reduce((a, b) => a + b, 0) === 0
        ) {
          if (win > 0) updateLeaderboard(win);
          setTimeout(() => {
            if (
              confirm(
                `點數已用光！本次結算得分：${win}\n是否重新開始新的一局？`,
              )
            ) {
              credit = 100;
              win = 0;
              updateDisplay();
              document.getElementById("game-msg").innerText = "重新開始！";
            } else {
              document.body.innerHTML =
                "<h1 style='color:white;text-align:center;margin-top:20%'>遊戲已結束，請關閉分頁。</h1>";
            }
          }, 500);
        }
      }

      window.onload = preloadResources;
      updateDisplay();

      // 1. 禁用滑鼠右鍵選單
      document.oncontextmenu = function () {
        console.warn("系統提示：為了保護排版參數，已禁用右鍵功能。");
        return false;
      };
    </script>
