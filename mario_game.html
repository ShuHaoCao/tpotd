<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小瑪莉：黃金傳說</title>
    <link rel="stylesheet" href="style_mario.css" />
  </head>
  <body>
    <script src="script_mario.js"></script>
    <div id="loader">
      <h2 style="color: var(--post-yellow)">遊戲最佳化，請稍待片刻...</h2>
      <p id="load-status">正在載入圖形與音效資源</p>
    </div>

    <div class="game-container">
      <div class="display-header">
        <div>
          本次獲得籌碼
          <div class="lcd-screen" id="win-display">0000</div>
        </div>
        <div
          style="
            color: var(--post-yellow);
            font-size: 12px;
            font-weight: bold;
            text-align: center;
          "
        >
          <br /><span
            id="player-name-display"
            style="color: #fff; font-size: 14px"
          ></span>
        </div>
        <div>
          籌碼
          <div class="lcd-screen" id="credit-display">0100</div>
        </div>
      </div>

      <div class="slot-machine" id="machine-grid">
        <div class="center-area">
          <img
            src="titlename.png"
            id="center-img"
            class="center-bg-img"
            onerror="this.style.display = 'none'"
          />
          <h1 class="jp-text">小瑪莉：黃金傳說</h1>
          <div class="msg-box" id="game-msg">載入完畢</div>
          <div class="leaderboard-link" onclick="showLeaderboard()">
            查看排行榜
          </div>
        </div>
        <div class="center-controls">
          <button class="btn-main btn-reset" onclick="resetBets()">
            全部收回
          </button>
          <button
            class="btn-main btn-start"
            id="start-btn"
            onclick="startGame()"
          >
            試試手氣
          </button>
        </div>
      </div>

      <div class="bet-grid" id="bet-panel"></div>
    </div>

    <footer>
      <div class="copyright">© 2025 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
