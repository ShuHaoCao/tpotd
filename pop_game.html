<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>壓力大作戰 - 排行榜強化版</title>
    <style>
      :root {
        --bg: #f5f6fa;
        --primary: #2f3640;
      }
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        overflow: hidden;
        font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        touch-action: manipulation;
      }
      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: absolute;
        top: 20px;
        width: 100%;
        display: flex;
        justify-content: space-around;
        z-index: 10;
        pointer-events: none;
      }
      .stat-box {
        background: #fff;
        padding: 10px 20px;
        border-radius: 30px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        font-weight: bold;
      }

      .bubble {
        position: absolute;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.1s;
        animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        user-select: none;
      }
      @keyframes popIn {
        from { transform: scale(0); }
        to { transform: scale(1); }
      }

      .flash-red { animation: flashRed 0.3s; }
      @keyframes flashRed {
        from { background: rgba(255, 0, 0, 0.3); }
        to { background: transparent; }
      }
      .flash-purple { animation: flashPurple 0.5s; }
      @keyframes flashPurple {
        from { background: rgba(162, 0, 255, 0.4); }
        to { background: transparent; }
      }

      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.98);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        text-align: center;
        overflow-y: auto;
        padding: 20px 0;
      }

      .menu-card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 85%;
        max-width: 400px;
      }

      input[type="text"] {
        padding: 12px 20px;
        font-size: 16px;
        border: 2px solid #ddd;
        border-radius: 25px;
        margin-bottom: 15px;
        width: 80%;
        outline: none;
        text-align: center;
      }
      input[type="text"]:focus { border-color: #2f3640; }

      button {
        padding: 15px 40px;
        font-size: 18px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.2s;
      }
      button:active { transform: scale(0.95); }

      /* 排行榜樣式 */
      #leaderboard {
        margin-top: 20px;
        width: 100%;
        font-size: 14px;
        border-collapse: collapse;
      }
      #leaderboard th { border-bottom: 2px solid #eee; padding-bottom: 5px; }
      #leaderboard td { padding: 5px 0; color: #555; }
      .top1 { color: #f1c40f !important; font-weight: bold; }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="stat-box">⏱ <span id="time">30</span>s</div>
        <div class="stat-box">💰 <span id="score">0</span></div>
      </div>

      <div id="overlay">
        <div class="menu-card" id="menu-content">
          <h1 style="margin-top:0">辦公室戰術消除</h1>
          <p>🔴扣分 | 🟣清場 | 🟡加爆</p>
          
          <input type="text" id="playerName" placeholder="輸入你的大名..." maxlength="10">
          <br>
          <button onclick="startGame()">開始戰鬥</button>

          <div style="margin-top: 25px;">
            <strong style="color:#2f3640">🏆 本日英雄榜 (前10名)</strong>
            <table id="leaderboard">
              <thead>
                <tr>
                  <th width="20%">名次</th>
                  <th width="50%">玩家</th>
                  <th width="30%">得分</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      let score = 0;
      let timeLeft = 30;
      let gameActive = false;
      let spawnTimer, clockTimer;
      let currentPlayerName = localStorage.getItem("popGame_name") || "";

      const container = document.getElementById("game-container");
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("time");
      const overlay = document.getElementById("overlay");
      const nameInput = document.getElementById("playerName");
      const leaderBody = document.getElementById("leaderboard-body");

      // 初始化：自動填入名字並載入排行榜
      nameInput.value = currentPlayerName;
      updateLeaderboardUI();

      const types = [
        { id: "g1", size: 40, color: "#44bd32", pts: 10, label: "小" },
        { id: "g2", size: 70, color: "#44bd32", pts: 20, label: "中" },
        { id: "g3", size: 100, color: "#44bd32", pts: 40, label: "大" },
        { id: "bad", size: 140, color: "#c23616", pts: -50, label: "扣分!" },
        { id: "gold", size: 25, color: "#fbc531", pts: 100, label: "VIP" },
        { id: "bomb", size: 0, color: "#9c88ff", pts: 50, label: "BOOM" },
      ];

      function startGame() {
        const name = nameInput.value.trim();
        if (!name) {
          alert("請先輸入名稱唷！");
          return;
        }
        
        // 記憶名稱
        currentPlayerName = name;
        localStorage.setItem("popGame_name", name);

        score = 0;
        timeLeft = 30;
        gameActive = true;
        scoreEl.innerText = score;
        overlay.style.display = "none";

        spawnTimer = setInterval(spawnBubble, 450);
        clockTimer = setInterval(() => {
          timeLeft--;
          timeEl.innerText = timeLeft;
          if (timeLeft <= 0) endGame();
        }, 1000);
      }

      function spawnBubble() {
        if (!gameActive) return;
        const hasPurple = document.querySelector(".bubble-bomb");
        let rand = Math.random() * 100;
        let type;

        if (rand < 15 && !hasPurple) type = types[5];
        else if (rand < 25) type = types[4];
        else if (rand < 40) type = types[3];
        else if (rand < 60) type = types[2];
        else if (rand < 80) type = types[1];
        else type = types[0];

        createBubble(type);
      }

      function createBubble(type) {
        const b = document.createElement("div");
        const size = type.id === "bomb" ? Math.random() * 60 + 40 : type.size;

        b.className = `bubble bubble-${type.id}`;
        b.style.width = b.style.height = size + "px";
        b.style.backgroundColor = type.color;
        b.innerText = type.label;

        const x = Math.random() * (window.innerWidth - size - 20) + 10;
        const y = Math.random() * (window.innerHeight - size - 150) + 80;
        b.style.left = x + "px";
        b.style.top = y + "px";

        const clickHandler = (e) => {
          e.preventDefault();
          if (!gameActive) return;
          if (type.id === "bomb") triggerBomb();
          else {
            updateScore(type.pts);
            if (type.pts < 0) flashScreen("red");
          }
          b.remove();
        };

        b.addEventListener("touchstart", clickHandler);
        b.addEventListener("mousedown", clickHandler);
        container.appendChild(b);

        let duration = 2000;
        if (type.id === "bad") duration = 1200;
        if (type.id === "bomb") duration = 4000;

        setTimeout(() => { if (b.parentNode) b.remove(); }, duration);
      }

      function triggerBomb() {
        flashScreen("purple");
        const allBubbles = document.querySelectorAll(".bubble");
        let count = allBubbles.length;
        updateScore(50 + count * 5);
        allBubbles.forEach((b) => b.remove());
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      }

      function updateScore(pts) {
        score += pts;
        scoreEl.innerText = score;
        if (navigator.vibrate) navigator.vibrate(pts < 0 ? 100 : 20);
      }

      function flashScreen(type) {
        const f = document.createElement("div");
        f.style.position = "fixed"; f.style.top = 0; f.style.left = 0;
        f.style.width = "100vw"; f.style.height = "100vh";
        f.style.pointerEvents = "none"; f.style.zIndex = 5;
        f.className = `flash-${type}`;
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 500);
      }

      function saveHighScore(name, finalScore) {
        let list = JSON.parse(localStorage.getItem("popGame_leaderboard") || "[]");
        list.push({ name: name, score: finalScore, date: new Date().getTime() });
        // 排序：分數高優先，分數相同則日期新優先
        list.sort((a, b) => b.score - a.score || b.date - a.date);
        // 只留前10名
        list = list.slice(0, 10);
        localStorage.setItem("popGame_leaderboard", JSON.stringify(list));
      }

      function updateLeaderboardUI() {
        const list = JSON.parse(localStorage.getItem("popGame_leaderboard") || "[]");
        leaderBody.innerHTML = list.length 
          ? list.map((item, index) => `
              <tr class="${index === 0 ? 'top1' : ''}">
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${item.score}</td>
              </tr>
            `).join('')
          : '<tr><td colspan="3" style="padding:20px; color:#999">尚無紀錄，等你來挑戰！</td></tr>';
      }

      function endGame() {
        gameActive = false;
        clearInterval(spawnTimer);
        clearInterval(clockTimer);
        document.querySelectorAll(".bubble").forEach((b) => b.remove());

        // 儲存成績
        saveHighScore(currentPlayerName, score);

        let rank = ""; let rankColor = "";
        if (score <= 200) { rank = "辦公室透明人 😶"; rankColor = "#94a3b8"; }
        else if (score <= 400) { rank = "茶水間常客 ☕"; rankColor = "#8ed1fc"; }
        else if (score <= 600) { rank = "急件處理員 📄"; rankColor = "#0693e3"; }
        else if (score <= 800) { rank = "資深打字機 ⌨️"; rankColor = "#00d084"; }
        else if (score <= 1000) { rank = "專案救火隊 👨‍🚒"; rankColor = "#7bdcb5"; }
        else if (score <= 1200) { rank = "部門頂樑柱 🏛️"; rankColor = "#abb8c3"; }
        else if (score <= 1400) { rank = "效率守護神 🛡️"; rankColor = "#f78da7"; }
        else if (score <= 1600) { rank = "副總經理預備軍 📈"; rankColor = "#ff6900"; }
        else if (score <= 1800) { rank = "傳奇總經理 👑"; rankColor = "#fcb900"; }
        else { rank = "跨國集團執行長 💎"; rankColor = "#eb144c"; }

        // 顯示結算畫面 (重寫內容以包含新排行榜)
        overlay.style.display = "flex";
        overlay.innerHTML = `
          <div class="menu-card">
            <h1 style="color:#2d3436; margin:0">時間到！</h1>
            <div style="font-size: 1.1rem; color: #636e72;">${currentPlayerName} 的得分</div>
            <div style="font-size: 3.5rem; font-weight: 900; color: #2d3436; margin: 5px 0;">${score}</div>
            <div style="background: ${rankColor}; color: white; padding: 8px 20px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;">
                ${rank}
            </div>
            <button onclick="location.reload()">再戰一回</button>
            <div style="margin-top: 25px;">
              <strong style="color:#2f3640">🏆 最新排行榜</strong>
              <table id="leaderboard">
                <thead><tr><th width="20%">名次</th><th width="50%">玩家</th><th width="30%">得分</th></tr></thead>
                <tbody id="leaderboard-body-end"></tbody>
              </table>
            </div>
          </div>
        `;
        
        // 更新結算頁面的排行榜
        const endBody = document.getElementById("leaderboard-body-end");
        const list = JSON.parse(localStorage.getItem("popGame_leaderboard") || "[]");
        endBody.innerHTML = list.map((item, index) => `
          <tr class="${index === 0 ? 'top1' : ''}">
            <td>${index + 1}</td>
            <td>${item.name}</td>
            <td>${item.score}</td>
          </tr>
        `).join('');
      }
    </script>
  </body>
</html>
