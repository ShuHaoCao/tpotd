<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>泡泡平安：情緒回收桶</title>
    <link rel="stylesheet" href="style_pop.css" />
  </head>
  <body>
     <script src="script_pop.js"></script>
    <div id="game-container">
      <div id="hud">
        <div class="stat-box">⏱ <span id="time">30</span>s</div>
        <div class="stat-box">💰 <span id="score">0</span></div>
      </div>

      <div id="overlay">
        <div class="menu-card" id="menu-content">
          <h1 style="margin-top: 0">泡泡平安：情緒回收桶</h1>
          <p>🔴扣分 | 🟣清場 | 🟡加爆</p>

          <input
            type="text"
            id="playerName"
            placeholder="輸入你的大名..."
            maxlength="10"
          />
          <br />
          <button onclick="startGame()">開始戰鬥</button>

          <div style="margin-top: 25px">
            <strong style="color: #2f3640">🏆 本日英雄榜 (前10名)</strong>
            <table id="leaderboard">
              <thead>
                <tr>
                  <th width="20%">名次</th>
                  <th width="50%">玩家</th>
                  <th width="30%">得分</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script src="script_pop.js"></script>
    <footer>
      <div class="copyright">© 2026 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
