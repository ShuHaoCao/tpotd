<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>NEON POP｜情緒泡泡艙</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      :root {
        --bg1: #060816;
        --bg2: #0d132d;
        --cyan: #5ee7ff;
        --pink: #ff5fd2;
        --gold: #ffd166;
        --green: #7dff7a;
        --red: #ff6363;
        --glass: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family:
          "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(94, 231, 255, 0.18),
            transparent 25%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(255, 95, 210, 0.18),
            transparent 25%
          ),
          linear-gradient(145deg, var(--bg1), var(--bg2));
        color: #fff;
        touch-action: manipulation;
      }

      #bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.4;
        pointer-events: none;
      }

      #particles {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .star {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: white;
        opacity: 0.25;
        animation: float 10s linear infinite;
      }

      @keyframes float {
        from {
          transform: translateY(100vh) scale(0.4);
        }
        to {
          transform: translateY(-120px) scale(1.4);
        }
      }

      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      #hud {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        width: min(94vw, 1000px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        z-index: 20;
      }

      .panel {
        backdrop-filter: blur(18px);
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
      }

      .hud-box {
        min-width: 140px;
        padding: 14px 20px;
      }

      .hud-title {
        font-size: 0.78rem;
        letter-spacing: 2px;
        opacity: 0.7;
      }

      .hud-value {
        margin-top: 5px;
        font-size: 1.9rem;
        font-weight: 900;
      }

      #comboBox {
        text-align: center;
        padding: 16px 24px;
      }

      #combo {
        font-size: 2rem;
        font-weight: 900;
        color: var(--gold);
        text-shadow: 0 0 12px rgba(255, 209, 102, 0.9);
      }

      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
        background: rgba(2, 5, 15, 0.72);
        backdrop-filter: blur(12px);
        padding: 20px;
      }

      .menu-card {
        width: min(92vw, 460px);
        padding: 34px;
        border-radius: 34px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.12),
          rgba(255, 255, 255, 0.05)
        );
        box-shadow:
          0 25px 80px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        position: relative;
        overflow: hidden;
      }

      .menu-card::before {
        content: "";
        position: absolute;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: rgba(94, 231, 255, 0.18);
        top: -100px;
        right: -80px;
        filter: blur(20px);
      }

      .logo {
        position: relative;
        z-index: 1;
      }

      .logo h1 {
        margin: 0;
        font-size: 2.4rem;
        line-height: 1;
        letter-spacing: 1px;
      }

      .logo p {
        margin: 10px 0 24px;
        opacity: 0.72;
        line-height: 1.7;
      }

      .tags {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 22px;
      }

      .tag {
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.08);
        color: white;
        outline: none;
        font-size: 1rem;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }

      button {
        width: 100%;
        margin-top: 16px;
        border: none;
        border-radius: 18px;
        padding: 16px;
        font-size: 1.1rem;
        font-weight: 900;
        cursor: pointer;
        color: #06101f;
        background: linear-gradient(135deg, var(--cyan), #9df3ff);
        box-shadow: 0 0 30px rgba(94, 231, 255, 0.35);
        transition: 0.2s ease;
      }

      button:hover {
        transform: translateY(-2px);
      }

      .board {
        margin-top: 24px;
      }

      .board h3 {
        margin-bottom: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px 6px;
        text-align: center;
      }

      tbody tr {
        background: rgba(255, 255, 255, 0.05);
      }

      tbody tr:nth-child(even) {
        background: rgba(255, 255, 255, 0.02);
      }

      .top1 {
        color: var(--gold);
        font-weight: 900;
      }

      .bubble {
        position: absolute;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 900;
        user-select: none;
        cursor: pointer;
        animation: spawn 0.28s cubic-bezier(0.17, 0.89, 0.32, 1.4);
        box-shadow:
          inset 0 6px 16px rgba(255, 255, 255, 0.25),
          0 15px 35px rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(255, 255, 255, 0.28);
      }

      .bubble::after {
        content: "";
        position: absolute;
        top: 14%;
        left: 18%;
        width: 26%;
        height: 26%;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.45);
        filter: blur(2px);
      }

      .bubble:hover {
        transform: scale(1.08);
      }

      @keyframes spawn {
        from {
          transform: scale(0);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .flash-red {
        animation: flashRed 0.4s;
      }

      .flash-purple {
        animation: flashPurple 0.5s;
      }

      @keyframes flashRed {
        from {
          background: rgba(255, 0, 0, 0.35);
        }
        to {
          background: transparent;
        }
      }

      @keyframes flashPurple {
        from {
          background: rgba(163, 82, 255, 0.45);
        }
        to {
          background: transparent;
        }
      }

      footer {
        position: fixed;
        bottom: 10px;
        width: 100%;
        text-align: center;
        font-size: 0.75rem;
        opacity: 0.45;
        z-index: 4;
      }

      @media (max-width: 700px) {
        #hud {
          width: 95vw;
        }

        .hud-box {
          min-width: 95px;
          padding: 10px 14px;
        }

        .hud-value {
          font-size: 1.4rem;
        }

        #comboBox {
          padding: 12px 14px;
        }

        #combo {
          font-size: 1.3rem;
        }

        .logo h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>

  <body>
    <div id="bg-grid"></div>
    <div id="particles"></div>

    <div id="game-container">
      <div id="hud">
        <div class="panel hud-box">
          <div class="hud-title">TIME</div>
          <div class="hud-value"><span id="time">30</span>s</div>
        </div>

        <div class="panel" id="comboBox">
          <div class="hud-title">FLOW STATE</div>
          <div id="combo">x1</div>
        </div>

        <div class="panel hud-box" style="text-align: right">
          <div class="hud-title">SCORE</div>
          <div class="hud-value" id="score">0</div>
        </div>
      </div>

      <div id="overlay">
        <div class="menu-card panel">
          <div class="logo">
            <h1>NEON POP</h1>
            <p>
              夜色像深海，泡泡像情緒。<br />
              你不是在戳泡泡，你是在把今天的壓力，一顆一顆送上太空。
            </p>
          </div>

          <div class="tags">
            <div class="tag">🔴 危險泡泡</div>
            <div class="tag">🟣 全場爆破</div>
            <div class="tag">🟡 黃金連擊</div>
          </div>

          <input
            type="text"
            id="playerName"
            maxlength="10"
            placeholder="輸入你的代號..."
          />
          <button onclick="startGame()">進入沉浸模式</button>

          <div class="board">
            <h3>🏆 星際排行榜</h3>
            <table>
              <thead>
                <tr>
                  <th>排名</th>
                  <th>玩家</th>
                  <th>分數</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <footer>© 2026 CaoShuHao｜NEON POP Emotion Chamber</footer>

    <script>
      const container = document.getElementById("game-container");
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("time");
      const comboEl = document.getElementById("combo");
      const overlay = document.getElementById("overlay");
      const leaderBody = document.getElementById("leaderboard-body");
      const nameInput = document.getElementById("playerName");

      let score = 0;
      let timeLeft = 30;
      let combo = 1;
      let comboTimer = null;
      let gameActive = false;
      let spawnTimer, clockTimer;

      let currentPlayerName = localStorage.getItem("popGame_name") || "";
      nameInput.value = currentPlayerName;

      const types = [
        { id: "small", size: 55, color: "#5effb4", pts: 10, label: "+10" },
        { id: "mid", size: 82, color: "#58d7ff", pts: 20, label: "+20" },
        { id: "big", size: 112, color: "#ff74d4", pts: 40, label: "+40" },
        { id: "bad", size: 145, color: "#ff5b5b", pts: -50, label: "-50" },
        { id: "gold", size: 42, color: "#ffd166", pts: 120, label: "VIP" },
        { id: "bomb", size: 70, color: "#a86cff", pts: 0, label: "BOOM" },
      ];

      function createStars() {
        const box = document.getElementById("particles");
        for (let i = 0; i < 35; i++) {
          const s = document.createElement("div");
          s.className = "star";
          s.style.left = Math.random() * 100 + "vw";
          s.style.animationDuration = Math.random() * 10 + 8 + "s";
          s.style.animationDelay = Math.random() * 5 + "s";
          box.appendChild(s);
        }
      }
      createStars();

      updateLeaderboardUI();

      function startGame() {
        const name = nameInput.value.trim();

        if (!name) {
          alert("輸入代號才能登入這片泡泡宇宙。");
          return;
        }

        currentPlayerName = name;
        localStorage.setItem("popGame_name", name);

        score = 0;
        combo = 1;
        timeLeft = 30;

        updateScore(0);
        comboEl.innerText = "x1";
        timeEl.innerText = timeLeft;

        gameActive = true;
        overlay.style.display = "none";

        spawnTimer = setInterval(spawnBubble, 380);

        clockTimer = setInterval(() => {
          timeLeft--;
          timeEl.innerText = timeLeft;

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      function spawnBubble() {
        if (!gameActive) return;

        const hasBomb = document.querySelector(".bubble-bomb");
        let rand = Math.random() * 100;
        let type;

        if (rand < 10 && !hasBomb) type = types[5];
        else if (rand < 22) type = types[4];
        else if (rand < 36) type = types[3];
        else if (rand < 58) type = types[2];
        else if (rand < 80) type = types[1];
        else type = types[0];

        createBubble(type);
      }

      function createBubble(type) {
        const bubble = document.createElement("div");
        bubble.className = "bubble bubble-" + type.id;

        const size = type.size + Math.random() * 15;

        bubble.style.width = size + "px";
        bubble.style.height = size + "px";
        bubble.style.background = `radial-gradient(circle at 30% 30%, rgba(255,255,255,.45), ${type.color})`;
        bubble.innerText = type.label;
        bubble.style.fontSize = Math.max(14, size / 4) + "px";

        const x = Math.random() * (window.innerWidth - size - 20) + 10;
        const y = Math.random() * (window.innerHeight - size - 170) + 100;

        bubble.style.left = x + "px";
        bubble.style.top = y + "px";

        const clickHandler = (e) => {
          e.preventDefault();

          if (!gameActive) return;

          bubble.animate(
            [
              { transform: "scale(1)", opacity: 1 },
              { transform: "scale(1.6)", opacity: 0 },
            ],
            {
              duration: 180,
              easing: "ease-out",
            },
          );

          if (type.id === "bomb") {
            triggerBomb();
          } else {
            let gain = type.pts;

            if (gain > 0) {
              combo++;
              gain = Math.floor(gain * combo * 0.35);
            } else {
              combo = 1;
              flashScreen("red");
            }

            comboEl.innerText = "x" + combo;
            updateScore(gain);
            resetComboTimer();
          }

          setTimeout(() => bubble.remove(), 120);
        };

        bubble.addEventListener("touchstart", clickHandler, { passive: false });
        bubble.addEventListener("mousedown", clickHandler);

        container.appendChild(bubble);

        let duration = 2200;
        if (type.id === "bad") duration = 1300;
        if (type.id === "bomb") duration = 4500;

        setTimeout(() => {
          if (bubble.parentNode) {
            bubble.remove();
            combo = 1;
            comboEl.innerText = "x1";
          }
        }, duration);
      }

      function resetComboTimer() {
        clearTimeout(comboTimer);

        comboTimer = setTimeout(() => {
          combo = 1;
          comboEl.innerText = "x1";
        }, 1800);
      }

      function triggerBomb() {
        flashScreen("purple");

        const all = document.querySelectorAll(".bubble");
        const count = all.length;

        updateScore(100 + count * 8);

        all.forEach((b) => {
          b.animate(
            [
              { transform: "scale(1)", opacity: 1 },
              { transform: "scale(0)", opacity: 0 },
            ],
            { duration: 220 },
          );
          setTimeout(() => b.remove(), 180);
        });

        if (navigator.vibrate) {
          navigator.vibrate([120, 40, 120]);
        }
      }

      function updateScore(pts) {
        score += pts;
        scoreEl.innerText = score;

        if (navigator.vibrate) {
          navigator.vibrate(pts < 0 ? 100 : 20);
        }
      }

      function flashScreen(type) {
        const f = document.createElement("div");
        f.className = "flash-" + type;

        f.style.position = "fixed";
        f.style.inset = 0;
        f.style.pointerEvents = "none";
        f.style.zIndex = 80;

        document.body.appendChild(f);

        setTimeout(() => f.remove(), 500);
      }

      function saveHighScore(name, finalScore) {
        let list = JSON.parse(
          localStorage.getItem("popGame_leaderboard") || "[]",
        );

        list.push({
          name,
          score: finalScore,
          date: Date.now(),
        });

        list.sort((a, b) => b.score - a.score || b.date - a.date);

        list = list.slice(0, 10);

        localStorage.setItem("popGame_leaderboard", JSON.stringify(list));
      }

      function updateLeaderboardUI() {
        const list = JSON.parse(
          localStorage.getItem("popGame_leaderboard") || "[]",
        );

        if (!list.length) {
          leaderBody.innerHTML =
            '<tr><td colspan="3">尚未有人征服這片宇宙。</td></tr>';
          return;
        }

        leaderBody.innerHTML = list
          .map(
            (item, index) => `
    <tr class="${index === 0 ? "top1" : ""}">
      <td>${index + 1}</td>
      <td>${item.name}</td>
      <td>${item.score}</td>
    </tr>
  `,
          )
          .join("");
      }

      function getRank(score) {
        if (score < 300) return ["情緒觀察員", "rgba(94,231,255,.8)"];
        if (score < 700) return ["節奏操控者", "rgba(125,255,122,.8)"];
        if (score < 1200) return ["泡泡馴服師", "rgba(255,209,102,.85)"];
        if (score < 1800) return ["銀河清道夫", "rgba(255,95,210,.85)"];
        return ["宇宙級解壓神", "rgba(255,255,255,.95)"];
      }

      function endGame() {
        gameActive = false;

        clearInterval(spawnTimer);
        clearInterval(clockTimer);

        document.querySelectorAll(".bubble").forEach((b) => b.remove());

        saveHighScore(currentPlayerName, score);

        const rankData = getRank(score);

        overlay.style.display = "flex";

        overlay.innerHTML = `
    <div class="menu-card panel">
      <div class="logo">
        <h1>MISSION CLEAR</h1>
        <p>${currentPlayerName}，你剛剛不是在玩遊戲。<br>你是在深夜宇宙裡，把壓力炸成煙火。</p>
      </div>

      <div style="text-align:center;margin:26px 0;">
        <div style="opacity:.7;letter-spacing:3px;">FINAL SCORE</div>
        <div style="font-size:4rem;font-weight:900;">${score}</div>

        <div style="margin-top:12px;padding:12px 20px;border-radius:999px;background:${rankData[1]};color:#08111d;font-weight:900;display:inline-block;">
          ${rankData[0]}
        </div>
      </div>

      <button onclick="location.reload()">再進入一次宇宙</button>

      <div class="board">
        <h3>🏆 星際排行榜</h3>
        <table>
          <thead>
            <tr>
              <th>排名</th>
              <th>玩家</th>
              <th>分數</th>
            </tr>
          </thead>
          <tbody>
            ${JSON.parse(localStorage.getItem("popGame_leaderboard") || "[]")
              .map(
                (item, index) => `
              <tr class="${index === 0 ? "top1" : ""}">
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>${item.score}</td>
              </tr>
            `,
              )
              .join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
      }

      document.oncontextmenu = () => false;
    </script>
  </body>
</html>
