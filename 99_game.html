<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>終極 99：臨界點</title>
     <link rel="stylesheet" href="style_99.css" />
  </head>
  </head>
  <body>
    <script src="script_99.js"></script>
    <div id="ui-layer">
      <button class="btn-ui" onclick="toggleRules(true)">說明</button>
      <button class="btn-ui" onclick="toggleLeaderboard(true)">排行榜</button>
    </div>

    <div id="game-board">
      <div class="player-zone" id="zone-1" style="grid-area: left">
        <div class="name-tag" id="name-1">NPC 1</div>
        <div class="hand" id="hand-1"></div>
      </div>
      <div class="player-zone" id="zone-2" style="grid-area: top">
        <div class="name-tag" id="name-2">NPC 2</div>
        <div class="hand" id="hand-2"></div>
      </div>
      <div class="player-zone" id="zone-3" style="grid-area: right">
        <div class="name-tag" id="name-3">NPC 3</div>
        <div class="hand" id="hand-3"></div>
      </div>

      <div id="center-zone">
        <div id="tip-overlay">提示</div>
        <div style="font-size: 0.7rem; color: #aaa">TOTAL</div>
        <div id="total-display">0</div>
        <div id="status-sub" style="font-size: 0.7rem; color: var(--accent)">
          等待開始
        </div>
      </div>

      <div class="player-zone" id="zone-0" style="grid-area: bottom">
        <div class="name-tag" id="name-0">你</div>
        <div class="hand" id="hand-0"></div>
      </div>
    </div>

    <div id="msg-log">
      <div id="log-text">準備好開始了嗎？</div>
      <div id="sub-log"></div>
      <button id="restart-btn" onclick="resetGame()">再次挑戰</button>
    </div>

    <div id="modal-start" class="modal">
      <div class="modal-content">
        <h2>🃏 登入戰場</h2>
        <p style="text-align: center">輸入代號紀錄前 10 名成績：</p>
        <input
          type="text"
          id="player-name-input"
          placeholder="代號 (如: 郵局阿強)"
          maxlength="10"
        />
        <button class="close-btn" onclick="confirmStart()">進入遊戲</button>
      </div>
    </div>

    <div id="modal-rules" class="modal" style="display: none">
      <div class="modal-content">
        <h2>🃏 遊戲說明</h2>
        <p>1. <b>目標：</b>生存到最後！總分不可超過 <b>99</b>。</p>
        <table>
          <tr>
            <th>卡牌</th>
            <th>功能</th>
          </tr>
          <tr>
            <td><b>4 / J</b></td>
            <td>反轉順序 / 跳過</td>
          </tr>
          <tr>
            <td><b>5</b></td>
            <td>隨機指定下一位存活對手</td>
          </tr>
          <tr>
            <td><b>10 / Q</b></td>
            <td>±10 或 ±20 (最優解)</td>
          </tr>
          <tr>
            <td><b>K / ♠A</b></td>
            <td>變 99 / 歸零</td>
          </tr>
        </table>
        <button class="close-btn" onclick="toggleRules(false)">關閉</button>
      </div>
    </div>

    <div id="modal-leaderboard" class="modal" style="display: none">
      <div class="modal-content">
        <h2>🏆前10名生存者</h2>
        <ul id="leaderboard-list"></ul>
        <button class="close-btn" onclick="toggleLeaderboard(false)">
          返回
        </button>
      </div>
    </div>

    
    <footer>
      <div class="copyright">© 2025 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
