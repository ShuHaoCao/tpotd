<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>巔峰建築師：摩天挑戰</title>
    <link rel="stylesheet" href="style_stack.css" />
  </head>
  <body>
    <script src="script_stack.js"></script>
    <div id="ui">
      <div id="score">0</div>
      <div id="msg">小心！速度隨時會變</div>
    </div>

    <div id="overlay">
      <h1 id="title">巔峰建築師：摩天挑戰</h1>

      <div id="leaderboard">
        <div style="text-align: center; font-weight: bold; margin-bottom: 10px">
          🏆頂尖建築師排行榜
        </div>
        <div id="rank-list"></div>
      </div>

      <input
        type="text"
        id="playerName"
        placeholder="輸入你的大名"
        maxlength="10"
      />
      <button id="mainBtn">進入辦公室</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <footer>
      <div class="copyright">© 2025 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
