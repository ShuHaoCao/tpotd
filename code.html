<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台南郵局運輸股-條碼產生器</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      /* 基礎樣式 - 維持原設計 */
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f7f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
      }
      .container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        max-width: 800px;
        width: 100%;
        box-sizing: border-box;
      }

      /* 頁籤設計 */
      .tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 2px solid #ddd;
        width: 100%;
      }
      .tab {
        padding: 12px 24px;
        cursor: pointer;
        background: #eee;
        border-radius: 8px 8px 0 0;
        margin-right: 5px;
        font-weight: bold;
        transition: 0.3s;
      }
      .tab.active {
        background: #007bff;
        color: white;
      }

      .row {
        display: flex;
        gap: 15px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .row > div {
        flex: 1;
        min-width: 120px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
      }
      textarea,
      input,
      select {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        width: 100%;
        box-sizing: border-box;
        font-size: 16px;
      }

      /* 按鈕樣式 */
      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }
      button {
        padding: 12px 15px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        flex: 1;
        min-width: 100px;
      }
      .btn-primary {
        background-color: #007bff;
        color: white;
        width: 100%;
        font-size: 16px;
      }
      .btn-success {
        background-color: #28a745;
        color: white;
      }
      .btn-print {
        background-color: #6c757d;
        color: white;
      }

      /* 預覽區域 */
      .preview-area {
        margin-top: 10px;
        padding: 20px;
        background: #eee;
        border-radius: 8px;
        width: 100%;
        box-sizing: border-box;
        min-height: 200px;
      }
      #printSection {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-start;
      }

      /* 一般模式標籤樣式 */
      .barcode-main-wrapper {
        background: white;
        display: flex;
        flex-direction: column;
        padding: 5px;
        box-sizing: border-box;
        overflow: hidden;
      }
      .has-border {
        border: 1px dashed #ccc;
      }
      .barcode-svg {
        width: 100%;
        flex-grow: 1;
      }

      /* --- 籃車條碼修正版樣式 --- */
      .cart-wrapper {
        background: white;
        width: 9cm;
        height: 2.5cm;
        display: flex;
        align-items: center;
        padding: 0 5px;
        box-sizing: border-box;
        border: 1px solid #002060;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .cart-left {
        width: 4.2cm;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        color: #000;
        overflow: hidden;
        padding-right: 5px;
        box-sizing: border-box;
      }
      .cart-left span {
        white-space: nowrap;
        display: inline-block;
        font-size: 28px;
      }
      .cart-right {
        width: 4.5cm;
        height: 2.2cm;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .cart-barcode-svg {
        width: 100% !important;
        height: auto !important;
        max-height: 2.2cm;
      }

      /* 列印最佳化 */
      @media print {
        @page {
          size: A4;
          margin: 0;
        }
        body {
          background: white;
          padding: 0;
          margin: 0;
        }
        .no-print {
          display: none !important;
        }
        .preview-area {
          padding: 0 !important;
          background: white !important;
        }
        #printSection {
          display: block !important;
          width: 210mm;
        }
        .cart-wrapper {
          margin: 0 auto 5px auto;
          page-break-inside: avoid;
        }
        .barcode-main-wrapper {
          display: inline-flex;
        }
      }

      footer div {
        font-size: 12px;
        color: #888888;
        text-align: center;
        opacity: 0.7;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container no-print">
      <h2>台南郵局運輸股-條碼產生器</h2>

      <div class="tabs">
        <div
          id="tab-standard"
          class="tab active"
          onclick="switchTab('standard')"
        >
          一般條碼
        </div>
        <div id="tab-cart" class="tab" onclick="switchTab('cart')">
          籃車條碼
        </div>
      </div>

      <div class="input-group">
        <label>請輸入條碼內容 (多個請換行)</label>
        <textarea
          id="userInput"
          rows="5"
          placeholder="例如：10600M00004512345678"
        ></textarea>
      </div>

      <div id="config-standard">
        <div class="row">
          <div>
            <label>寬 (cm)</label
            ><input type="number" id="widthCm" value="7" step="0.1" />
          </div>
          <div>
            <label>高 (cm)</label
            ><input type="number" id="heightCm" value="4" step="0.1" />
          </div>
          <div>
            <label>裁切邊框</label
            ><select id="borderSelect">
              <option value="none">否</option>
              <option value="dashed">是 (虛線)</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label>條碼上方備註內容(可自行增加)</label>
          <textarea
            id="memoInput"
            rows="3"
            placeholder="第一行：寄件人姓名&#10;第二行：聯絡電話&#10;第三行：寄件地址"
          ></textarea>
        </div>
      </div>

      <div id="config-cart" style="display: none">
        <p style="color: #d9534f; font-weight: bold">
          ※ 籃車模式：固定 9x2.5cm，支援長號碼自動縮放字體。
        </p>
      </div>

      <button class="btn-primary" onclick="generateBatchBarcodes()">
        產生批次預覽
      </button>

      <div class="button-group">
        <button class="btn-success" onclick="downloadAllAsImage()">
          下載圖片 (PNG)
        </button>
        <button class="btn-print" onclick="window.print()">開始列印</button>
      </div>
    </div>

    <div class="preview-area">
      <div id="printSection"></div>
    </div>

    <script>
      let currentMode = "standard";
      const printSection = document.getElementById("printSection");

      function switchTab(mode) {
        currentMode = mode;
        document.getElementById("tab-standard").className =
          "tab" + (mode === "standard" ? " active" : "");
        document.getElementById("tab-cart").className =
          "tab" + (mode === "cart" ? " active" : "");
        document.getElementById("config-standard").style.display =
          mode === "standard" ? "block" : "none";
        document.getElementById("config-cart").style.display =
          mode === "cart" ? "block" : "none";
      }

      function generateBatchBarcodes() {
        const codes = document
          .getElementById("userInput")
          .value.split("\n")
          .filter((c) => c.trim());
        printSection.innerHTML = "";
        if (!codes.length) return alert("請輸入內容");

        codes.forEach((code, index) => {
          if (currentMode === "standard") {
            renderStandard(code, index);
          } else {
            renderCart(code, index);
          }
        });

        // 核心：如果是籃車模式，生成後立即執行字體自動縮放計算
        if (currentMode === "cart") {
          document
            .querySelectorAll(".cart-left")
            .forEach((el) => adjustFontSize(el));
        }
      }

      function renderStandard(code, index) {
        const w = document.getElementById("widthCm").value,
          h = document.getElementById("heightCm").value;
        const hasBorder =
          document.getElementById("borderSelect").value !== "none";
        const memoText = document.getElementById("memoInput").value;

        const wrapper = document.createElement("div");
        wrapper.className =
          "barcode-main-wrapper" + (hasBorder ? " has-border" : "");
        wrapper.style.width = w + "cm";
        wrapper.style.height = h + "cm";

        const memoDiv = document.createElement("div");
        memoDiv.style.fontSize = "12px";
        if (memoText.trim()) {
          memoText.split("\n").forEach((line) => {
            const l = document.createElement("div");
            l.textContent = line;
            memoDiv.appendChild(l);
          });
        }
        wrapper.appendChild(memoDiv);

        const svg = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg",
        );
        svg.id = "bc-" + index;
        svg.className = "barcode-svg";
        wrapper.appendChild(svg);
        printSection.appendChild(wrapper);

        JsBarcode(svg, code, {
          format: "CODE128",
          width: 2,
          height: 40,
          displayValue: true,
          fontSize: 14,
        });
        svg.style.height = "calc(100% - " + memoDiv.offsetHeight + "px)";
      }

      function renderCart(code, index) {
        const wrapper = document.createElement("div");
        wrapper.className = "cart-wrapper";
        wrapper.innerHTML = `
            <div class="cart-left"><span>${code}</span></div>
            <div class="cart-right"><svg id="cart-svg-${index}"></svg></div>
        `;
        printSection.appendChild(wrapper);

        // 針對長代碼，條碼寬度自動變細以防溢出
        const barWidth = code.length > 15 ? 1 : 2;
        JsBarcode(`#cart-svg-${index}`, code, {
          format: "CODE128",
          width: barWidth,
          height: 50,
          displayValue: true,
          fontSize: 12,
          margin: 0,
        });
      }

      // --- 自動字體縮放函數 ---
      function adjustFontSize(container) {
        const span = container.querySelector("span");
        const maxWidth = container.offsetWidth - 10;
        let fontSize = 28; // 初始大字體

        span.style.fontSize = fontSize + "px";
        // 循環檢測文字寬度，直到文字能完全塞進左側空間
        while (span.offsetWidth > maxWidth && fontSize > 8) {
          fontSize -= 1;
          span.style.fontSize = fontSize + "px";
        }
      }

      async function downloadAllAsImage() {
        const canvas = await html2canvas(printSection, {
          scale: 2,
          backgroundColor: "#ffffff",
        });
        const link = document.createElement("a");
        link.download = `barcodes.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }
    </script>
    <footer>
      <div class="copyright">© 2025 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
