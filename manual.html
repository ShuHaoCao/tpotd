<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>駕駛與車輛知識手冊</title>
    <style>
      body {
        background-color: #0d1b2a;
        font-family: "Microsoft JhengHei", sans-serif;
        margin: 0;
        padding: 0 15px 15px 15px; /* 移除頂部 padding，交給 banner 容器處理 */
        color: #e0e1dd;
      }

      /* 📱 橫幅置頂與響應式設計 */
      .header-banner-container {
        position: sticky; /* 固定在最頂端 */
        top: 0;
        z-index: 999;
        background-color: #0d1b2a;
        padding: 15px 0;
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .header-banner {
        width: 100%; /* 手機版滿版 */
        max-width: 600px; /* 限制桌上型電腦下的最大寬度 */
        height: auto; /* 高度自適應 */
        display: block;
      }

      /* 📱 響應式網格佈局 */
      .grid-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        max-width: 900px; /* 👈 縮小最大寬度，避免桌機版無限延伸 */
        margin: 20px auto 40px; /* 增加上方間距，避免被置頂橫幅遮擋 */
      }

      @media (min-width: 600px) {
        .grid-container {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 950px) {
        .grid-container {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      /* 第一層：縮圖卡外框 */
      .manual-card {
        background: rgba(23, 27, 26, 0.95);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        display: flex;
        flex-direction: column;
      }

      .manual-card:active {
        transform: scale(0.97);
      }

      @media (min-width: 768px) {
        .manual-card:hover {
          transform: translateY(-4px);
          box-shadow:
            0 8px 25px rgba(22, 136, 103, 0.3),
            0 5px 15px rgba(0, 0, 0, 0.4);
        }
      }

      /* 縮圖容器 */
      .card-img-wrapper {
        position: relative;
        width: 100%;
        height: 170px;
        overflow: hidden;
        background: #1a1a1a;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      .card-img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* 右下角觀看次數標籤 */
      .card-views-badge {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.7);
        color: #ffffff;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 10px;
        font-weight: bold;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 4px;
        pointer-events: none;
      }

      /* 卡片文字區 */
      .card-info {
        padding: 14px;
        color: #0d1b2a;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        flex-grow: 1;
      }

      .card-info h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
        font-weight: bold;
        line-height: 1.45;
        color: #f9faf9;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-date {
        font-size: 12px;
        color: #666;
        font-weight: bold;
      }

      /* 第二層：滿版彈出燈箱 */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.88);
        z-index: 10000;
        display: none;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }

      .modal-content {
        background: white;
        padding: 10px 20px 20px;
        border-radius: 12px;
        max-width: 92%;
        max-height: 92vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 4px 25px rgba(0, 0, 0, 0.6);
      }

      .close-row {
        text-align: right;
        margin-bottom: 4px;
      }
      .close-btn {
        border: none;
        background: none;
        font-size: 26px;
        color: #888;
        cursor: pointer;
        padding: 4px 8px;
        transition: color 0.2s;
      }
      .close-btn:hover {
        color: #000;
      }

      .modal-content img {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 78vh;
        object-fit: contain;
        margin: 0 auto;
        image-rendering: -webkit-optimize-contrast;
      }

      .back-home-btn {
        display: block;
        width: 160px;
        margin: 30px auto;
        padding: 10px 20px;
        background: rgba(22, 136, 103, 0.2);
        border: 1px solid rgba(22, 136, 103, 0.5);
        color: #ffffff;
        text-align: center;
        text-decoration: none;
        border-radius: 20px;
        font-size: 15px;
        font-weight: bold;
        transition: all 0.3s;
      }
      .back-home-btn:hover {
        background: rgba(22, 136, 103, 0.8);
        box-shadow: 0 0 12px rgba(22, 136, 103, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="header-banner-container">
      <img
        src="manual_banner_s.png"
        alt="駕駛與車輛知識手冊"
        class="header-banner"
      />
    </div>

    <div class="grid-container" id="card-shelf"></div>

    <a href="index.html" class="back-home-btn">🔙 返回主選單</a>

    <div id="bigImageModal" class="modal-overlay" onclick="closeModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="close-row">
          <button class="close-btn" onclick="closeModal()">✖</button>
        </div>
        <img id="modal-target-img" src="" alt="詳細宣導圖卡" />
      </div>
    </div>

    <script>
      const FIREBASE_URL =
        "https://tnpsot-default-rtdb.asia-southeast1.firebasedatabase.app/";
      let localViewCounts = {};

      document.addEventListener("DOMContentLoaded", () => {
        Promise.all([
          fetch("manual.json?t=" + new Date().getTime()).then((res) => {
            if (!res.ok) throw new Error("手冊資料讀取失敗");
            return res.json();
          }),
          fetch(`${FIREBASE_URL}views.json`)
            .then((res) => res.json())
            .catch(() => ({})),
        ])
          .then(([jsonData, firebaseData]) => {
            const shelf = document.getElementById("card-shelf");
            shelf.innerHTML = "";
            localViewCounts = firebaseData || {};

            jsonData.cards.forEach((card) => {
              const views = localViewCounts[card.id] || 0;
              const cardHtml = `
              <div class="manual-card" onclick="openModal('${card.id}', '${card.fullImage}')">
                <div class="card-img-wrapper">
                  <img src="${card.thumb}" alt="${card.title}" loading="lazy">
                  <div class="card-views-badge" id="view-count-${card.id}">👁 ${views}</div>
                </div>
                <div class="card-info">
                  <h3>${card.title}</h3>
                  <span class="card-date">更新時間：${card.date}</span>
                </div>
              </div>
            `;
              shelf.innerHTML += cardHtml;
            });
          })
          .catch((err) => {
            console.error(err);
            document.getElementById("card-shelf").innerHTML =
              '<p style="text-align:center; color:#ff4d4d; width:100%;">系統資源加載失敗，請稍後再試。</p>';
          });
      });

      function openModal(cardId, imgSrc) {
        const modalImg = document.getElementById("modal-target-img");
        modalImg.src = imgSrc;
        document.getElementById("bigImageModal").style.display = "flex";

        const currentViews = (localViewCounts[cardId] || 0) + 1;
        localViewCounts[cardId] = currentViews;

        const badge = document.getElementById(`view-count-${cardId}`);
        if (badge) badge.innerText = `👁 ${currentViews}`;

        fetch(`${FIREBASE_URL}views/${cardId}.json`, {
          method: "PUT",
          body: JSON.stringify(currentViews),
        }).catch((err) => console.error("Firebase 同步失敗:", err));
      }

      function closeModal() {
        document.getElementById("bigImageModal").style.display = "none";
        document.getElementById("modal-target-img").src = "";
      }
    </script>
  </body>
</html>
