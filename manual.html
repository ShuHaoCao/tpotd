<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>駕駛與車輛知識手冊</title>
    <style>
      :root {
        --bg: #07111d;
        --bg-2: #0d1b2a;
        --panel: rgba(13, 27, 42, 0.76);
        --panel-strong: rgba(16, 32, 49, 0.94);
        --line: rgba(255, 255, 255, 0.12);
        --line-strong: rgba(137, 196, 244, 0.28);
        --text: #f5f7fb;
        --muted: #aebbd0;
        --soft: #dbe7f7;
        --gold: #ffd166;
        --cyan: #55d6ff;
        --green: #5ef2b4;
        --shadow: 0 22px 60px rgba(0, 0, 0, 0.38);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        font-family:
          "Microsoft JhengHei",
          "Noto Sans TC",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(
            circle at 18% 12%,
            rgba(85, 214, 255, 0.18),
            transparent 31vw
          ),
          radial-gradient(
            circle at 85% 5%,
            rgba(94, 242, 180, 0.12),
            transparent 25vw
          ),
          linear-gradient(135deg, #07111d 0%, #0d1b2a 45%, #08131f 100%);
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.035) 1px,
            transparent 1px
          );
        background-size: 42px 42px;
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.9),
          transparent 85%
        );
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          linear-gradient(
            115deg,
            transparent 0 42%,
            rgba(255, 255, 255, 0.045) 43%,
            transparent 44% 100%
          ),
          radial-gradient(
            circle at 50% 110%,
            rgba(255, 209, 102, 0.08),
            transparent 35%
          );
      }

      .page-shell {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 18px 0 38px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 999;
        margin-inline: calc((100% - min(1180px, calc(100vw - 28px))) / -2);
        padding: 12px 14px;
        background: rgba(7, 17, 29, 0.72);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .topbar-inner {
        width: min(1180px, calc(100% - 0px));
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .brand-dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--green), var(--cyan));
        box-shadow: 0 0 18px rgba(85, 214, 255, 0.65);
        flex: 0 0 auto;
      }

      .brand-pill span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.92rem;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      .top-home-btn {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 40px;
        padding: 9px 14px;
        border: 1px solid rgba(94, 242, 180, 0.3);
        border-radius: 999px;
        color: #ecfff8;
        text-decoration: none;
        font-weight: 900;
        font-size: 0.92rem;
        background: rgba(94, 242, 180, 0.1);
        transition:
          transform 0.18s ease,
          background 0.18s ease,
          border-color 0.18s ease;
      }

      .top-home-btn:hover {
        transform: translateY(-2px);
        background: rgba(94, 242, 180, 0.18);
        border-color: rgba(94, 242, 180, 0.52);
      }

      .hero {
        position: relative;
        overflow: hidden;
        margin-top: 20px;
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.13),
            rgba(255, 255, 255, 0.05)
          ),
          rgba(13, 27, 42, 0.7);
        box-shadow: var(--shadow);
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: -2px;
        background:
          radial-gradient(
            circle at 18% 22%,
            rgba(85, 214, 255, 0.26),
            transparent 32%
          ),
          radial-gradient(
            circle at 83% 16%,
            rgba(255, 209, 102, 0.18),
            transparent 28%
          ),
          linear-gradient(
            105deg,
            transparent 0 55%,
            rgba(255, 255, 255, 0.08) 56%,
            transparent 57% 100%
          );
        pointer-events: none;
      }

      .hero-inner {
        position: relative;
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 24px;
        align-items: center;
        padding: clamp(22px, 4vw, 42px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        margin-bottom: 12px;
        padding: 8px 12px;
        border: 1px solid rgba(255, 209, 102, 0.28);
        border-radius: 999px;
        color: #fff1bc;
        background: rgba(255, 209, 102, 0.08);
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4.35rem);
        line-height: 1.02;
        letter-spacing: -0.06em;
      }

      .hero-lead {
        max-width: 630px;
        margin: 16px 0 0;
        color: var(--soft);
        font-size: clamp(1rem, 2.2vw, 1.16rem);
        line-height: 1.85;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }

      .hero-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: #eef7ff;
        background: rgba(255, 255, 255, 0.07);
        font-weight: 800;
        font-size: 0.88rem;
      }

      .banner-frame {
        position: relative;
        border-radius: 24px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        background: rgba(255, 255, 255, 0.07);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .header-banner {
        width: 100%;
        min-height: 160px;
        max-height: 330px;
        object-fit: cover;
        display: block;
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.2);
      }

      .dashboard {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        margin: 18px 0;
      }

      .search-box {
        position: relative;
      }

      .search-box input {
        width: 100%;
        min-height: 52px;
        padding: 0 48px 0 48px;
        border: 1px solid var(--line);
        border-radius: 999px;
        outline: none;
        color: var(--text);
        background: rgba(255, 255, 255, 0.075);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        font-size: 1rem;
        font-weight: 700;
      }

      .search-box input::placeholder {
        color: rgba(219, 231, 247, 0.62);
      }

      .search-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--cyan);
        font-size: 1.1rem;
      }

      .counter-card {
        min-height: 52px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 0 16px;
        border: 1px solid rgba(85, 214, 255, 0.22);
        border-radius: 999px;
        color: #eaf9ff;
        background: rgba(85, 214, 255, 0.09);
        white-space: nowrap;
        font-weight: 900;
      }

      .grid-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: clamp(14px, 2.2vw, 22px);
        margin: 12px auto 36px;
      }

      @media (min-width: 640px) {
        .grid-container {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (min-width: 1040px) {
        .grid-container {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      .manual-card {
        position: relative;
        overflow: hidden;
        min-height: 100%;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: var(--radius-lg);
        cursor: pointer;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.1),
            rgba(255, 255, 255, 0.045)
          ),
          rgba(13, 27, 42, 0.78);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
        display: flex;
        flex-direction: column;
        isolation: isolate;
        transform: translateZ(0);
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease,
          border-color 0.22s ease;
      }

      .manual-card::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background: linear-gradient(
          120deg,
          transparent 0 44%,
          rgba(255, 255, 255, 0.12) 50%,
          transparent 56% 100%
        );
        transform: translateX(-120%);
        transition: transform 0.65s ease;
      }

      .manual-card:hover {
        transform: translateY(-7px);
        border-color: rgba(85, 214, 255, 0.38);
        box-shadow:
          0 24px 58px rgba(0, 0, 0, 0.42),
          0 0 28px rgba(85, 214, 255, 0.11);
      }

      .manual-card:hover::before {
        transform: translateX(120%);
      }

      .manual-card:active {
        transform: scale(0.985);
      }

      .card-img-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 10;
        overflow: hidden;
        background: linear-gradient(135deg, #172536, #08111c);
      }

      .card-img-wrapper img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        transform: scale(1.01);
        transition:
          transform 0.4s ease,
          filter 0.4s ease;
      }

      .manual-card:hover .card-img-wrapper img {
        transform: scale(1.075);
        filter: saturate(1.12) contrast(1.05);
      }

      .card-img-wrapper::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent 35%,
          rgba(5, 12, 21, 0.72)
        );
        pointer-events: none;
      }

      .card-views-badge {
        position: absolute;
        right: 12px;
        bottom: 12px;
        z-index: 3;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        color: #fff;
        background: rgba(5, 12, 21, 0.72);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.02em;
        pointer-events: none;
      }

      .card-info {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        gap: 14px;
        padding: 16px 16px 18px;
      }

      .card-info h3 {
        margin: 0;
        color: #f8fbff;
        font-size: clamp(1.02rem, 2.5vw, 1.16rem);
        line-height: 1.48;
        letter-spacing: 0.01em;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: auto;
      }

      .card-date {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .read-more {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: #dffcff;
        font-size: 0.78rem;
        font-weight: 950;
      }

      .empty-state,
      .error-state {
        grid-column: 1 / -1;
        padding: 26px 18px;
        border: 1px dashed rgba(255, 255, 255, 0.22);
        border-radius: var(--radius-lg);
        text-align: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.06);
      }

      .back-home-btn {
        width: min(280px, 100%);
        min-height: 50px;
        margin: 8px auto 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid rgba(255, 209, 102, 0.36);
        border-radius: 999px;
        color: #fff7d9;
        text-align: center;
        text-decoration: none;
        background: rgba(255, 209, 102, 0.1);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
        font-size: 1rem;
        font-weight: 950;
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          border-color 0.2s ease;
      }

      .back-home-btn:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 209, 102, 0.66);
        background: rgba(255, 209, 102, 0.17);
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(2, 7, 13, 0.86);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .modal-overlay.is-open {
        display: flex;
      }

      .modal-content {
        width: min(1120px, 100%);
        height: min(92vh, 980px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 24px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.1),
            rgba(255, 255, 255, 0.04)
          ),
          rgba(13, 27, 42, 0.96);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.62);
      }

      .close-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 12px;
        padding: 10px 12px 10px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .modal-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--soft);
        font-size: 0.92rem;
        font-weight: 900;
      }

      .zoom-toolbar {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 5px;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
      }

      .zoom-btn,
      .close-btn {
        width: 42px;
        height: 42px;
        flex: 0 0 auto;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
        font-size: 1.08rem;
        font-weight: 950;
        transition:
          transform 0.18s ease,
          background 0.18s ease;
      }

      .zoom-btn:hover,
      .close-btn:hover {
        transform: scale(1.04);
        background: rgba(255, 255, 255, 0.16);
      }

      .close-btn:hover {
        transform: rotate(90deg) scale(1.04);
      }

      .zoom-value {
        min-width: 58px;
        text-align: center;
        color: #eaf9ff;
        font-size: 0.86rem;
        font-weight: 950;
      }

      .modal-img-wrap {
        position: relative;
        min-height: 0;
        flex: 1 1 auto;
        padding: 0;
        overflow: hidden;
        text-align: center;
        cursor: grab;
        overscroll-behavior: contain;
        touch-action: none;
        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(85, 214, 255, 0.08),
            transparent 38%
          ),
          rgba(2, 7, 13, 0.2);
      }

      .modal-img-wrap.is-dragging {
        cursor: grabbing;
        user-select: none;
      }

      .modal-content img {
        position: absolute;
        left: 0;
        top: 0;
        display: block;
        width: auto;
        height: auto;
        max-width: none;
        max-height: none;
        margin: 0;
        object-fit: contain;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.92);
        image-rendering: -webkit-optimize-contrast;
        transform-origin: 0 0;
        will-change: transform;
        opacity: 1;
      }

      .modal-content.is-loading .zoom-toolbar,
      .modal-content.is-loading .close-btn,
      .modal-content.is-loading .zoom-hint,
      .modal-content.is-loading img {
        visibility: hidden;
      }

      .image-loader {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: none;
        place-items: center;
        background: rgba(2, 7, 13, 0.28);
      }

      .modal-content.is-loading .image-loader {
        display: grid;
      }

      .loader-card {
        display: grid;
        place-items: center;
        gap: 12px;
        padding: 18px 22px;
        border: 1px solid rgba(85, 214, 255, 0.22);
        border-radius: 22px;
        color: #eaf9ff;
        background: rgba(13, 27, 42, 0.86);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
        font-weight: 950;
        letter-spacing: 0.04em;
      }

      .loader-spinner {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 4px solid rgba(255, 255, 255, 0.18);
        border-top-color: var(--cyan);
        animation: spinLoader 0.82s linear infinite;
      }

      @keyframes spinLoader {
        to {
          transform: rotate(360deg);
        }
      }

      .zoom-hint {
        padding: 7px 14px 12px;
        color: rgba(219, 231, 247, 0.72);
        text-align: center;
        font-size: 0.82rem;
        font-weight: 800;
      }

      @media (max-width: 820px) {
        .hero-inner {
          grid-template-columns: 1fr;
        }

        .banner-frame {
          order: -1;
        }

        .dashboard {
          grid-template-columns: 1fr;
        }

        .counter-card {
          width: 100%;
          justify-content: center;
        }
      }

      @media (max-width: 560px) {
        .page-shell {
          width: min(100% - 20px, 1180px);
          padding-top: 10px;
        }

        .topbar {
          padding: 9px 10px;
        }

        .brand-pill {
          padding: 8px 10px;
        }

        .brand-pill span {
          font-size: 0.8rem;
          letter-spacing: 0.03em;
        }

        .top-home-btn {
          min-height: 38px;
          padding: 8px 10px;
          font-size: 0.82rem;
        }

        .hero {
          margin-top: 12px;
          border-radius: 22px;
        }

        .hero-inner {
          padding: 16px;
          gap: 16px;
        }

        .header-banner {
          min-height: 118px;
        }

        .hero-lead {
          line-height: 1.72;
        }

        .search-box input {
          min-height: 48px;
          font-size: 0.94rem;
        }

        .card-info {
          padding: 14px;
        }

        .manual-card:hover {
          transform: none;
        }

        .modal-overlay {
          padding: 0;
        }

        .modal-content {
          width: 100%;
          height: 100dvh;
          max-height: none;
          border-radius: 0;
        }

        .close-row {
          grid-template-columns: minmax(0, 1fr) auto;
          padding: 8px 10px 8px 14px;
        }

        .zoom-toolbar {
          display: none;
        }

        .zoom-hint {
          display: none;
        }

        .close-row {
          grid-template-columns: minmax(0, 1fr) auto;
        }

        .zoom-toolbar {
          grid-column: 1 / -1;
          grid-row: 2;
          justify-content: center;
          width: 100%;
        }

        .zoom-btn,
        .close-btn {
          width: 38px;
          height: 38px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition: none !important;
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <div class="topbar">
        <div class="topbar-inner">
          <div class="brand-pill" aria-label="頁面標籤">
            <i class="brand-dot" aria-hidden="true"></i>
            <span>DRIVING KNOWLEDGE MANUAL</span>
          </div>
          <a href="index.html" class="top-home-btn">返回主選單</a>
        </div>
      </div>

      <section class="hero" aria-label="駕駛與車輛知識手冊主視覺">
        <div class="hero-inner">
          <div class="hero-copy">
            <div class="eyebrow">安全不是口號，是每一次上路前的校準</div>
            <h1>駕駛與車輛<br />知識手冊</h1>
            <p class="hero-lead">
              把零散的駕駛觀念，整理成一座清楚、沉穩、好閱讀的知識車庫。從方向盤、煞車、油門到車輛檢查，每張卡片都是上路前的一盞小燈。
            </p>
            <div class="hero-actions" aria-label="內容特色">
              <span class="hero-chip">🚗 車輛操作</span>
              <span class="hero-chip">🛡️ 安全觀念</span>
              <span class="hero-chip">📘 圖卡閱讀</span>
            </div>
          </div>
          <div class="banner-frame">
            <img
              src="manual_banner_s.png"
              alt="駕駛與車輛知識手冊"
              class="header-banner"
            />
          </div>
        </div>
      </section>

      <section class="dashboard" aria-label="手冊搜尋與統計">
        <label class="search-box" for="manualSearch">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            id="manualSearch"
            type="search"
            placeholder="搜尋主題，例如：方向盤、煞車、油門、離合器……"
            autocomplete="off"
          />
        </label>
        <div class="counter-card" id="cardCounter">載入中……</div>
      </section>

      <section
        class="grid-container"
        id="card-shelf"
        aria-live="polite"
      ></section>

      <a href="index.html" class="back-home-btn">🔙 返回主選單</a>
    </main>

    <div id="bigImageModal" class="modal-overlay" onclick="closeModal()">
      <div
        class="modal-content"
        onclick="event.stopPropagation()"
        role="dialog"
        aria-modal="true"
        aria-label="詳細宣導圖卡"
      >
        <div class="close-row">
          <div class="modal-title" id="modal-title">詳細宣導圖卡</div>
          <div class="zoom-toolbar" aria-label="圖片縮放控制">
            <button
              class="zoom-btn"
              type="button"
              onclick="zoomModalImage(-0.2)"
              aria-label="縮小圖片"
            >
              −
            </button>
            <span class="zoom-value" id="zoomValue">100%</span>
            <button
              class="zoom-btn"
              type="button"
              onclick="zoomModalImage(0.2)"
              aria-label="放大圖片"
            >
              ＋
            </button>
            <button
              class="zoom-btn"
              type="button"
              onclick="resetModalZoom()"
              aria-label="重設圖片大小"
            >
              ⟲
            </button>
          </div>
          <button
            class="close-btn"
            type="button"
            onclick="closeModal()"
            aria-label="關閉視窗"
          >
            ✕
          </button>
        </div>
        <div class="modal-img-wrap" id="modal-img-wrap">
          <img id="modal-target-img" src="" alt="詳細宣導圖卡" />
          <div class="image-loader" id="image-loader" aria-live="polite">
            <div class="loader-card">
              <div class="loader-spinner" aria-hidden="true"></div>
              <div>大圖載入中…</div>
            </div>
          </div>
        </div>
        <div class="zoom-hint">
          滑鼠滾輪可放大／縮小，拖曳可移動畫面，雙擊回到適合大小。
        </div>
      </div>
    </div>

    <script>
      const FIREBASE_URL =
        "https://tnpsot-default-rtdb.asia-southeast1.firebasedatabase.app/";

      let localViewCounts = {};
      let allCards = [];

      const shelf = document.getElementById("card-shelf");
      const searchInput = document.getElementById("manualSearch");
      const cardCounter = document.getElementById("cardCounter");
      const modal = document.getElementById("bigImageModal");
      const modalContent = modal.querySelector(".modal-content");
      const modalImg = document.getElementById("modal-target-img");
      const modalTitle = document.getElementById("modal-title");
      const modalImgWrap = document.getElementById("modal-img-wrap");
      const zoomValue = document.getElementById("zoomValue");

      let modalZoom = 1;
      let minModalZoom = 1;
      let modalTranslateX = 0;
      let modalTranslateY = 0;
      let isImageLoaded = false;
      const activePointers = new Map();
      let isDraggingImage = false;
      let dragStartX = 0;
      let dragStartY = 0;
      let startTranslateX = 0;
      let startTranslateY = 0;
      let pinchStartDistance = 0;
      let pinchStartZoom = 1;
      let pinchStartCenter = { x: 0, y: 0 };
      let pinchImagePoint = { x: 0, y: 0 };

      document.addEventListener("DOMContentLoaded", initManualPage);

      async function initManualPage() {
        try {
          const [jsonData, firebaseData] = await Promise.all([
            fetch("manual.json?t=" + new Date().getTime()).then((res) => {
              if (!res.ok) throw new Error("手冊資料讀取失敗");
              return res.json();
            }),
            fetch(`${FIREBASE_URL}views.json`)
              .then((res) => res.json())
              .catch(() => ({})),
          ]);

          localViewCounts = firebaseData || {};
          allCards = Array.isArray(jsonData.cards) ? jsonData.cards : [];
          renderCards(allCards);
          bindSearch();
        } catch (err) {
          console.error(err);
          shelf.innerHTML = `<div class="error-state">系統資源加載失敗，請稍後再試。<br />資料像雨刷卡住了，先別硬開。</div>`;
          cardCounter.textContent = "讀取失敗";
        }
      }

      function bindSearch() {
        searchInput.addEventListener("input", () => {
          const keyword = normalizeText(searchInput.value);
          const filteredCards = allCards.filter((card) => {
            const target = normalizeText(
              `${card.title || ""} ${card.date || ""}`,
            );
            return target.includes(keyword);
          });
          renderCards(filteredCards, keyword);
        });
      }

      function normalizeText(value) {
        return String(value || "")
          .trim()
          .toLowerCase();
      }

      function renderCards(cards, keyword = "") {
        shelf.innerHTML = "";
        cardCounter.textContent = keyword
          ? `找到 ${cards.length} 張圖卡`
          : `共 ${cards.length} 張知識圖卡`;

        if (!cards.length) {
          shelf.innerHTML = `<div class="empty-state">沒有找到符合的主題。換個關鍵字試試，別讓知識卡在路肩。</div>`;
          return;
        }

        const fragment = document.createDocumentFragment();

        cards.forEach((card) => {
          const views = localViewCounts[card.id] || 0;
          const article = document.createElement("article");
          article.className = "manual-card";
          article.tabIndex = 0;
          article.setAttribute("role", "button");
          article.setAttribute("aria-label", `開啟${card.title}`);
          article.addEventListener("click", () =>
            openModal(card.id, card.fullImage, card.title),
          );
          article.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openModal(card.id, card.fullImage, card.title);
            }
          });

          article.innerHTML = `
            <div class="card-img-wrapper">
              <img src="${escapeAttr(card.thumb)}" alt="${escapeAttr(card.title)}" loading="lazy" />
              <div class="card-views-badge" id="view-count-${escapeAttr(card.id)}">👁 ${views}</div>
            </div>
            <div class="card-info">
              <h3>${escapeHTML(card.title)}</h3>
              <div class="card-meta-row">
                <span class="card-date">🕒 更新：${escapeHTML(card.date || "未標示")}</span>
                <span class="read-more">閱讀 →</span>
              </div>
            </div>
          `;

          fragment.appendChild(article);
        });

        shelf.appendChild(fragment);
      }

      function openModal(cardId, imgSrc, title = "詳細宣導圖卡") {
        modalTitle.textContent = title;
        modalImg.alt = title;
        modal.classList.add("is-open");
        modalContent.classList.add("is-loading");
        document.body.style.overflow = "hidden";
        resetImageState();

        modalImg.onload = () => {
          isImageLoaded = true;
          fitImageToModal();
          modalContent.classList.remove("is-loading");
        };
        modalImg.onerror = () => {
          modalContent.classList.remove("is-loading");
          modalTitle.textContent = "大圖載入失敗，請稍後再試";
        };
        modalImg.src = imgSrc;

        const currentViews = (localViewCounts[cardId] || 0) + 1;
        localViewCounts[cardId] = currentViews;

        const badge = document.getElementById(`view-count-${cardId}`);
        if (badge) badge.innerText = `👁 ${currentViews}`;

        fetch(`${FIREBASE_URL}views/${cardId}.json`, {
          method: "PUT",
          body: JSON.stringify(currentViews),
        }).catch((err) => console.error("Firebase 同步失敗:", err));
      }

      function closeModal() {
        modal.classList.remove("is-open");
        modalContent.classList.remove("is-loading");
        modalImg.onload = null;
        modalImg.onerror = null;
        modalImg.src = "";
        document.body.style.overflow = "";
        resetImageState();
      }

      function resetImageState() {
        isImageLoaded = false;
        modalZoom = 1;
        minModalZoom = 1;
        modalTranslateX = 0;
        modalTranslateY = 0;
        activePointers.clear();
        isDraggingImage = false;
        modalImgWrap.classList.remove("is-dragging");
        modalImg.style.transform = "translate3d(0, 0, 0) scale(1)";
        updateZoomValue();
      }

      function fitImageToModal() {
        if (!modalImg.naturalWidth || !modalImg.naturalHeight) return;

        const wrapRect = modalImgWrap.getBoundingClientRect();
        const scaleByWidth = wrapRect.width / modalImg.naturalWidth;
        const scaleByHeight = wrapRect.height / modalImg.naturalHeight;
        minModalZoom = Math.min(1, scaleByWidth, scaleByHeight);
        modalZoom = minModalZoom;
        modalTranslateX =
          (wrapRect.width - modalImg.naturalWidth * modalZoom) / 2;
        modalTranslateY =
          (wrapRect.height - modalImg.naturalHeight * modalZoom) / 2;
        applyModalTransform();
      }

      function applyModalTransform() {
        clampImagePosition();
        modalImg.style.transform = `translate3d(${modalTranslateX}px, ${modalTranslateY}px, 0) scale(${modalZoom})`;
        updateZoomValue();
      }

      function clampImagePosition() {
        const wrapRect = modalImgWrap.getBoundingClientRect();
        const scaledWidth = modalImg.naturalWidth * modalZoom;
        const scaledHeight = modalImg.naturalHeight * modalZoom;

        if (scaledWidth <= wrapRect.width) {
          modalTranslateX = (wrapRect.width - scaledWidth) / 2;
        } else {
          modalTranslateX = Math.min(
            0,
            Math.max(wrapRect.width - scaledWidth, modalTranslateX),
          );
        }

        if (scaledHeight <= wrapRect.height) {
          modalTranslateY = (wrapRect.height - scaledHeight) / 2;
        } else {
          modalTranslateY = Math.min(
            0,
            Math.max(wrapRect.height - scaledHeight, modalTranslateY),
          );
        }
      }

      function zoomTo(newZoom, centerX, centerY) {
        if (!isImageLoaded) return;
        const maxZoom = Math.max(minModalZoom * 6, 3);
        const nextZoom = Math.min(maxZoom, Math.max(minModalZoom, newZoom));
        const imageX = (centerX - modalTranslateX) / modalZoom;
        const imageY = (centerY - modalTranslateY) / modalZoom;
        modalZoom = nextZoom;
        modalTranslateX = centerX - imageX * modalZoom;
        modalTranslateY = centerY - imageY * modalZoom;
        applyModalTransform();
      }

      function zoomModalImage(delta) {
        const rect = modalImgWrap.getBoundingClientRect();
        zoomTo(modalZoom + delta, rect.width / 2, rect.height / 2);
      }

      function resetModalZoom() {
        if (!isImageLoaded) return;
        fitImageToModal();
      }

      function updateZoomValue() {
        if (zoomValue)
          zoomValue.textContent = `${Math.round(modalZoom * 100)}%`;
      }

      modalImgWrap.addEventListener(
        "wheel",
        (event) => {
          if (!modal.classList.contains("is-open") || !isImageLoaded) return;
          event.preventDefault();
          const rect = modalImgWrap.getBoundingClientRect();
          const centerX = event.clientX - rect.left;
          const centerY = event.clientY - rect.top;
          const factor = event.deltaY > 0 ? 0.9 : 1.1;
          zoomTo(modalZoom * factor, centerX, centerY);
        },
        { passive: false },
      );

      modalImgWrap.addEventListener("dblclick", () => resetModalZoom());

      modalImgWrap.addEventListener("pointerdown", (event) => {
        if (!modal.classList.contains("is-open") || !isImageLoaded) return;
        event.preventDefault();
        activePointers.set(event.pointerId, {
          x: event.clientX,
          y: event.clientY,
        });
        modalImgWrap.setPointerCapture(event.pointerId);

        if (activePointers.size === 1) {
          isDraggingImage = true;
          dragStartX = event.clientX;
          dragStartY = event.clientY;
          startTranslateX = modalTranslateX;
          startTranslateY = modalTranslateY;
          modalImgWrap.classList.add("is-dragging");
        }

        if (activePointers.size === 2) {
          const points = [...activePointers.values()];
          pinchStartDistance = getPointerDistance(points[0], points[1]);
          pinchStartZoom = modalZoom;
          pinchStartCenter = getPointerCenter(points[0], points[1]);
          const rect = modalImgWrap.getBoundingClientRect();
          const localCenterX = pinchStartCenter.x - rect.left;
          const localCenterY = pinchStartCenter.y - rect.top;
          pinchImagePoint = {
            x: (localCenterX - modalTranslateX) / modalZoom,
            y: (localCenterY - modalTranslateY) / modalZoom,
          };
        }
      });

      modalImgWrap.addEventListener("pointermove", (event) => {
        if (!activePointers.has(event.pointerId) || !isImageLoaded) return;
        event.preventDefault();
        activePointers.set(event.pointerId, {
          x: event.clientX,
          y: event.clientY,
        });

        if (activePointers.size === 2) {
          const points = [...activePointers.values()];
          const distance = getPointerDistance(points[0], points[1]);
          const center = getPointerCenter(points[0], points[1]);
          const rect = modalImgWrap.getBoundingClientRect();
          const localCenterX = center.x - rect.left;
          const localCenterY = center.y - rect.top;
          const maxZoom = Math.max(minModalZoom * 6, 3);
          modalZoom = Math.min(
            maxZoom,
            Math.max(
              minModalZoom,
              pinchStartZoom * (distance / Math.max(pinchStartDistance, 1)),
            ),
          );
          modalTranslateX = localCenterX - pinchImagePoint.x * modalZoom;
          modalTranslateY = localCenterY - pinchImagePoint.y * modalZoom;
          applyModalTransform();
          return;
        }

        if (isDraggingImage && activePointers.size === 1) {
          modalTranslateX = startTranslateX + (event.clientX - dragStartX);
          modalTranslateY = startTranslateY + (event.clientY - dragStartY);
          applyModalTransform();
        }
      });

      modalImgWrap.addEventListener("pointerup", endImagePointer);
      modalImgWrap.addEventListener("pointercancel", endImagePointer);

      function endImagePointer(event) {
        activePointers.delete(event.pointerId);
        if (!activePointers.size) {
          isDraggingImage = false;
          modalImgWrap.classList.remove("is-dragging");
          return;
        }
        if (activePointers.size === 1) {
          const point = [...activePointers.values()][0];
          isDraggingImage = true;
          dragStartX = point.x;
          dragStartY = point.y;
          startTranslateX = modalTranslateX;
          startTranslateY = modalTranslateY;
        }
      }

      function getPointerDistance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function getPointerCenter(a, b) {
        return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
      }

      window.addEventListener("resize", () => {
        if (modal.classList.contains("is-open") && isImageLoaded)
          fitImageToModal();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && modal.classList.contains("is-open")) {
          closeModal();
        }
      });

      function escapeHTML(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHTML(value);
      }
    </script>
  </body>
</html>
