<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>華爾街之狼：財富自由</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style_stock.css" />
  </head>
  <body>
    <script src="script_stock.js"></script>
    <div id="login-overlay">
      <div class="login-box">
        <h2 style="color: var(--accent)">華爾街之狼：財富自由</h2>
        <p>請輸入您的交易員代號：</p>
        <input
          type="text"
          id="player-name-input"
          placeholder="例如：巴菲特"
          maxlength="10"
        />
        <button class="btn-start" onclick="startGame()">開始挑戰</button>
      </div>
    </div>

    <div class="header">
      <div class="player-info">
        交易員：<span id="display-player-name">---</span>
      </div>
      <button class="rank-trigger" onclick="showLeaderboard()">
        🏆 排行榜
      </button>
      <div id="timer">24:00:00</div>
      <div class="next-refresh">
        距離行情更新：<span id="next-update">03:00</span>
      </div>
    </div>

    <div class="dashboard">
      <div class="stat">
        <div class="stat-label">總資產 (USD)</div>
        <div id="total-assets" class="stat-val">$100,000</div>
      </div>
      <div class="stat">
        <div class="stat-label">可用現金</div>
        <div id="cash" class="stat-val">$100,000</div>
      </div>
    </div>

    <div class="table-container">
      <table class="market-table">
        <thead>
          <tr>
            <th style="text-align: left; padding-left: 20px">
              公司名稱 (點擊看趨勢)
            </th>
            <th>當前股價</th>
            <th>持有數量</th>
            <th>交易操作</th>
          </tr>
        </thead>
        <tbody id="stock-list"></tbody>
      </table>
    </div>

    <div id="modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal('modal')">&times;</span>
        <h3 id="modal-title" style="color: var(--accent); margin-top: 0"></h3>
        <canvas id="historyChart"></canvas>
      </div>
    </div>

    <div id="rank-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal('rank-modal')"
          >&times;</span
        >
        <h3 style="color: var(--accent); text-align: center">
          🏆 全球巔峰排行榜 (Top 10)
        </h3>
        <table class="rank-table">
          <thead>
            <tr>
              <th>排名</th>
              <th>玩家</th>
              <th>最終資產</th>
            </tr>
          </thead>
          <tbody id="rank-list"></tbody>
        </table>
      </div>
    </div>

    <footer>
      <div class="copyright">© 2025 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
