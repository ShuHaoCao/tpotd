<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>台南郵局運輸股-條碼產生器</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f7f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px;
        margin: 0;
        min-height: 100vh;
      }
      .container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        max-width: 800px;
        width: 100%;
        box-sizing: border-box;
      }
      h2 {
        text-align: center;
        font-size: 1.4rem;
        margin-top: 0;
        color: #333;
      }

      .tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 2px solid #ddd;
        width: 100%;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 12px 10px;
        cursor: pointer;
        background: #eee;
        border-radius: 8px 8px 0 0;
        margin-right: 2px;
        font-weight: bold;
        transition: 0.3s;
        font-size: 0.95rem;
      }
      .tab.active {
        background: #007bff;
        color: white;
      }

      .input-group {
        margin-bottom: 15px;
        text-align: left;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
        font-size: 0.9rem;
      }
      textarea,
      input,
      select {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        width: 100%;
        box-sizing: border-box;
        font-size: 16px;
      }

      .serial-tool {
        background: #e7f3ff;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #b8daff;
        margin-bottom: 15px;
      }
      .serial-tool-title {
        font-size: 0.9rem;
        color: #004085;
        margin-bottom: 10px;
        font-weight: bold;
        display: flex;
        align-items: center;
      }
      .serial-tool-title::before {
        content: "🔢";
        margin-right: 5px;
      }

      .row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .row > div {
        flex: 1;
        min-width: calc(25% - 10px);
      }
      @media (max-width: 600px) {
        .row > div {
          min-width: calc(50% - 10px);
        }
      }

      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 15px;
      }
      button {
        padding: 14px 10px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        flex: 1;
        min-width: 120px;
        font-weight: bold;
      }
      .btn-primary {
        background-color: #007bff;
        color: white;
        width: 100%;
        margin-bottom: 5px;
      }
      .btn-secondary {
        background-color: #17a2b8;
        color: white;
        padding: 8px;
        font-size: 0.9rem;
        width: 100%;
        margin-top: 5px;
      }
      .btn-success {
        background-color: #28a745;
        color: white;
      }
      .btn-print {
        background-color: #6c757d;
        color: white;
      }

      .preview-area {
        margin-top: 20px;
        padding: 15px;
        background: #eee;
        border-radius: 8px;
        width: 100%;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
      }
      #printSection {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }

      .barcode-main-wrapper {
        background: white;
        display: flex;
        flex-direction: column;
        padding: 5px;
        box-sizing: border-box;
        align-items: center;
      }
      /* QRCode 專用外框樣式 */
      .qrcode-wrapper {
        background: white;
        border: 1px solid #333; /* 邊框 */
        padding: 15px; /* 留白 */
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
      }

      .has-border {
        border: 1px dashed #ccc;
      }
      .barcode-svg {
        width: 100%;
        flex-grow: 1;
      }
      .cart-wrapper {
        background: white;
        width: 9cm;
        height: 2.5cm;
        display: flex;
        align-items: center;
        padding: 0 5px;
        box-sizing: border-box;
        border: 1px solid #002060;
        margin-bottom: 10px;
      }
      .cart-left {
        width: 4.2cm;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        overflow: hidden;
      }
      .cart-left span {
        font-size: 26px;
        white-space: nowrap;
      }
      .cart-right {
        width: 4.5cm;
        height: 2.2cm;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @media print {
        @page {
          size: A4;
          margin: 0;
        }
        .no-print {
          display: none !important;
        }
        #printSection {
          display: block !important;
          width: 210mm;
        }
        .barcode-main-wrapper,
        .qrcode-wrapper {
          display: inline-flex;
        }
      }
    </style>
  </head>
  <body>
    <div class="container no-print">
      <h2>台南郵局運輸股-條碼產生器</h2>

      <div class="tabs">
        <div
          id="tab-standard"
          class="tab active"
          onclick="switchTab('standard')"
        >
          一般條碼
        </div>
        <div id="tab-cart" class="tab" onclick="switchTab('cart')">
          籃車條碼
        </div>
        <div id="tab-qrcode" class="tab" onclick="switchTab('qrcode')">
          QRCode
        </div>
      </div>

      <div class="input-group">
        <label>待產生內容 (每行一筆)</label>
        <textarea
          id="userInput"
          rows="5"
          placeholder="請手動輸入內容"
        ></textarea>
      </div>

      <div id="config-standard">
        <div class="serial-tool">
          <div class="serial-tool-title">14 碼郵件流水號產生器</div>
          <div class="row">
            <div>
              <label>前 6 碼起始</label
              ><input type="number" id="serialStart" value="1" min="1" />
            </div>
            <div>
              <label>中 6 碼固定</label
              ><input type="text" id="midFix" value="704831" maxlength="6" />
            </div>
            <div>
              <label>尾 2 碼種類</label
              ><input type="text" id="endFix" value="70" maxlength="2" />
            </div>
            <div>
              <label>張數</label
              ><input type="number" id="serialCount" value="10" min="1" />
            </div>
          </div>
          <button class="btn-secondary" onclick="generateSpecialSerial()">
            快速填入 14 碼
          </button>
        </div>

        <div class="row">
          <div>
            <label>寬 (cm)</label
            ><input type="number" id="widthCm" value="7" step="0.1" />
          </div>
          <div>
            <label>高 (cm)</label
            ><input type="number" id="heightCm" value="4" step="0.1" />
          </div>
          <div>
            <label>裁切邊框</label>
            <select id="borderSelect">
              <option value="none">否</option>
              <option value="dashed">是 (虛線)</option>
            </select>
          </div>
        </div>
      </div>

      <div id="config-cart" style="display: none">
        <p
          style="
            color: #d9534f;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 15px;
          "
        >
          ※ 籃車模式：固定 9x2.5cm 規格，適合手動輸入籃車編號。
        </p>
      </div>

      <div id="config-qrcode" style="display: none">
        <div class="row">
          <div>
            <label>QRCode 尺寸 (cm)</label
            ><input type="number" id="qrSizeCm" value="4" step="0.1" />
          </div>
          <div>
            <label>顯示下方文字</label>
            <select id="qrTextSelect">
              <option value="yes">是</option>
              <option value="no">否</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label>Logo 圖片網址 (空白則不嵌入)</label>
          <input
            type="text"
            id="qrLogoUrl"
            value="https://www.post.gov.tw/post/favicon.ico"
            placeholder="請輸入圖片 URL"
          />
        </div>
      </div>

      <button class="btn-primary" onclick="generateBatchBarcodes()">
        產生預覽
      </button>

      <div class="button-group">
        <button class="btn-success" onclick="downloadAllAsImage()">
          下載圖片
        </button>
        <button class="btn-print" onclick="window.print()">開始列印</button>
      </div>
    </div>

    <div class="preview-area">
      <div id="printSection"></div>
    </div>

    <script>
      let currentMode = "standard";
      const printSection = document.getElementById("printSection");

      function switchTab(mode) {
        currentMode = mode;
        ["standard", "cart", "qrcode"].forEach((m) => {
          document.getElementById(`tab-${m}`).className =
            "tab" + (mode === m ? " active" : "");
          document.getElementById(`config-${m}`).style.display =
            mode === m ? "block" : "none";
        });
      }

      function generateSpecialSerial() {
        const start = parseInt(document.getElementById("serialStart").value);
        const mid = document
          .getElementById("midFix")
          .value.toString()
          .padStart(6, "0");
        const end = document
          .getElementById("endFix")
          .value.toString()
          .padStart(2, "0");
        const count = parseInt(document.getElementById("serialCount").value);
        let res = [];
        for (let i = 0; i < count; i++) {
          let first = (start + i).toString().padStart(6, "0");
          res.push(first + mid + end);
        }
        const input = document.getElementById("userInput");
        if (input.value.trim() && !confirm("確定要覆蓋輸入框現有內容嗎？"))
          return;
        input.value = res.join("\n");
      }

      function generateBatchBarcodes() {
        const codes = document
          .getElementById("userInput")
          .value.split("\n")
          .filter((c) => c.trim());
        printSection.innerHTML = "";
        if (!codes.length) return alert("請輸入內容");

        codes.forEach((code, i) => {
          if (currentMode === "standard") renderStandard(code, i);
          else if (currentMode === "cart") renderCart(code, i);
          else if (currentMode === "qrcode") renderQRCode(code, i);
        });
      }

      function renderStandard(code, i) {
        const w = document.getElementById("widthCm").value,
          h = document.getElementById("heightCm").value;
        const border = document.getElementById("borderSelect").value !== "none";
        const div = document.createElement("div");
        div.className = "barcode-main-wrapper" + (border ? " has-border" : "");
        div.style.width = w + "cm";
        div.style.height = h + "cm";
        const svg = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg",
        );
        div.appendChild(svg);
        printSection.appendChild(div);
        JsBarcode(svg, code, {
          format: "CODE128",
          width: 2,
          height: 50,
          displayValue: true,
          fontSize: 16,
        });
      }

      function renderCart(code, i) {
        const div = document.createElement("div");
        div.className = "cart-wrapper";
        div.innerHTML = `<div class="cart-left"><span>${code}</span></div><div class="cart-right"><svg id="cs-${i}"></svg></div>`;
        printSection.appendChild(div);
        JsBarcode(`#cs-${i}`, code, {
          format: "CODE128",
          width: 1,
          height: 50,
          displayValue: true,
          fontSize: 12,
          margin: 0,
        });
      }

      function renderQRCode(code, i) {
        const s = document.getElementById("qrSizeCm").value;
        const txt = document.getElementById("qrTextSelect").value === "yes";
        const logoUrl = document.getElementById("qrLogoUrl").value.trim();
        const pxSize = s * 37.8; // cm to px

        const div = document.createElement("div");
        div.className = "qrcode-wrapper"; // 使用具備邊框與內距的新樣式

        const qrContainer = document.createElement("div");
        qrContainer.id = "qrc-" + i;
        div.appendChild(qrContainer);

        if (txt) {
          const p = document.createElement("div");
          p.style.fontSize = "12px";
          p.style.marginTop = "8px";
          p.style.fontWeight = "bold";
          p.textContent = code;
          div.appendChild(p);
        }
        printSection.appendChild(div);

        // 產生基礎 QRCode
        const qrcode = new QRCode(qrContainer, {
          text: code,
          width: pxSize,
          height: pxSize,
          correctLevel: QRCode.CorrectLevel.H, // 提高容錯率以支援 Logo 遮擋
        });

        // 嵌入 Logo 邏輯
        if (logoUrl) {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.src = logoUrl;
          img.onload = function () {
            const qrCanvas = qrContainer.querySelector("canvas");
            if (qrCanvas) {
              const ctx = qrCanvas.getContext("2d");
              const logoSize = pxSize * 0.22; // Logo 佔比約 22%
              const x = (pxSize - logoSize) / 2;
              const y = (pxSize - logoSize) / 2;

              ctx.fillStyle = "#FFFFFF";
              ctx.fillRect(x - 2, y - 2, logoSize + 4, logoSize + 4);
              ctx.drawImage(img, x, y, logoSize, logoSize);
            }
          };
        }
      }

      async function downloadAllAsImage() {
        const canvas = await html2canvas(printSection, {
          scale: 2,
          useCORS: true,
        });
        const link = document.createElement("a");
        link.download = `郵件條碼標籤.png`;
        link.href = canvas.toDataURL();
        link.click();
      }
    </script>
    <footer>
      <div
        class="copyright"
        style="
          text-align: center;
          margin-top: 20px;
          font-size: 0.8rem;
          color: #888;
        "
      >
        © 2026 CaoShuHao 版權所有
      </div>
    </footer>
  </body>
</html>
