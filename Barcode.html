<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>台南郵局運輸股-條碼產生器</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background-color: #f4f7f6;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px;
        margin: 0;
        min-height: 100vh;
      }
      .container {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        max-width: 800px;
        width: 100%;
        box-sizing: border-box;
      }
      h2 {
        text-align: center;
        font-size: 1.4rem;
        margin-top: 0;
        color: #333;
      }

      .tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 2px solid #ddd;
        width: 100%;
        flex-wrap: wrap;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 12px 10px;
        cursor: pointer;
        background: #eee;
        border-radius: 8px 8px 0 0;
        margin-right: 2px;
        font-weight: bold;
        transition: 0.3s;
        font-size: 0.95rem;
        min-width: 80px;
      }
      .tab.active {
        background: #007bff;
        color: white;
      }

      .input-group {
        margin-bottom: 15px;
        text-align: left;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
        font-size: 0.9rem;
      }
      textarea,
      input,
      select {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        width: 100%;
        box-sizing: border-box;
        font-size: 16px;
      }

      .serial-tool {
        background: #e7f3ff;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #b8daff;
        margin-bottom: 15px;
      }
      .serial-tool-title {
        font-size: 0.9rem;
        color: #004085;
        margin-bottom: 10px;
        font-weight: bold;
        display: flex;
        align-items: center;
      }
      .serial-tool-title::before {
        content: "🔢";
        margin-right: 5px;
      }

      .row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .row > div {
        flex: 1;
        min-width: calc(25% - 10px);
      }
      @media (max-width: 600px) {
        .row > div {
          min-width: calc(50% - 10px);
        }
      }

      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 15px;
      }
      button {
        padding: 14px 10px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        flex: 1;
        min-width: 120px;
        font-weight: bold;
      }
      .btn-primary {
        background-color: #007bff;
        color: white;
        width: 100%;
        margin-bottom: 5px;
      }
      .btn-secondary {
        background-color: #17a2b8;
        color: white;
        padding: 8px;
        font-size: 0.9rem;
        width: 100%;
        margin-top: 5px;
      }
      .btn-success {
        background-color: #28a745;
        color: white;
      }
      .btn-print {
        background-color: #6c757d;
        color: white;
      }

      .preview-area {
        margin-top: 20px;
        padding: 15px;
        background: #eee;
        border-radius: 8px;
        width: 100%;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
      }
      #printSection {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }

      .barcode-main-wrapper {
        background: white;
        display: flex;
        flex-direction: column;
        padding: 5px;
        box-sizing: border-box;
        align-items: center;
      }
      .qrcode-wrapper {
        background: white;
        border: 1px solid #333;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
      }

      .has-border {
        border: 1px dashed #ccc !important;
      }
      .barcode-svg {
        width: 100%;
        flex-grow: 1;
      }
      .cart-wrapper {
        background: white;
        width: 9cm;
        height: 2.5cm;
        display: flex;
        align-items: center;
        padding: 0 5px;
        box-sizing: border-box;
        border: 1px solid #002060;
        margin-bottom: 10px;
      }
      .cart-left {
        width: 4.2cm;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        overflow: hidden;
      }
      .cart-left span {
        font-size: 26px;
        white-space: nowrap;
      }
      .cart-right {
        width: 4.5cm;
        height: 2.2cm;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ======== 郵政條碼貼紙專用樣式 ======== */
      .sticker-wrapper {
        width: 6.5cm;
        height: 4.6cm;
        background: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* 將 justify-content 改為 flex-start，讓內容從頂部開始排，不要擠在正中間 */
        justify-content: flex-start;
        box-sizing: border-box;
        /* 調整內距：上方保留約 4mm 的空間，讓第一行靠上一點 */
        padding: 4mm 2mm 2mm 2mm;
        border: 1px solid transparent;
      }
      .sticker-line1 {
        font-size: 14px;
        font-weight: bold;
        /* 大幅增加下邊距，製造出「空一行」的視覺效果 */
        margin-bottom: 12px;
        letter-spacing: 0px;
      }
      .sticker-line2 {
        font-size: 15px;
        font-weight: bold;
        margin-bottom: 5px;
        letter-spacing: 0px;
      }
      .sticker-line3 {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 5px;
        letter-spacing: 0px;
      }
      .sticker-line4-barcode {
        width: 4.2cm; /* 稍微加寬讓條碼線條不那麼擠 */
        height: 1.8cm; /* 將高度從 1.5cm 增加到 1.8cm，讓容器變高 */
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 2px;
      }
      .sticker-line4-barcode svg {
        width: 100%;
        height: 100%;
      }
      .sticker-line5 {
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 0px;
      }

      /* 套用紙張格線設定 */
      .layout-a4 {
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
      }
      .layout-grid-18 {
        display: flex;
        flex-wrap: wrap;
        width: 21cm;
        /* A4紙張扣除些微誤差，強制對齊 */
      }
      .cell-18 {
        width: 7cm;
        height: 4.95cm;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        overflow: hidden;
      }

      @media print {
        @page {
          size: A4;
          margin: 0;
        }
        body {
          background-color: white;
        }
        .no-print {
          display: none !important;
        }
        .preview-area {
          margin: 0;
          padding: 0;
          background: transparent;
        }
        #printSection {
          display: flex !important;
          width: 210mm;
        }
        .barcode-main-wrapper,
        .qrcode-wrapper,
        .sticker-wrapper {
          display: inline-flex;
        }
      }
    </style>
  </head>
  <body>
    <div class="container no-print">
      <h2>台南郵局運輸股-條碼產生器</h2>

      <div class="tabs">
        <div
          id="tab-standard"
          class="tab active"
          onclick="switchTab('standard')"
        >
          一般條碼
        </div>
        <div id="tab-cart" class="tab" onclick="switchTab('cart')">
          籃車條碼
        </div>
        <div id="tab-qrcode" class="tab" onclick="switchTab('qrcode')">
          QRCode
        </div>
        <div id="tab-sticker" class="tab" onclick="switchTab('sticker')">
          郵政條碼貼紙
        </div>
      </div>

      <div id="common-input-group" class="input-group">
        <label>待產生內容 (每行一筆)</label>
        <textarea
          id="userInput"
          rows="5"
          placeholder="請手動輸入內容"
        ></textarea>
      </div>

      <div id="config-standard">
        <div class="serial-tool">
          <div class="serial-tool-title">14 碼郵件流水號產生器</div>
          <div class="row">
            <div>
              <label>前 6 碼起始</label
              ><input type="number" id="serialStart" value="1" min="1" />
            </div>
            <div>
              <label>中 6 碼固定</label
              ><input type="text" id="midFix" value="704831" maxlength="6" />
            </div>
            <div>
              <label>尾 2 碼種類</label
              ><input type="text" id="endFix" value="70" maxlength="2" />
            </div>
            <div>
              <label>張數</label
              ><input type="number" id="serialCount" value="10" min="1" />
            </div>
          </div>
          <button class="btn-secondary" onclick="generateSpecialSerial()">
            快速填入 14 碼
          </button>
        </div>

        <div class="row">
          <div>
            <label>寬 (cm)</label
            ><input type="number" id="widthCm" value="7" step="0.1" />
          </div>
          <div>
            <label>高 (cm)</label
            ><input type="number" id="heightCm" value="4" step="0.1" />
          </div>
          <div>
            <label>裁切邊框</label>
            <select id="borderSelect">
              <option value="none">否</option>
              <option value="dashed">是 (虛線)</option>
            </select>
          </div>
        </div>
      </div>

      <div id="config-cart" style="display: none">
        <p
          style="
            color: #d9534f;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 15px;
          "
        >
          ※ 籃車模式：固定 9x2.5cm 規格，適合手動輸入籃車編號。
        </p>
      </div>

      <div id="config-qrcode" style="display: none">
        <div class="row">
          <div>
            <label>QRCode 尺寸 (cm)</label
            ><input type="number" id="qrSizeCm" value="4" step="0.1" />
          </div>
          <div>
            <label>顯示下方文字</label>
            <select id="qrTextSelect">
              <option value="yes">是</option>
              <option value="no">否</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label>Logo 圖片網址 (空白則不嵌入)</label>
          <input
            type="text"
            id="qrLogoUrl"
            value="https://www.post.gov.tw/post/favicon.ico"
            placeholder="請輸入圖片 URL"
          />
        </div>
      </div>

      <div id="config-sticker" style="display: none">
        <div class="row">
          <div>
            <label>郵件種類</label>
            <select id="stickerMailType"></select>
          </div>
          <div>
            <label>收寄單位</label>
            <select id="stickerOffice"></select>
          </div>
        </div>

        <div class="serial-tool">
          <div class="serial-tool-title">條碼設定 (單張列印請將張數設為1)</div>
          <div class="row">
            <div>
              <label>起始流水號 (前6碼)</label>
              <input
                type="number"
                id="stickerSerialStart"
                value="936157"
                min="0"
                max="999999"
              />
            </div>
            <div>
              <label>產生張數</label>
              <input type="number" id="stickerCount" value="1" min="1" />
            </div>
            <div>
              <label>裁切外框</label>
              <select id="stickerBorder">
                <option value="none">否 (空白)</option>
                <option value="dashed">是 (虛線外框)</option>
              </select>
            </div>
            <div>
              <label>套用紙張</label>
              <select id="stickerPaper">
                <option value="a4">A4 (空白連續印)</option>
                <option value="grid18">18格，3欄6列(A4貼紙紙)</option>
              </select>
            </div>
          </div>
        </div>
        <p
          style="
            color: #666;
            font-size: 0.85rem;
            margin-top: -5px;
            margin-bottom: 15px;
          "
        >
          ※ 貼紙規格固定為 6.5cm x 4.6cm，條碼區塊固定 4cm x 1.5cm。
        </p>
      </div>

      <button class="btn-primary" onclick="generateBatchBarcodes()">
        產生預覽
      </button>

      <div class="button-group">
        <button class="btn-success" onclick="downloadAllAsImage()">
          下載圖片
        </button>
        <button class="btn-print" onclick="window.print()">開始列印</button>
      </div>
    </div>

    <div class="preview-area">
      <div id="printSection"></div>
    </div>

    <script>
      // ================= 資料設定區 (方便日後新增/刪除) =================
      const mailTypesData = [
        { name: "郵政公事普通掛號函件", code: "00" },
        { name: "普通掛號函件", code: "10" },
        { name: "限時掛號函件", code: "20" },
        { name: "普通包裹", code: "30" },
        { name: "快捷包裹", code: "40" },
      ];

      const postOfficesData = [
        { name: "臺南成功路郵局營收股", code: "704451" },
        { name: "臺南郵局郵務科運輸股", code: "704000" },
        { name: "臺南鹽埕郵局", code: "702001" },
        { name: "民雄頭橋郵局", code: "621001" },
      ];

      // 初始化下拉選單
      window.onload = function () {
        const typeSelect = document.getElementById("stickerMailType");
        mailTypesData.forEach((item) => {
          let opt = document.createElement("option");
          opt.value = item.code;
          opt.text = item.name;
          typeSelect.appendChild(opt);
        });

        const officeSelect = document.getElementById("stickerOffice");
        postOfficesData.forEach((item) => {
          let opt = document.createElement("option");
          opt.value = item.code;
          opt.text = item.name;
          officeSelect.appendChild(opt);
        });
      };
      // ===================================================================

      let currentMode = "standard";
      const printSection = document.getElementById("printSection");

      function switchTab(mode) {
        currentMode = mode;
        ["standard", "cart", "qrcode", "sticker"].forEach((m) => {
          document.getElementById(`tab-${m}`).className =
            "tab" + (mode === m ? " active" : "");
          document.getElementById(`config-${m}`).style.display =
            mode === m ? "block" : "none";
        });

        // 隱藏/顯示共用輸入框 (郵政條碼貼紙不使用此輸入框)
        document.getElementById("common-input-group").style.display =
          mode === "sticker" ? "none" : "block";
      }

      function generateSpecialSerial() {
        const start = parseInt(document.getElementById("serialStart").value);
        const mid = document
          .getElementById("midFix")
          .value.toString()
          .padStart(6, "0");
        const end = document
          .getElementById("endFix")
          .value.toString()
          .padStart(2, "0");
        const count = parseInt(document.getElementById("serialCount").value);
        let res = [];
        for (let i = 0; i < count; i++) {
          let first = (start + i).toString().padStart(6, "0");
          res.push(first + mid + end);
        }
        const input = document.getElementById("userInput");
        if (input.value.trim() && !confirm("確定要覆蓋輸入框現有內容嗎？"))
          return;
        input.value = res.join("\n");
      }

      function generateBatchBarcodes() {
        printSection.innerHTML = "";
        printSection.className = ""; // 重置排版 class

        // 如果是郵政貼紙模式，走專屬邏輯
        if (currentMode === "sticker") {
          generateStickers();
          return;
        }

        // 其他模式邏輯
        const codes = document
          .getElementById("userInput")
          .value.split("\n")
          .filter((c) => c.trim());
        if (!codes.length) return alert("請輸入內容");

        codes.forEach((code, i) => {
          if (currentMode === "standard") renderStandard(code, i);
          else if (currentMode === "cart") renderCart(code, i);
          else if (currentMode === "qrcode") renderQRCode(code, i);
        });
      }

      function generateStickers() {
        const startSerial = parseInt(
          document.getElementById("stickerSerialStart").value,
        );
        const count = parseInt(document.getElementById("stickerCount").value);
        const hasBorder =
          document.getElementById("stickerBorder").value === "dashed";
        const paperLayout = document.getElementById("stickerPaper").value;

        const typeSelect = document.getElementById("stickerMailType");
        const officeSelect = document.getElementById("stickerOffice");

        const mailTypeName = typeSelect.options[typeSelect.selectedIndex].text;
        const mailTypeCode = typeSelect.value;
        const officeName =
          officeSelect.options[officeSelect.selectedIndex].text;
        const officeCode = officeSelect.value;

        if (isNaN(startSerial) || isNaN(count))
          return alert("請輸入正確的流水號與張數");

        // 設定外層容器版型
        if (paperLayout === "grid18") {
          printSection.className = "layout-grid-18";
        } else {
          printSection.className = "layout-a4";
        }

        for (let i = 0; i < count; i++) {
          let currentSerialStr = (startSerial + i).toString().padStart(6, "0");
          let fullCode = `${currentSerialStr}${officeCode}${mailTypeCode}`;
          let displayNum = `${currentSerialStr} ${officeCode} ${mailTypeCode}`;

          renderStickerCard(
            mailTypeName,
            officeName,
            currentSerialStr,
            fullCode,
            displayNum,
            i,
            hasBorder,
            paperLayout,
          );
        }
      }

      function renderStickerCard(
        mailTypeName,
        officeName,
        serialStr,
        fullCode,
        displayNum,
        index,
        hasBorder,
        paperLayout,
      ) {
        // 建立 6.5 x 4.6 cm 的貼紙本體
        const stickerDiv = document.createElement("div");
        stickerDiv.className =
          "sticker-wrapper" + (hasBorder ? " has-border" : "");

        stickerDiv.innerHTML = `
          <div class="sticker-line1">${mailTypeName}</div>
          <div class="sticker-line2">${officeName}</div>
          <div class="sticker-line3">第 &nbsp;${serialStr}&nbsp; 號</div>
          <div class="sticker-line4-barcode">
            <svg id="sticker-bc-${index}"></svg>
          </div>
          <div class="sticker-line5">${displayNum}</div>
        `;

        // 如果是 18 格排版，需要包裝一層 7x4.95cm 的 cell
        if (paperLayout === "grid18") {
          const cellDiv = document.createElement("div");
          cellDiv.className = "cell-18";
          cellDiv.appendChild(stickerDiv);
          printSection.appendChild(cellDiv);
        } else {
          printSection.appendChild(stickerDiv);
        }

        // 渲染條碼 (關閉顯示文字，因為我們有自己的 Line 5 文字排版)
        JsBarcode(`#sticker-bc-${index}`, fullCode, {
          format: "CODE128",
          width: 2,
          height: 60,
          margin: 0,
          displayValue: false,
        });
      }

      function renderStandard(code, i) {
        const w = document.getElementById("widthCm").value,
          h = document.getElementById("heightCm").value;
        const border = document.getElementById("borderSelect").value !== "none";
        const div = document.createElement("div");
        div.className = "barcode-main-wrapper" + (border ? " has-border" : "");
        div.style.width = w + "cm";
        div.style.height = h + "cm";
        const svg = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg",
        );
        div.appendChild(svg);
        printSection.appendChild(div);
        JsBarcode(svg, code, {
          format: "CODE128",
          width: 2,
          height: 50,
          displayValue: true,
          fontSize: 16,
        });
      }

      function renderCart(code, i) {
        const div = document.createElement("div");
        div.className = "cart-wrapper";
        div.innerHTML = `<div class="cart-left"><span>${code}</span></div><div class="cart-right"><svg id="cs-${i}"></svg></div>`;
        printSection.appendChild(div);
        JsBarcode(`#cs-${i}`, code, {
          format: "CODE128",
          width: 1,
          height: 50,
          displayValue: true,
          fontSize: 12,
          margin: 0,
        });
      }

      function renderQRCode(code, i) {
        const s = document.getElementById("qrSizeCm").value;
        const txt = document.getElementById("qrTextSelect").value === "yes";
        const logoUrl = document.getElementById("qrLogoUrl").value.trim();
        const pxSize = s * 37.8;

        const div = document.createElement("div");
        div.className = "qrcode-wrapper";

        const qrContainer = document.createElement("div");
        qrContainer.id = "qrc-" + i;
        div.appendChild(qrContainer);

        if (txt) {
          const p = document.createElement("div");
          p.style.fontSize = "12px";
          p.style.marginTop = "8px";
          p.style.fontWeight = "bold";
          p.textContent = code;
          div.appendChild(p);
        }
        printSection.appendChild(div);

        const qrcode = new QRCode(qrContainer, {
          text: code,
          width: pxSize,
          height: pxSize,
          correctLevel: QRCode.CorrectLevel.H,
        });

        if (logoUrl) {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.src = logoUrl;
          img.onload = function () {
            const qrCanvas = qrContainer.querySelector("canvas");
            if (qrCanvas) {
              const ctx = qrCanvas.getContext("2d");
              const logoSize = pxSize * 0.22;
              const x = (pxSize - logoSize) / 2;
              const y = (pxSize - logoSize) / 2;
              ctx.fillStyle = "#FFFFFF";
              ctx.fillRect(x - 2, y - 2, logoSize + 4, logoSize + 4);
              ctx.drawImage(img, x, y, logoSize, logoSize);
            }
          };
        }
      }

      async function downloadAllAsImage() {
        const canvas = await html2canvas(printSection, {
          scale: 2,
          useCORS: true,
        });
        const link = document.createElement("a");
        link.download = `郵件條碼標籤.png`;
        link.href = canvas.toDataURL();
        link.click();
      }
