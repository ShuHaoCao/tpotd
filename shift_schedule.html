<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate, max-age=0"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>查詢全部班表</title>
    <style>
      :root {
        --bg-1: #071421;
        --bg-2: #0e2f3a;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-strong: #ffffff;
        --text: #122033;
        --muted: #6a7585;
        --line: rgba(18, 32, 51, 0.1);
        --accent: #0e8f66;
        --accent-2: #d41d3c;
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
        --radius-xl: 26px;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg-1);
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at 12% 8%,
            rgba(36, 168, 124, 0.38),
            transparent 30%
          ),
          radial-gradient(
            circle at 86% 4%,
            rgba(212, 29, 60, 0.24),
            transparent 28%
          ),
          linear-gradient(135deg, #071421 0%, #0d2c37 45%, #123926 100%);
        padding: 18px;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.035) 1px,
            transparent 1px
          );
        background-size: 34px 34px;
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.78),
          transparent 78%
        );
      }

      .app-shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        position: relative;
      }

      .hero {
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: var(--radius-xl);
        padding: clamp(20px, 4vw, 34px);
        color: #fff;
        box-shadow: var(--shadow);
        background:
          linear-gradient(
            135deg,
            rgba(11, 63, 52, 0.95),
            rgba(13, 42, 60, 0.94)
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(255, 255, 255, 0.28),
            transparent 25%
          );
      }

      .hero::after {
        content: "運輸股";
        position: absolute;
        right: -34px;
        bottom: 18px;
        font-size: clamp(2.4rem, 9vw, 6.8rem);
        font-weight: 900;
        letter-spacing: 0.12em;
        color: rgba(255, 255, 255, 0.055);
        white-space: nowrap;
        pointer-events: none;
      }

      .hero-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 12px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.22);
        font-size: 0.86rem;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4.2rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .hero-subtitle {
        max-width: 720px;
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.78);
        line-height: 1.7;
        font-size: clamp(0.95rem, 2vw, 1.08rem);
      }

      .control-card {
        margin-top: 16px;
        padding: 16px;
        border-radius: var(--radius-xl);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(22px) saturate(145%);
        -webkit-backdrop-filter: blur(22px) saturate(145%);
        box-shadow:
          var(--shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.72);
      }

      .date-select {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
      }

      .date-field {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
        border-radius: 24px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.88),
          rgba(238, 246, 242, 0.72)
        );
        border: 1px solid rgba(255, 255, 255, 0.8);
        padding: 14px 18px;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.95),
          0 10px 26px rgba(18, 32, 51, 0.1);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .date-field:hover {
        transform: translateY(-1px);
        border-color: rgba(14, 143, 102, 0.34);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.96),
          0 16px 34px rgba(14, 143, 102, 0.15);
      }

      .date-field label {
        color: var(--muted);
        font-weight: 900;
        white-space: nowrap;
        font-size: clamp(1rem, 2vw, 1.25rem);
        cursor: pointer;
      }

      input[type="date"] {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: #050b12;
        font-size: clamp(2.15rem, 6vw, 4.3rem);
        line-height: 1;
        font-weight: 950;
        letter-spacing: 0.02em;
        cursor: pointer;
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        width: clamp(34px, 8vw, 54px);
        height: clamp(34px, 8vw, 54px);
        cursor: pointer;
        opacity: 0.92;
      }

      #weekday {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        background: #10233a;
        color: #fff;
        font-weight: 900;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        white-space: nowrap;
      }

      .filter-buttons {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        appearance: none;
        flex: 0 0 auto;
        width: auto;
        border: 1px solid rgba(14, 143, 102, 0.18);
        background: rgba(255, 255, 255, 0.86);
        color: #233247;
        border-radius: 999px;
        padding: 9px 13px;
        font-size: 0.92rem;
        font-weight: 800;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          background 0.18s ease;
        box-shadow: 0 8px 18px rgba(18, 32, 51, 0.06);
        white-space: nowrap;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(18, 32, 51, 0.12);
      }

      button.active {
        background: linear-gradient(135deg, #0e8f66, #0d5b73);
        color: white;
        border-color: transparent;
      }

      .schedule-panel {
        display: flex;
        justify-content: center;
        margin-top: 24px;
        padding: clamp(14px, 2vw, 22px);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.22),
            rgba(255, 255, 255, 0.08)
          ),
          rgba(247, 250, 248, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.34);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.42);
        backdrop-filter: blur(24px) saturate(150%);
        -webkit-backdrop-filter: blur(24px) saturate(150%);
      }

      .schedule-grid {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .column {
        width: 100%;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .column:empty,
      #right-column {
        display: none;
      }

      .shift-row {
        --shift-color-start: #163e64;
        --shift-color-end: #0b223a;
        position: relative;
        display: grid;
        grid-template-columns: minmax(138px, 0.7fr) minmax(0, 1fr);
        align-items: stretch;
        overflow: hidden;
        border-radius: 20px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.72),
          rgba(255, 255, 255, 0.35)
        );
        border: 1px solid rgba(255, 255, 255, 0.44);
        box-shadow:
          0 14px 30px rgba(0, 0, 0, 0.16),
          0 0 0 1px
            color-mix(in srgb, var(--shift-color-start) 26%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .shift-row::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          90deg,
          color-mix(in srgb, var(--shift-color-start) 20%, transparent),
          transparent 38%
        );
        opacity: 0.48;
      }

      .shift-row:hover {
        transform: translateY(-3px) scale(1.006);
        border-color: color-mix(
          in srgb,
          var(--shift-color-start) 52%,
          white 48
        );
        box-shadow:
          0 20px 42px rgba(0, 0, 0, 0.22),
          0 0 22px color-mix(in srgb, var(--shift-color-start) 34%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .shift-label {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        padding: 12px 13px;
        text-align: left;
        font-weight: 950;
        color: #fff;
        white-space: nowrap;
        letter-spacing: 0.02em;
        cursor: help;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.35);
        /* 多重漸層實踐混色 */
        background:
          radial-gradient(
            circle at 20% 12%,
            rgba(255, 255, 255, 0.3),
            transparent 32%
          ),
          linear-gradient(
            135deg,
            var(--shift-color-start),
            var(--shift-color-mid, var(--shift-color-start)),
            var(--shift-color-end)
          );
      }

      .shift-time {
        font-size: 0.72rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.85);
      }

      .staff-name {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-width: 0;
        padding: 14px 17px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.9),
          rgba(242, 248, 245, 0.58)
        );
        text-align: left;
        white-space: nowrap;
        color: #101a2b;
        font-size: clamp(1.22rem, 2.25vw, 1.62rem);
        line-height: 1.16;
        font-weight: 950;
        letter-spacing: 0.035em;
        cursor: help;
      }

      .staff-name .name-text {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .staff-name .status-dot {
        width: 10px;
        height: 10px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: #cbd3dc;
        box-shadow: 0 0 0 4px rgba(203, 211, 220, 0.18);
      }

      .shift-row.assigned .staff-name .status-dot {
        background: var(--accent);
        box-shadow: 0 0 0 4px rgba(14, 143, 102, 0.16);
      }

      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 42px 18px;
        border-radius: var(--radius-lg);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.78);
        border: 1px dashed rgba(18, 32, 51, 0.18);
        font-weight: 800;
      }

      /* ==========================================================================
         【新配色架構：融合標籤數量的動態混色設計】
         ========================================================================== */

      /* ----- 單色系基本群組 (群組定位：飽和、沈穩、不刺眼) ----- */
      /* 群組 1: 管理層級 (深邃緋紅) */
      .grp-admin {
        --shift-color-start: #b01a33;
        --shift-color-end: #750a1b;
      }
      /* 群組 2: 內檯檯面 (海軍藍錠) */
      .grp-counter {
        --shift-color-start: #1c3d5a;
        --shift-color-end: #0f2438;
      }
      /* 群組 3: 全日早班 (翡翠森綠) */
      .grp-morning {
        --shift-color-start: #1b633d;
        --shift-color-end: #0f3d24;
      }
      /* 群組 4: 自運幹線 (微醺紫羅蘭) */
      .grp-self-route {
        --shift-color-start: #6d2f80;
        --shift-color-end: #441752;
      }
      /* 群組 5: 常規中班 (琉璃湛藍) */
      .grp-afternoon {
        --shift-color-start: #205c91;
        --shift-color-end: #103657;
      }
      /* 群組 6: 沉穩大夜 (曜石深灰) */
      .grp-night {
        --shift-color-start: #4f565c;
        --shift-color-end: #2d3236;
      }
      /* 右半部常規：支援與見習 */
      .grp-support {
        --shift-color-start: #cc6614;
        --shift-color-end: #8c4207;
      }
      .grp-intern {
        --shift-color-start: #5c4e46;
        --shift-color-end: #3b312b;
      }

      /* ----- 雙色標籤交叉融合 (2個標籤：左起漸層至右) ----- */
      /* 混色 A：早班5、大夜班1,2,3,4,5,127/128,夜1 跨 MOMO群 (標籤色 + 金橘色) */
      .mix-momo-morning {
        --shift-color-start: #1b633d;
        --shift-color-end: #cc6a14;
      }
      .mix-momo-night {
        --shift-color-start: #4f565c;
        --shift-color-end: #cf5d17;
      }
      /* 混色 B：771/772車次系列 跨 幹線運輸 (中班湛藍 + 耀眼青藍) */
      .grp-line-transport {
        --shift-color-start: #205c91;
        --shift-color-end: #0f8a8f;
      }
      /* 混色 C：花班雙拆 (早班4、新營1,2 跨 雙拆花班標籤，呈青綠漸層) */
      .grp-split-shift {
        --shift-color-start: #147a73;
        --shift-color-end: #094743;
      }

      /* ----- 三個標籤以上之魔王級班別 (彩色霓虹：高亮幻彩，但維持深底高質感) ----- */
      /* 魔王 1：大夜班1 (大夜 + MOMO + 花班 跨三標籤) */
      .mix-triple-night1 {
        --shift-color-start: #4f565c;
        --shift-color-mid: #b85214;
        --shift-color-end: #147a73;
      }
      /* 魔王 2：127/128車次 (大夜 + MOMO + 幹線 跨三標籤) */
      .mix-triple-train {
        --shift-color-start: #4f565c;
        --shift-color-mid: #cf5d17;
        --shift-color-end: #0f8a8f;
      }
      /* 魔王 3：早班 5 (早班 + MOMO + 幹線 跨三標籤) */
      .mix-triple-morning5 {
        --shift-color-start: #1b633d;
        --shift-color-mid: #cc6a14;
        --shift-color-end: #0f8a8f;
      }

      .task-popover {
        position: fixed;
        display: none;
        z-index: 3000;
        width: min(420px, calc(100vw - 28px));
        max-height: min(62vh, 520px);
        overflow: auto;
        padding: 16px 17px 15px;
        border-radius: 22px;
        color: #f8fbff;
        background:
          radial-gradient(
            circle at 18% 0%,
            rgba(255, 255, 255, 0.16),
            transparent 34%
          ),
          linear-gradient(135deg, rgba(8, 25, 39, 0.98), rgba(10, 55, 48, 0.96));
        border: 1px solid rgba(255, 255, 255, 0.24);
        box-shadow:
          0 26px 70px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(22px) saturate(150%);
        -webkit-backdrop-filter: blur(22px) saturate(150%);
      }

      .task-popover.show {
        display: block;
        animation: taskFloatIn 0.18s ease-out both;
      }

      @keyframes taskFloatIn {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .task-popover-title {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
        font-weight: 950;
        font-size: 1.05rem;
        line-height: 1.35;
      }

      .task-popover-title span {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .task-popover-close {
        width: 30px;
        height: 30px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        color: #fff;
        background: rgba(255, 255, 255, 0.14);
        box-shadow: none;
        line-height: 1;
        font-size: 1.15rem;
      }

      .task-popover-close:hover {
        transform: none;
        background: rgba(255, 255, 255, 0.22);
        box-shadow: none;
      }

      .task-popover-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin: 0 0 12px;
      }

      .task-popover-tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 11px;
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.92);
        background: rgba(255, 255, 255, 0.13);
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
        font-size: 0.86rem;
        font-weight: 900;
        line-height: 1;
        white-space: nowrap;
      }

      .task-popover-body {
        margin: 0;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.75;
        font-size: 0.95rem;
        white-space: pre-line;
      }

      .shift-row {
        cursor: pointer;
      }

      footer,
      #update-time {
        text-align: center;
        margin: 14px 0 0;
        color: rgba(255, 255, 255, 0.64);
        font-size: 0.86rem;
      }

      @media (max-width: 820px) {
        body {
          padding: 12px;
        }

        .date-select,
        .schedule-grid {
          grid-template-columns: 1fr;
        }

        #weekday {
          justify-self: stretch;
        }

        .schedule-panel,
        .control-card {
          padding: 12px;
          border-radius: 22px;
        }
      }

      @media (max-width: 520px) {
        .hero {
          padding: 20px;
        }

        .date-field {
          align-items: flex-start;
          flex-direction: column;
          gap: 8px;
        }

        button {
          flex: 0 0 auto;
          padding: 9px 12px;
        }

        .shift-row {
          grid-template-columns: 47% 53%;
          border-radius: 16px;
        }

        .shift-label {
          padding: 10px;
          font-size: 0.93rem;
        }

        .staff-name {
          padding: 10px 12px;
          font-size: clamp(1.08rem, 5vw, 1.28rem);
        }

        .shift-time {
          font-size: 0.66rem;
        }

        .task-popover {
          border-radius: 20px;
          max-height: 56vh;
        }
      }
      .violation-lights {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-left: auto;
        margin-right: 14px;
        font-size: 0.82rem;
        color: #6a7585;
        font-weight: 800;
      }

      .light-item {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .light-item span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }

      /* =========================
   手機版優化
========================= */
      @media (max-width: 520px) {
        .staff-name {
          align-items: center;
          gap: 8px;
        }

        .name-text {
          flex: 1;
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .violation-lights {
          flex-direction: column;
          align-items: flex-start;
          gap: 4px;
          margin-right: 8px;
          font-size: 0.68rem;
          line-height: 1;
        }

        .light-item {
          gap: 4px;
        }

        .light-item span {
          width: 7px;
          height: 7px;
        }

        .status-dot {
          width: 8px !important;
          height: 8px !important;
        }
      }

      @media (max-width: 520px) {
        .staff-name {
          padding-right: 10px !important;
        }

        .staff-name .status-dot {
          display: none !important;
        }

        .violation-lights {
          margin-left: auto !important;
          margin-right: 0 !important;
          flex-direction: column !important;
          align-items: flex-end !important;
          gap: 3px !important;
          font-size: 0.68rem !important;
          line-height: 1 !important;
          white-space: nowrap !important;
        }

        .light-item {
          justify-content: flex-end !important;
          gap: 4px !important;
        }

        .light-item span {
          width: 7px !important;
          height: 7px !important;
        }
      }
    </style>
  </head>

  <body>
    <main class="app-shell">

      const taskPopover = document.createElement("div");

      document.body.appendChild(taskPopover);

      function escapeHTML(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function placeTaskPopover(anchor) {
        const rect = anchor.getBoundingClientRect();
        taskPopover.classList.add("show");

        const gap = 12;
        const popoverWidth = taskPopover.offsetWidth;
        const popoverHeight = taskPopover.offsetHeight;

        let left = rect.left + rect.width / 2 - popoverWidth / 2;
        let top = rect.bottom + gap;

        left = Math.max(
          14,
          Math.min(left, window.innerWidth - popoverWidth - 14),
        );

        if (top + popoverHeight > window.innerHeight - 14) {
          top = rect.top - popoverHeight - gap;
        }

        if (top < 14 || window.innerWidth <= 520) {
          left = 14;
          top = Math.max(14, window.innerHeight - popoverHeight - 14);
        }

        taskPopover.style.left = `${left}px`;
        taskPopover.style.top = `${top}px`;
      }

      function showTaskPopover(anchor) {
        const row = anchor.closest(".shift-row");
        if (!row) return;

        const shiftLabel =
          row.dataset.shift ||
          row
            .querySelector(".shift-label")
            ?.childNodes[0]?.textContent?.trim() ||
          "";
        const task = shiftTaskNotes[shiftLabel] || "此班別工作內容尚未建檔。";
        const tags = getShiftTags(shiftLabel);
        const tagChips = (tags.length ? tags : ["尚未標示"])
          .map(
            (tag) => `<span class="task-popover-tag">${escapeHTML(tag)}</span>`,
          )
          .join("");

        taskPopover.innerHTML = `
          <div class="task-popover-title">
            <span>📝 ${escapeHTML(shiftLabel)}｜工作任務</span>
            <button type="button" class="task-popover-close" aria-label="關閉工作任務視窗">×</button>
          </div>
          <div class="task-popover-tags" aria-label="班別標籤">${tagChips}</div>
          <p class="task-popover-body">${escapeHTML(task)}</p>
        `;

        placeTaskPopover(row);
      }

      function hideTaskPopover() {
        taskPopover.classList.remove("show");
      }

      document.addEventListener("click", function (e) {
        const closeBtn = e.target.closest(".task-popover-close");
        if (closeBtn) {
          hideTaskPopover();
          return;
        }

        const targetRow = e.target.closest(".shift-row");
        if (targetRow) {
          showTaskPopover(targetRow);
          return;
        }

        if (!e.target.closest(".task-popover")) {
          hideTaskPopover();
        }
      });

      window.addEventListener("resize", hideTaskPopover);
      window.addEventListener("scroll", hideTaskPopover, true);
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") hideTaskPopover();
      });

      function isAssigned(shiftObj) {
        if (!shiftObj) return false;
        // 不管是物件格式還是純字串格式，都能正確抓到名字
        const name = typeof shiftObj === "object" ? shiftObj.name : shiftObj;
        return (
          name &&
          name.trim() !== "" &&
          name.trim() !== "-" &&
          name.trim() !== "－"
        );
      }

      function getVisibleShifts(list) {
        return list.filter((shift) => {
          const hasStaff = isAssigned(currentScheduleData[shift.label]);

          // 非「顯示全部」時，一律只顯示有排班
          if (currentFilterGroup !== "all") {
            return (
              filterGroups[currentFilterGroup].includes(shift.label) && hasStaff
            );
          }

          // 顯示全部
          if (!showOnlyAssigned) {
            return true;
          }

          // 顯示排班
          return hasStaff;
        });
      }

      function getShiftTags(shiftLabel) {
        return Object.entries(filterGroups)
          .filter(([, labels]) => labels.includes(shiftLabel))
          .map(([group]) => filterGroupNames[group] || group);
      }

      function createRow(shift, shiftObj) {
        let displayName = "－";
        let status = { 台中: "", 嘉義: "", 高雄: "" };

        if (shiftObj) {
          if (typeof shiftObj === "object" && shiftObj.name !== undefined) {
            displayName =
              shiftObj.name && shiftObj.name.trim() !== ""
                ? shiftObj.name
                : "－";
            if (shiftObj.status) status = shiftObj.status;
          } else if (typeof shiftObj === "string") {
            displayName = shiftObj.trim() !== "" ? shiftObj : "－";
          }
        }

        const hasStaff =
          displayName !== "－" && displayName !== "-" && displayName !== "－";
        const time = shiftTimeNotes[shift.label] || "時間待建檔";
        const safeLabel = escapeHTML(shift.label);
        const safeTime = escapeHTML(time);
        const safeName = escapeHTML(displayName);

        // 紅綠燈顏色控制
        const getLightColor = (val) => {
          if (val === "V") return "#d41d3c"; // 紅燈
          if (val === "OK") return "#0e8f66"; // 綠燈
          return "#cbd3dc"; // 灰燈
        };

        // 💡 關鍵優化：加上 margin-left: auto; 與 flex 容器特性，強制將整個燈號區塊推到最右邊，並與右側狀態點保持距離 (margin-right)
        const lightsHtml = `
    <div class="violation-lights">
      <span class="light-item"><span style="width:10px; height:10px; border-radius:50%; display:inline-block; background-color:${getLightColor(status["台中"])}; box-shadow: ${status["台中"] ? "0 0 6px " + getLightColor(status["台中"]) : "none"}"></span>台中</span>
      <span class="light-item"><span style="width:10px; height:10px; border-radius:50%; display:inline-block; background-color:${getLightColor(status["嘉義"])}; box-shadow: ${status["嘉義"] ? "0 0 6px " + getLightColor(status["嘉義"]) : "none"}"></span>嘉義</span>
      <span class="light-item"><span style="width:10px; height:10px; border-radius:50%; display:inline-block; background-color:${getLightColor(status["高雄"])}; box-shadow: ${status["高雄"] ? "0 0 6px " + getLightColor(status["高雄"]) : "none"}"></span>高雄</span>
    </div>
  `;

        return `
    <div class="shift-row ${hasStaff ? "assigned" : ""}" data-shift="${safeLabel}" title="點擊查看工作任務">
      <div class="shift-label ${shift.color}">
        ${safeLabel}
        <span class="shift-time">${safeTime}</span>
      </div>
      <div class="staff-name" style="display: flex; align-items: center; width: 100%;">
        <span class="name-text">${safeName}</span>
        ${lightsHtml}
        <span class="status-dot"></span>
      </div>
    </div>
  `;
      }

      function renderSchedule() {
        const visibleShifts = [
          ...getVisibleShifts(shiftListLeft),
          ...getVisibleShifts(shiftListRight),
        ];
        document.getElementById("left-column").innerHTML = visibleShifts
          .map((s) => createRow(s, currentScheduleData[s.label]))
          .join("");
        document.getElementById("right-column").innerHTML = "";
        const visibleCount = visibleShifts.length;

        const grid = document.querySelector(".schedule-grid");
        const oldEmpty = document.querySelector(".empty-state");
        if (oldEmpty) oldEmpty.remove();
        if (visibleCount === 0) {
          grid.insertAdjacentHTML(
            "beforeend",
            '<div class="empty-state">這個篩選目前沒有已排班資料。江湖很安靜，但不是壞事。</div>',
          );
        }
      }

      function fetchSchedule(date) {
        fetch("schedule_data.json?t=" + new Date().getTime(), {
          cache: "no-store",
        })
          .then((res) => res.json())
          .then((allData) => {
            currentScheduleData = allData[date] || {};
            renderSchedule();
            document.getElementById("update-time").textContent =
              "最後讀取：" +
              new Date().toLocaleString("zh-TW", { hour12: false });
          })
          .catch(() => {
            currentScheduleData = {};
            renderSchedule();
            document.getElementById("update-time").textContent =
              "讀取 schedule_data.json 失敗，請確認檔案與本頁在同一資料夾。";
          });
      }

      document.addEventListener("DOMContentLoaded", function () {
        const dateInput = document.getElementById("date");
        const dateField = document.querySelector(".date-field");
        const btnAll = document.getElementById("show-all");
        const btnAssigned = document.getElementById("show-assigned");
        const groupBtns = document.querySelectorAll(".group-btn");

        function updateWeekday(value) {
          const days = [
            "星期日",
            "星期一",
            "星期二",
            "星期三",
            "星期四",
            "星期五",
            "星期六",
          ];
          document.getElementById("weekday").textContent =
            days[new Date(value + "T00:00:00").getDay()];
        }

        dateInput.value = new Date().toISOString().split("T")[0];
        updateWeekday(dateInput.value);
        fetchSchedule(dateInput.value);

        const clearActive = () =>
          [btnAll, btnAssigned, ...groupBtns].forEach((b) =>
            b.classList.remove("active"),
          );

        btnAll.addEventListener("click", function () {
          clearActive();
          this.classList.add("active");
          showOnlyAssigned = false;
          currentFilterGroup = "all";
          renderSchedule();
        });
        btnAssigned.addEventListener("click", function () {
          clearActive();
          this.classList.add("active");
          showOnlyAssigned = true;
          currentFilterGroup = "all";
          renderSchedule();
        });
        groupBtns.forEach((btn) =>
          btn.addEventListener("click", function () {
            clearActive();
            this.classList.add("active");
            currentFilterGroup = this.dataset.group;
            renderSchedule();
          }),
        );

        dateInput.addEventListener("change", function () {
          updateWeekday(this.value);
          fetchSchedule(this.value);
        });
      });
