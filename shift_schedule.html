    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>查詢全部班表</title>
    <style>
      :root {
        --bg-1: #071421;
        --bg-2: #0e2f3a;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-strong: #ffffff;
        --text: #122033;
        --muted: #6a7585;
        --line: rgba(18, 32, 51, 0.1);
        --accent: #0e8f66;
        --accent-2: #d41d3c;
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
        --radius-xl: 26px;
        --radius-lg: 18px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg-1);
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at 12% 8%,
            rgba(36, 168, 124, 0.38),
            transparent 30%
          ),
          radial-gradient(
            circle at 86% 4%,
            rgba(212, 29, 60, 0.24),
            transparent 28%
          ),
          linear-gradient(135deg, #071421 0%, #0d2c37 45%, #123926 100%);
        padding: 18px;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.035) 1px,
            transparent 1px
          );
        background-size: 34px 34px;
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.78),
          transparent 78%
        );
      }

      .app-shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        position: relative;
      }

      .hero {
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: var(--radius-xl);
        padding: clamp(20px, 4vw, 34px);
        color: #fff;
        box-shadow: var(--shadow);
        background:
          linear-gradient(
            135deg,
            rgba(11, 63, 52, 0.95),
            rgba(13, 42, 60, 0.94)
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(255, 255, 255, 0.28),
            transparent 25%
          );
      }

      .hero::after {
        content: "郵務作戰中";
        position: absolute;
        right: -34px;
        bottom: 18px;
        font-size: clamp(2.4rem, 9vw, 6.8rem);
        font-weight: 900;
        letter-spacing: 0.12em;
        color: rgba(255, 255, 255, 0.055);
        white-space: nowrap;
        pointer-events: none;
      }

      .hero-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 12px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.22);
        font-size: 0.86rem;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4.2rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .hero-subtitle {
        max-width: 720px;
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.78);
        line-height: 1.7;
        font-size: clamp(0.95rem, 2vw, 1.08rem);
      }

      .control-card {
        margin-top: 16px;
        padding: 16px;
        border-radius: var(--radius-xl);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(22px) saturate(145%);
        -webkit-backdrop-filter: blur(22px) saturate(145%);
        box-shadow:
          var(--shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.72);
      }

      .date-select {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
      }

      .date-field {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
        border-radius: 24px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.88),
          rgba(238, 246, 242, 0.72)
        );
        border: 1px solid rgba(255, 255, 255, 0.8);
        padding: 14px 18px;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.95),
          0 10px 26px rgba(18, 32, 51, 0.1);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .date-field:hover {
        transform: translateY(-1px);
        border-color: rgba(14, 143, 102, 0.34);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.96),
          0 16px 34px rgba(14, 143, 102, 0.15);
      }

      .date-field label {
        color: var(--muted);
        font-weight: 900;
        white-space: nowrap;
        font-size: clamp(1rem, 2vw, 1.25rem);
        cursor: pointer;
      }

      input[type="date"] {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: #050b12;
        font-size: clamp(2.15rem, 6vw, 4.3rem);
        line-height: 1;
        font-weight: 950;
        letter-spacing: 0.02em;
        cursor: pointer;
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        width: clamp(34px, 8vw, 54px);
        height: clamp(34px, 8vw, 54px);
        cursor: pointer;
        opacity: 0.92;
      }

      #weekday {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        background: #10233a;
        color: #fff;
        font-weight: 900;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        white-space: nowrap;
      }

      .filter-buttons {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        appearance: none;
        flex: 0 0 auto;
        width: auto;
        border: 1px solid rgba(14, 143, 102, 0.18);
        background: rgba(255, 255, 255, 0.86);
        color: #233247;
        border-radius: 999px;
        padding: 9px 13px;
        font-size: 0.92rem;
        font-weight: 800;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          background 0.18s ease;
        box-shadow: 0 8px 18px rgba(18, 32, 51, 0.06);
        white-space: nowrap;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(18, 32, 51, 0.12);
      }

      button.active {
        background: linear-gradient(135deg, #0e8f66, #0d5b73);
        color: white;
        border-color: transparent;
      }

      .schedule-panel {
        margin-top: 24px;
        padding: clamp(14px, 2vw, 22px);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.22),
            rgba(255, 255, 255, 0.08)
          ),
          rgba(247, 250, 248, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.34);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.42);
        backdrop-filter: blur(24px) saturate(150%);
        -webkit-backdrop-filter: blur(24px) saturate(150%);
      }

      .schedule-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(220px, 0.26fr);
        align-items: start;
        gap: 14px;
      }

      .column {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .column:empty {
        display: none;
      }

      .shift-row {
        --shift-color: #163e64;
        position: relative;
        display: grid;
        grid-template-columns: minmax(132px, 0.7fr) minmax(0, 1fr);
        align-items: stretch;
        overflow: hidden;
        border-radius: 20px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.72),
          rgba(255, 255, 255, 0.35)
        );
        border: 1px solid rgba(255, 255, 255, 0.44);
        box-shadow:
          0 14px 30px rgba(0, 0, 0, 0.16),
          0 0 0 1px color-mix(in srgb, var(--shift-color) 26%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .shift-row::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          90deg,
          color-mix(in srgb, var(--shift-color) 20%, transparent),
          transparent 38%
        );
        opacity: 0.48;
      }

      .shift-row:hover {
        transform: translateY(-3px) scale(1.006);
        border-color: color-mix(in srgb, var(--shift-color) 52%, white 48%);
        box-shadow:
          0 20px 42px rgba(0, 0, 0, 0.22),
          0 0 22px color-mix(in srgb, var(--shift-color) 34%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .shift-label {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        padding: 12px 13px;
        text-align: left;
        font-weight: 950;
        color: #fff;
        white-space: nowrap;
        letter-spacing: 0.02em;
        cursor: help;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.28);
        background:
          radial-gradient(
            circle at 20% 12%,
            rgba(255, 255, 255, 0.26),
            transparent 32%
          ),
          linear-gradient(
            135deg,
            var(--shift-color),
            color-mix(in srgb, var(--shift-color) 68%, #000 32%)
          );
      }

      .shift-time {
        font-size: 0.72rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.78);
      }

      .staff-name {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-width: 0;
        padding: 14px 17px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.9),
          rgba(242, 248, 245, 0.58)
        );
        text-align: left;
        white-space: nowrap;
        color: #101a2b;
        font-size: clamp(1.22rem, 2.25vw, 1.62rem);
        line-height: 1.16;
        font-weight: 950;
        letter-spacing: 0.035em;
        cursor: help;
      }

      .staff-name .name-text {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .staff-name .status-dot {
        width: 10px;
        height: 10px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: #cbd3dc;
        box-shadow: 0 0 0 4px rgba(203, 211, 220, 0.18);
      }

      .shift-row.assigned .staff-name .status-dot {
        background: var(--accent);
        box-shadow: 0 0 0 4px rgba(14, 143, 102, 0.16);
      }

      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 42px 18px;
        border-radius: var(--radius-lg);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.78);
        border: 1px dashed rgba(18, 32, 51, 0.18);
        font-weight: 800;
      }

      .red {
        --shift-color: #c00000;
      }
      .green {
        --shift-color: #275317;
      }
      .blue {
        --shift-color: #163e64;
      }
      .middle-blue {
        --shift-color: #215f9a;
      }
      .light-blue {
        --shift-color: #4e95d9;
      }
      .purple {
        --shift-color: #78206e;
      }
      .blue-green {
        --shift-color: #0e9292;
      }
      .gray {
        --shift-color: #595959;
      }
      .orange {
        --shift-color: #c04f15;
      }
      .coffee {
        --shift-color: #4f443f;
      }
      .olive-gold {
        --shift-color: #827717;
      }

      footer,
      #update-time {
        text-align: center;
        margin: 14px 0 0;
        color: rgba(255, 255, 255, 0.64);
        font-size: 0.86rem;
      }

      @media (max-width: 820px) {
        body {
          padding: 12px;
        }

        .date-select,
        .schedule-grid {
          grid-template-columns: 1fr;
        }

        #weekday {
          justify-self: stretch;
        }

        .schedule-panel,
        .control-card {
          padding: 12px;
          border-radius: 22px;
        }
      }

      @media (max-width: 520px) {
        .hero {
          padding: 20px;
        }

        .date-field {
          align-items: flex-start;
          flex-direction: column;
          gap: 8px;
        }

        button {
          flex: 0 0 auto;
          padding: 9px 12px;
        }

        .shift-row {
          grid-template-columns: 50% 50%;
          border-radius: 16px;
        }

        .shift-label {
          padding: 10px;
          font-size: 0.93rem;
        }

        .staff-name {
          padding: 10px 12px;
          font-size: clamp(1.08rem, 5vw, 1.28rem);
        }

        .shift-time {
          font-size: 0.66rem;
        }
      }
    </style>
  </head>

  <body>
    <main class="app-shell">
      <section class="hero" aria-label="班表查詢標題">
        <h1>查詢全部班表</h1>
      </section>

      <section class="control-card" aria-label="查詢與篩選工具">
        <div class="date-select">
          <div class="date-field">
            <label for="date">選擇日期</label>
            <input type="date" id="date" />
          </div>
          <span id="weekday"></span>
        </div>

        <div class="filter-buttons">
          <button id="show-all" class="active">顯示全部</button>
          <button id="show-assigned">顯示排班</button>
          <button class="group-btn" data-group="morning">早班</button>
          <button class="group-btn" data-group="afternoon">中班</button>
          <button class="group-btn" data-group="night">大夜班</button>
          <button class="group-btn" data-group="momo">MOMO</button>
          <button class="group-btn" data-group="line">幹線運輸</button>
          <button class="group-btn" data-group="two">花班</button>
          <button class="group-btn" data-group="other">支援/見習</button>
        </div>
      </section>

      <section class="schedule-panel" aria-label="班表列表">
        <div class="schedule-grid">
          <div class="column" id="left-column"></div>
          <div class="column" id="right-column"></div>
        </div>
      </section>

      <div id="update-time"></div>
    </main>

  color: #fff;
  padding: 10px 14px;
  border-radius: 14px;

  line-height: 1.6;
`;
      document.body.appendChild(tooltip);

      // 2. 座標更新函數 (核心修改：解決手機邊緣遮擋問題)
      function updateTooltipPosition(e) {
        if (tooltip.style.display === "block") {
          let posX = e.clientX + 15;
          let posY = e.clientY + 15;

          // 如果右邊空間不夠，改向左顯示
          if (posX + tooltip.offsetWidth > window.innerWidth) {
            posX = e.clientX - tooltip.offsetWidth - 15;
          }
          // 如果下面空間不夠，改向上顯示
          if (posY + tooltip.offsetHeight > window.innerHeight) {
            posY = e.clientY - tooltip.offsetHeight - 15;
          }

          tooltip.style.left = posX + "px";
          tooltip.style.top = posY + "px";
        }
      }

      // 3. 滑鼠移入：區分左右色塊內容
      document.addEventListener("mouseover", function (e) {
        let note = "";

        // 判斷左側 (深色班別標籤)
        if (e.target.classList.contains("shift-label")) {
          const labelText = e.target.textContent.trim();
          const time = shiftTimeNotes[labelText];
          if (time) note = "🕒 上班時間：\n" + time;
        }
        // 判斷右側 (淺色人名色塊)
        else if (e.target.classList.contains("staff-name")) {
          const row = e.target.closest(".shift-row");
          if (row) {
            const shiftLabel = row
              .querySelector(".shift-label")
              .textContent.trim();
            const task = shiftTaskNotes[shiftLabel];
            if (task) note = "📝 工作任務：\n" + task;
          }
        }

        if (note) {
          tooltip.innerText = note; // 使用 innerText 才能解析 \n 換行
          tooltip.style.display = "block";
        }
      });

            "星期一",
            "星期二",
            "星期三",
            "星期四",
            "星期五",
            "星期六",
          ];
          document.getElementById("weekday").textContent =
            days[new Date(value + "T00:00:00").getDay()];
        }

        dateInput.value = new Date().toISOString().split("T")[0];
        updateWeekday(dateInput.value);
        fetchSchedule(dateInput.value);

        const clearActive = () =>
          [btnAll, btnAssigned, ...groupBtns].forEach((b) =>
            b.classList.remove("active"),
          );

        btnAll.addEventListener("click", function () {
          clearActive();
          this.classList.add("active");
          showOnlyAssigned = false;
          currentFilterGroup = "all";
          renderSchedule();
        });
        btnAssigned.addEventListener("click", function () {
          clearActive();
          this.classList.add("active");
          showOnlyAssigned = true;
          currentFilterGroup = "all";
          renderSchedule();
        });
        groupBtns.forEach((btn) =>
          btn.addEventListener("click", function () {
            clearActive();
            this.classList.add("active");
            currentFilterGroup = this.dataset.group;
            renderSchedule();
          }),
        );

        dateInput.addEventListener("change", function () {
          updateWeekday(this.value);
          fetchSchedule(this.value);
        });
      });
      // 1. 禁用滑鼠右鍵選單
      document.oncontextmenu = function () {
        console.warn("系統提示：為了保護排版參數，已禁用右鍵功能。");
        return false;
      };
    </script>
  </body>
</html>
