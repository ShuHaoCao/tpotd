`;

      // 2. 座標更新函數 (核心修改：解決手機邊緣遮擋問題)
      function updateTooltipPosition(e) {
        if (tooltip.style.display === "block") {
          let posX = e.clientX + 15;
          let posY = e.clientY + 15;

          // 如果右邊空間不夠，改向左顯示
          if (posX + tooltip.offsetWidth > window.innerWidth) {
            posX = e.clientX - tooltip.offsetWidth - 15;
          }
          // 如果下面空間不夠，改向上顯示
          if (posY + tooltip.offsetHeight > window.innerHeight) {
            posY = e.clientY - tooltip.offsetHeight - 15;
          }

          tooltip.style.left = posX + "px";
          tooltip.style.top = posY + "px";
        }
      }

      // 3. 滑鼠移入：區分左右色塊內容
      document.addEventListener("mouseover", function (e) {
        let note = "";

        // 判斷左側 (深色班別標籤)
        if (e.target.classList.contains("shift-label")) {
          const labelText = e.target.textContent.trim();
          const time = shiftTimeNotes[labelText];
          if (time) note = "🕒 上班時間：\n" + time;
        }
        // 判斷右側 (淺色人名色塊)
        else if (e.target.classList.contains("staff-name")) {
          const row = e.target.closest(".shift-row");
          if (row) {
            const shiftLabel = row
              .querySelector(".shift-label")
              .textContent.trim();
            const task = shiftTaskNotes[shiftLabel];
            if (task) note = "📝 工作任務：\n" + task;
          }
        }

        if (note) {
          tooltip.innerText = note; // 使用 innerText 才能解析 \n 換行
          tooltip.style.display = "block";
        }
      });

      // 4. 移動與點擊：更新位置 (包含手機點擊支援)
      document.addEventListener("mousemove", updateTooltipPosition);
      document.addEventListener("click", function (e) {
        if (
          e.target.classList.contains("shift-label") ||
          e.target.classList.contains("staff-name")
        ) {
          updateTooltipPosition(e);
        }
      });

      // 5. 滑鼠移出：隱藏
      document.addEventListener("mouseout", function (e) {

          e.target.classList.contains("shift-label") ||

          tooltip.style.display = "none";

      function createRow(shift, name) {
        const hasStaff =
          name &&
          name.trim() !== "" &&
          name.trim() !== "-" &&
          name.trim() !== "－";
        if (currentFilterGroup !== "all") {
          if (!filterGroups[currentFilterGroup].includes(shift.label))
            return "";
          if (!hasStaff) return "";
        } else if (showOnlyAssigned && !hasStaff) {
          return "";
        }
        const displayName = hasStaff ? name : "－";
        return `<div class="shift-row"><div class="shift-label ${shift.color}">${shift.label}</div><div class="staff-name">${displayName}</div></div>`;
      }

      function renderSchedule() {
        document.getElementById("left-column").innerHTML = shiftListLeft
          .map((s) => createRow(s, currentScheduleData[s.label]))
          .join("");
        document.getElementById("right-column").innerHTML = shiftListRight
          .map((s) => createRow(s, currentScheduleData[s.label]))
          .join("");
      }

      function fetchSchedule(date) {
        fetch("schedule_data.json?t=" + new Date().getTime())
          .then((res) => res.json())
          .then((allData) => {
            currentScheduleData = allData[date] || {};
            renderSchedule();
          });
      }

      document.addEventListener("DOMContentLoaded", function () {
        const dateInput = document.getElementById("date");
        const btnAll = document.getElementById("show-all");
        const btnAssigned = document.getElementById("show-assigned");
        const groupBtns = document.querySelectorAll(".group-btn");

        dateInput.value = new Date().toISOString().split("T")[0];
        fetchSchedule(dateInput.value);

        const clearActive = () =>
          [btnAll, btnAssigned, ...groupBtns].forEach((b) =>
            b.classList.remove("active"),
          );

        btnAll.addEventListener("click", function () {
          clearActive();
          this.classList.add("active");
          showOnlyAssigned = false;
          currentFilterGroup = "all";
          renderSchedule();
        });
        btnAssigned.addEventListener("click", function () {
          clearActive();
          this.classList.add("active");
          showOnlyAssigned = true;
          currentFilterGroup = "all";
          renderSchedule();
        });
        groupBtns.forEach((btn) =>
          btn.addEventListener("click", function () {
            clearActive();
            this.classList.add("active");
            currentFilterGroup = this.dataset.group;
            renderSchedule();
