<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>撲克牌十點半：命運之手</title>
    <link rel="stylesheet" href="style_10half.css" />
  </head>
  <body>
    <script src="script_10half.js"></script>
    <div id="login-screen">
      <h1>撲克牌十點半：命運之手</h1>
      <p>請輸入您的暱稱</p>
      <input type="text" id="player-name-input" placeholder="您的暱稱..." />
      <button onclick="startGame()">進入遊戲</button>
    </div>

    <div class="game-container">
      <div class="info-bar">
        <div><strong id="display-name">玩家：-</strong></div>
        <div id="round-counter" style="color: var(--accent-color)">
          回合: 1 / 10
        </div>
        <div id="player-chips">目前積分: 100</div>
      </div>

      <div class="status-msg" id="status-msg">準備好被電腦打敗了嗎？</div>

      <div class="table">
        <div class="player-area" id="area-dealer">
          <div class="bubble" id="bubble-dealer">我有預感會贏</div>
          <span class="name-label">🤖 鐵面莊家</span>
          <div class="cards-display" id="cards-dealer"></div>
          <div id="score-dealer">點數: 0</div>
        </div>
        <div class="player-area" id="area-p1">
          <div class="bubble" id="bubble-p1">加油！</div>
          <span class="name-label" id="name-p1">載入中...</span>
          <div class="cards-display" id="cards-p1"></div>
          <div id="score-p1">點數: 0</div>
        </div>
        <div class="player-area" id="area-p2">
          <div class="bubble" id="bubble-p2">看我的</div>
          <span class="name-label" id="name-p2">載入中...</span>
          <div class="cards-display" id="cards-p2"></div>
          <div id="score-p2">點數: 0</div>
        </div>
        <div class="player-area" id="area-player">
          <span class="name-label" style="color: var(--accent-color)"
            >⭐ 你本人</span
          >
          <div class="cards-display" id="cards-user"></div>
          <div id="score-user">點數: 0</div>
        </div>
      </div>

      <div class="controls">
        <div class="betting-zone">
          <label>下注積分:</label>
          <input
            type="number"
            id="bet-amount"
            value="10"
            min="5"
            step="5"
            style="width: 60px; margin: 0"
          />
        </div>
        <button id="btn-next" onclick="initRound()">開始回合</button>
        <button id="btn-hit" onclick="playerHit()" disabled>要牌</button>
        <button id="btn-stand" onclick="playerStand()" disabled>停牌</button>
      </div>

      <div class="leaderboard">
        <h3>🏆 10回合最高積分排行榜</h3>
        <table id="leaderboard-table">
          <thead>
            <tr>
              <th>名次</th>
              <th>名稱</th>
              <th>最終積分</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <footer>
      <div class="copyright">© 2025 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
