<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>楚河漢界：大將軍</title>
    <link rel="stylesheet" href="style_chess.css" />
  </head>
  <body>
    <script src="script_chess.js"></script>
    <div id="game-container">
      <h1>楚河漢界：大將軍</h1>

      <div id="info-panel">
        <span id="player-display">玩家: -</span>
        <span id="status-display">輪到你 (紅方)</span>
      </div>

      <div id="board-wrapper">
        <canvas id="chessBoard"></canvas>
      </div>

      <div id="controls">
        <button onclick="resetGame()">重新開始</button>
        <button onclick="showLeaderboard()">查看排行</button>
      </div>

      <div id="leaderboard-section">
        <h3>🏆前10名排行榜</h3>
        <table id="rank-table">
          <thead>
            <tr>
              <th>名次</th>
              <th>暱稱</th>
              <th>勝場</th>
            </tr>
          </thead>
          <tbody id="rank-body"></tbody>
        </table>
      </div>
    </div>

    <div id="overlay">
      <div class="modal">
        <h2>歡迎對戰</h2>
        <p>請輸入您的暱稱：</p>
        <input
          type="text"
          id="name-input"
          maxlength="8"
          placeholder="你的大名"
        />
        <br />
        <button onclick="startGame()">開始遊戲</button>
      </div>
    </div>
    <footer>
      <div class="copyright">© 2025 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
