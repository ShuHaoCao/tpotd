<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>逆轉之翼：奧賽羅</title>
    <link rel="stylesheet" href="style_othello.css" />
  </head>
  <body>
    <script src="script_othello.js"></script>
    <div id="overlay">
      <div class="modal">
        <h3>逆轉之翼：奧賽羅</h3>
        <p>請輸入您的名字：</p>
        <input
          type="text"
          id="playerNameInput"
          maxlength="10"
          placeholder="玩家名稱"
        />
        <br />
        <button onclick="startGame()">開始遊戲</button>
      </div>
    </div>

    <div class="container">
      <h1>逆轉之翼：奧賽羅</h1>

      <div class="settings-bar">
        AI 難度:
        <select id="difficulty">
          <option value="easy">簡單 (隨機)</option>
          <option value="normal" selected>普通 (權重)</option>
        </select>
      </div>

      <div id="status-panel">
        <div><span id="pName">?</span>: <b id="black-score">2</b></div>
        <div>AI: <b id="white-score">2</b></div>
        <div>回合: <span id="turn-display">黑棋</span></div>
      </div>

      <div id="board"></div>

      <div class="controls">
        <button onclick="undoMove()" id="undoBtn">悔棋</button>
        <button onclick="resetGame()">重新開始</button>
        <button onclick="toggleLeaderboard()">排行榜</button>
      </div>

      <div id="leaderboard" style="display: none">
        <h3>前 10 名排行榜 (勝場)</h3>
        <table id="rankTable">
          <thead>
            <tr>
              <th>名次</th>
              <th>玩家</th>
              <th>勝場</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <footer>
      <div class="copyright">© 2026 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
