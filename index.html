    <style>
      /* 全局核心：在還沒完全載入前，網頁本體先隱藏 */
      #main-content {
        opacity: 0;
        transition: opacity 0.5s ease-in;
        position: relative;
        z-index: 2; /* 確保內容在流星畫布之上 */
      }

      /* 滿版 Loading 載入畫面樣式 */
      #loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0d1b2a;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition:
          opacity 0.4s ease,
          filter 0.4s ease;
      }

      /* 轉圈圈動畫 */
      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(22, 136, 103, 0.2);
        border-top: 5px solid #168867;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
      }

      .loader-text {
        color: #e0e1dd;
        font-family: "Microsoft JhengHei", sans-serif;
        font-size: 16px;
        letter-spacing: 2px;
        font-weight: bold;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      body {
        background-color: #0d1b2a;
        font-family: "Microsoft JhengHei", sans-serif;
        margin: 0;
        padding: 0;
        background-image: url("index_back.jpeg");
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        background-attachment: fixed;
        overflow-x: hidden;
      }

      /* 流星 Canvas 畫布樣式 */
      #meteorCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* 讓滑鼠點擊可以穿透畫布，不影響按鈕操作 */
        z-index: 1; /* 位於背景圖之上，網頁內容之下 */
      }

      /* 頁首圖片容器 */
      .header-banner-container {
        width: 100%;
        text-align: center;
        margin: 0 auto;
        background: transparent;
        padding-top: 15px;
        padding-bottom: 10px;
      }

      /* Logo 注入立體去背陰影與科技感雙重動態效果 */
      .header-banner {
        width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
        max-height: 95vh;
        object-fit: contain;

        filter: drop-shadow(0px 8px 12px rgba(0, 0, 0, 0.7))
          drop-shadow(0px 0px 8px rgba(22, 136, 103, 0.3));

        animation:
          fadeIn 1.2s ease-in,
          floating 4s ease-in-out infinite,
          neon-glow 3s ease-in-out infinite alternate;
      }

      /* 3D 磁懸浮上下緩慢浮動 */
      @keyframes floating {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      /* 流線光暈呼吸律動 */
      @keyframes neon-glow {
        0% {
          filter: drop-shadow(0px 8px 12px rgba(0, 0, 0, 0.7))
            drop-shadow(0px 0px 6px rgba(22, 136, 103, 0.2));
        }
        100% {
          filter: drop-shadow(0px 12px 18px rgba(0, 0, 0, 0.8))
            drop-shadow(0px 0px 15px rgba(22, 136, 103, 0.55));
        }
      }

      .container {
        width: 85%;
        max-width: 500px;
        margin: 0 auto;
        padding-top: 5px;
      }

      h1.hidden-title {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      #datetime {
        text-align: center;
        font-size: 16px;
        color: #e0e1dd;
        margin-top: 5px;
        margin-bottom: 20px;
        font-weight: bold;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      }

      .button-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin-bottom: 30px;
      }

      .btn-toggle-section {
        display: block;
        background: linear-gradient(
          135deg,
          rgba(11, 81, 59, 0.75),
          rgba(22, 136, 103, 0.75)
        );
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 30px;
        padding: 14px 26px;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        text-align: center;
        transition: all 0.3s ease;
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
        margin: 8px 0 4px;
      }

      .btn-toggle-section:hover {
        background: linear-gradient(
          135deg,
          rgba(15, 105, 77, 0.85),
          rgba(28, 163, 124, 0.85)
        );
        box-shadow: 0 6px 18px rgba(22, 136, 103, 0.4);
        transform: scale(1.02);
      }

      .btn-toggle-section:active {
        transform: scale(0.98);
      }

      .collapse-content {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 100%;
        margin-bottom: 4px;
        animation: slideIn 0.4s ease;
      }

      .btn {
        display: block;
        background-color: rgba(240, 248, 245, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #0b513b;
        text-decoration: none;
        border-radius: 30px;
        padding: 14px 26px;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        text-align: center;
        transition: all 0.3s ease;
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.4);
        transform: scale(0.98);
      }

      .btn:hover {
        background-color: rgba(212, 238, 228, 0.85);
        border: 1px solid rgba(11, 81, 59, 0.3);
        color: #0f694d;
        transform: scale(1.03);
      }

      .btn:active {
        transform: scale(0.95);
      }

      footer {
        text-align: center;
        padding: 20px 10px;
        font-size: 0.85em;
        color: #ffffff;
        font-weight: bold;
        text-shadow: none;
      }

      .audio-control-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: rgba(22, 136, 103, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        z-index: 9999;
        transition: all 0.3s ease;
      }
      .audio-control-btn:hover {
        transform: scale(1.1);
        background: rgba(22, 136, 103, 1);
      }

      @media (max-width: 480px) {
        .header-banner {
          max-height: none;
          width: 100%;
        }

          padding-top: 5px;

      @keyframes fadeIn {
        from {

        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideIn {
        from {
          transform: translateY(15px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 9999;

        cursor: pointer;
        margin: 0 6px;
      }

        background-color: #0b513b;
        color: white;
      }

      .modal-content .cancel-btn {
        background-color: #ddd;
        color: #444;
      }
    </style>

    <script>
      const bgMusic = document.getElementById("bgMusic");
      const musicToggle = document.getElementById("musicToggle");

      // 修改後的資源完全下載完畢控制：只負責關閉載入畫面，移除強制播放
      window.onload = function () {
        const loader = document.getElementById("loader-wrapper");
        const mainContent = document.getElementById("main-content");

        loader.style.opacity = "0";
        setTimeout(() => {
          loader.style.display = "none";
          mainContent.style.opacity = "1";
          // 這裡已移除原有的 playMusic(); 避免觸發瀏覽器阻擋
        }, 400);
      };

      // 音樂播放函式
      function playMusic() {
        bgMusic
          .play()
          .then(() => {
            musicToggle.textContent = "🎵";
          })
          .catch((err) => {

      /* ========================================================
         ✨ 全新加入：完美流星效果 Canvas 邏輯
         ======================================================== */
      const canvas = document.getElementById("meteorCanvas");
      const ctx = canvas.getContext("2d");

      // 自動調整 Canvas 畫布大小
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      // 流星陣列管理
      let meteors = [];

      // 產生單顆隨機流星的設定
      function createMeteor() {
        // 任何畫面上方與右側都可以當作起點
        const startX = Math.random() * (canvas.width * 1.5);
        const startY = Math.random() * (canvas.height * 0.4) - 50;

        // 隨機速度 (不宜太快)
        const speed = Math.random() * 3 + 2;
        // 隨機流星尾巴長度
        const length = Math.random() * 80 + 60;

        meteors.push({
          x: startX,
          y: startY,
          dx: -speed * 1.3, // 向左滑動速度
          dy: speed, // 向下滑動速度
          length: length,
          opacity: 1,
          fadeSpeed: Math.random() * 0.008 + 0.005, // 慢慢淡出的速度
        });
      }

      // 流星繪製與更新動畫
      function drawMeteors() {
        // 清除舊畫面，保持畫布透明
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < meteors.length; i++) {
          let m = meteors[i];

          // 繪製流星的漸層尾巴 (從純白到透明)
          let gradient = ctx.createLinearGradient(
            m.x,
            m.y,
            m.x - m.dx * (m.length / 10),
            m.y - m.dy * (m.length / 10),
          );
          gradient.addColorStop(0, `rgba(255, 255, 255, ${m.opacity})`);
          gradient.addColorStop(0.1, `rgba(230, 245, 255, ${m.opacity * 0.8})`);
          gradient.addColorStop(1, "rgba(255, 255, 255, 0)");

          ctx.beginPath();
          ctx.strokeStyle = gradient;
          ctx.lineWidth = 1.8; // 流星粗細度
          ctx.lineCap = "round";
          ctx.moveTo(m.x, m.y);
          ctx.lineTo(
            m.x + m.dx * (m.length / 15),
            m.y + m.dy * (m.length / 15),
          );
          ctx.stroke();

          // 更新流星座標與透明度
          m.x += m.dx;
          m.y += m.dy;
          m.opacity -= m.fadeSpeed;

          // 當流星跑出螢幕外或透明度歸零時標記移除
          if (m.y > canvas.height || m.x < 0 || m.opacity <= 0) {
            meteors.splice(i, 1);
            i--;
          }
        }

        // 控制場上的流星上限數量，避免太密集
        if (meteors.length < 5 && Math.random() < 0.004) {
          createMeteor();
        }

        requestAnimationFrame(drawMeteors);
      }

      // 啟動動畫
      drawMeteors();
    </script>
