<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>臺南郵局運輸股 - 班表入口</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* index2.html 華麗典雅紫系列 */
        --idx-purple-1: #8e44ad;
        --idx-purple-2: #5d3a91;
        --idx-purple-hover-1: #9b59b6;
        --idx-purple-hover-2: #6c40a6;
        --idx-bg: #fdf6fd;
        --idx-text-muted: #666666;

        /* vacation.html 樸素典雅暗綠系列 */
        --v-primary: #14b8a6;
        --v-bg-1: #06140f;
        --v-bg-2: #0f172a;
        --v-bg-3: #11251f;
        --v-line: rgba(255, 255, 255, 0.12);
        --v-text: #f8fafc;
        --v-muted: #9ca3af;
        --v-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }

      /* 整體容器：上下平分 */
      .split-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
      }

      /* ==========================================================================
       上半部：比照 index2.html (華麗炫酷・典雅紫調)
       ========================================================================== */
      .section-top {
        flex: 1;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-end; /* 靠向中央 */
        align-items: center;
        padding-bottom: 24px; /* 緊密間距 */
        background-color: var(--idx-bg);
        overflow: hidden;
        animation: idxFadeIn 1.2s ease-in;
      }

      /* 2.0版 上方新增的構思文字 */
      .top-intro-text {
        font-size: clamp(0.85rem, 3vw, 1.05rem);
        color: var(--idx-text-muted);
        font-weight: 500;
        margin-bottom: 12px;
        letter-spacing: 0.05em;
        text-align: center;
        padding: 0 15px;
        animation: idxSlideIn 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      /* 2.0版 華麗炫酷按鈕 */
      .btn-cool {
        display: block;
        background: linear-gradient(
          135deg,
          var(--idx-purple-1),
          var(--idx-purple-2)
        );
        color: #ffffff !important;
        border: none;
        border-radius: 30px;
        padding: 16px 36px;
        font-size: clamp(16px, 4.5vw, 22px);
        font-weight: bold;
        box-shadow: 0 6px 20px rgba(93, 58, 145, 0.4);
        text-align: center;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        letter-spacing: 0.05em;
        white-space: nowrap;
        animation: idxSlideIn 1s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      .btn-cool:hover {
        background: linear-gradient(
          135deg,
          var(--idx-purple-hover-1),
          var(--idx-purple-hover-2)
        );
        box-shadow: 0 10px 25px rgba(93, 58, 145, 0.6);
        transform: scale(1.05) translateY(-2px);
      }

      .btn-cool:active {
        transform: scale(0.98) translateY(0);
      }

      /* ==========================================================================
       下半部：比照 vacation.html (樸素典雅・極客科技)
       ========================================================================== */
      .section-bottom {
        flex: 1;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-start; /* 靠向中央 */
        align-items: center;
        padding-top: 24px; /* 緊密間距 */
        background:
          radial-gradient(
            circle at 50% 92%,
            rgba(167, 139, 250, 0.13),
            transparent 36%
          ),
          linear-gradient(
            135deg,
            var(--v-bg-1),
            var(--v-bg-2) 48%,
            var(--v-bg-3)
          );
        overflow: hidden;
      }

      /* 網格背景遮罩 */
      .section-bottom::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.035) 1px,
            transparent 1px
          );
        background-size: 44px 44px;
        mask-image: linear-gradient(to top, black, transparent 95%);
      }

      /* 3.0版 樸素典雅按鈕 */
      .btn-elegant {
        position: relative;
        z-index: 5;
        padding: 16px 36px;
        font-size: clamp(16px, 4.5vw, 22px);
        font-weight: 700;
        color: var(--v-text);
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.12),
          rgba(255, 255, 255, 0.035)
        );
        border: 1px solid rgba(52, 211, 153, 0.32);
        border-radius: 999px;
        cursor: pointer;
        text-decoration: none;
        box-shadow: var(--v-shadow);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        letter-spacing: 0.05em;
        white-space: nowrap;
        margin-bottom: 12px;
      }

      .btn-elegant span {
        background: linear-gradient(90deg, #ecfdf5, #34d399 45%, #38bdf8 90%);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
      }

      .btn-elegant:hover {
        transform: translateY(2px);
        border-color: #5eead4;
        box-shadow: 0 0 25px rgba(20, 184, 166, 0.35);
      }

      .btn-elegant:active {
        transform: translateY(1px);
      }

      /* 3.0版 下方新增的構思文字 */
      .bottom-intro-text {
        font-size: clamp(0.85rem, 3vw, 1.05rem);
        color: var(--v-muted);
        font-weight: 400;
        letter-spacing: 0.05em;
        text-align: center;
        padding: 0 15px;
      }

      /* ==========================================================================
       中間裝飾線
       ========================================================================== */
      .divider-line {
        position: absolute;
        left: 0;
        top: 50%;
        width: 100%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(142, 68, 173, 0.4),
          rgba(52, 211, 153, 0.4),
          transparent
        );
        z-index: 10;
        pointer-events: none;
      }

      /* 動態效果 Keyframes */
      @keyframes idxFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes idxSlideIn {
        from {
          transform: translateY(-20px) scale(0.95);
          opacity: 0;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="split-container">
      <!-- 上半部：index2.html 風格 (華麗炫酷紫) -> 連結至 index2.html -->
      <div class="section-top">
        <div class="top-intro-text">簡單純樸的經典核心</div>
        <a href="index2.html" class="btn-cool"> 臺南郵局運輸股 - 班表 2.0版 </a>
      </div>

      <!-- 中間分割線 -->
      <div class="divider-line"></div>

      <!-- 下半部：vacation.html 風格 (樸素典雅綠) -> 連結至 index1.html -->
      <div class="section-bottom">
        <a href="index1.html" class="btn-elegant">
          <span>台南郵局運輸股 - 班表 3.0版</span>
        </a>
        <div class="bottom-intro-text">全新演進的數據看板</div>
      </div>
    </div>
  </body>
</html>
