<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生活小知識</title>
    <link rel="stylesheet" href="style_trivia.css" />
  </head>
  <body>
    <script src="script_trivia.js"></script>
    <h1>生活小知識-隨機抽</h1>

    <div class="card-container">
      <div id="trivia-card" class="card">
        <div class="card-face card-front" id="front-face">
          <div class="icon-container">🔍</div>
          <h2 class="question-text">正在準備內容...</h2>
        </div>
        <div class="card-face card-back" id="back-face">
          <h2>解答載入中</h2>
        </div>
      </div>
    </div>

    <button class="btn-next" onclick="nextTrivia()">換一個試試</button>
  </body>
</html>
