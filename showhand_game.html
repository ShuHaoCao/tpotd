<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>巔峰對賭：梭哈</title>
     <link rel="stylesheet" href="style_showhand.css" />
  </head>
  <body>
     <script src="script_showhand.js"></script>
    <div id="login-screen">
      <h1 style="color: var(--gold); margin-bottom: 5px">巔峰對賭：梭哈</h1>
      <p id="welcome-back" style="color: #888; margin-bottom: 20px"></p>
      <div class="input-group">
        <input
          type="text"
          id="p-name"
          placeholder="輸入您的霸氣暱稱"
          maxlength="10"
        />
      </div>
      <button onclick="handleStartGame()">進入遊戲 / 繼續進度</button>
      <button onclick="toggleLB(true)" style="background: #555; color: white">
        查看英雄榜
      </button>
    </div>

    <div id="leaderboard-screen" style="display: none">
      <h2>英雄榜(前10名)</h2>
      <table id="lb-table">
        <thead>
          <tr>
            <th>排名</th>
            <th>玩家</th>
            <th>當前資產</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button onclick="toggleLB(false)">返回</button>
    </div>

    <div id="status-bar">歡迎來到賭神對決現場！</div>

    <div id="game-board">
      <div class="player-row">
        <div id="player-2" class="hand-area">
          <div class="info">
            <span class="name-label" id="name-2">電腦 B</span>
            <span class="chips" id="chips-2"></span>
          </div>
          <div class="cards-container" id="cards-2"></div>
        </div>
      </div>

      <div class="player-row" style="justify-content: space-between; flex: 1">
        <div id="player-1" class="hand-area">
          <div class="info">
            <span class="name-label" id="name-1">電腦 A</span>
            <span class="chips" id="chips-1"></span>
          </div>
          <div class="cards-container" id="cards-1"></div>
        </div>

        <div id="pot-area">
          <div class="info">底池金</div>
          <div class="pot-amount" id="main-pot">$0</div>
        </div>

        <div id="player-3" class="hand-area">
          <div class="info">
            <span class="name-label" id="name-3">電腦 C</span>
            <span class="chips" id="chips-3"></span>
          </div>
          <div class="cards-container" id="cards-3"></div>
        </div>
      </div>

      <div class="player-row">
        <div id="player-0" class="hand-area">
          <div class="info">
            <span class="name-label" id="display-name">玩家</span>
            <span class="chips" id="chips-0"></span>
          </div>
          <div class="cards-container" id="cards-0"></div>
        </div>
      </div>
    </div>

    <div id="controls">
      <button onclick="handleAction('fold')" id="btn-fold">蓋牌</button>
      <button onclick="handleAction('call')" id="btn-call">跟注</button>
      <button onclick="handleAction('raise')" id="btn-raise">加注</button>
      <button
        onclick="handleAction('allin')"
        id="btn-allin"
        style="background: #c0392b; color: white"
      >
        All-in
      </button>
      <button
        onclick="newGame()"
        id="btn-next"
        style="display: none; background: #2980b9; color: white"
      >
        下一局
      </button>
      <button
        onclick="resetMoney()"
        id="btn-reset"
        style="display: none; background: #7f8c8d; color: white"
      >
        破產重生
      </button>
    </div>
    <footer>
      <div class="copyright">© 2025 CaoShuHao 版權所有，請勿抄襲</div>
    </footer>
  </body>
</html>
