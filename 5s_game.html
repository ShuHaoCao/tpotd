<!doctype html>
<html lang="zh-TW">
  <head>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-0VSMGFF0E6"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-0VSMGFF0E6");
    </script>

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>五子連珠：指尖佈局</title>

    <style>
      :root {
        --bg-0: #080706;
        --bg-1: #15110d;
        --bg-2: #241b12;
        --gold: #d8b46a;
        --gold-soft: rgba(216, 180, 106, 0.2);
        --gold-strong: #f3d58a;
        --text: #f8efe0;
        --muted: #b8a994;
        --danger: #ff6565;
        --success: #8ee6b2;
        --panel: rgba(31, 25, 19, 0.72);
        --panel-light: rgba(255, 255, 255, 0.07);
        --border: rgba(255, 231, 180, 0.18);
        --board-bg: #c79543;
        --board-line: rgba(50, 29, 12, 0.72);
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family:
          "Microsoft JhengHei",
          "PingFang TC",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at 20% 10%,
            rgba(216, 180, 106, 0.18),
            transparent 28%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(112, 64, 26, 0.32),
            transparent 30%
          ),
          radial-gradient(
            circle at 50% 100%,
            rgba(216, 180, 106, 0.08),
            transparent 34%
          ),
          linear-gradient(135deg, var(--bg-0), var(--bg-1) 48%, #090807);
        overflow-x: hidden;
        touch-action: manipulation;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 48px 48px;
        mask-image: radial-gradient(circle at center, black, transparent 78%);
      }

      body::after {
        content: "五子連珠";
        position: fixed;
        right: -2rem;
        bottom: 4rem;
        color: rgba(255, 255, 255, 0.025);
        font-size: clamp(4rem, 16vw, 13rem);
        font-weight: 900;
        writing-mode: vertical-rl;
        letter-spacing: 0.16em;
        pointer-events: none;
      }

      button,
      select,
      input {
        font-family: inherit;
      }

      .app-shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: clamp(18px, 4vw, 44px);
        position: relative;
        z-index: 1;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        color: #19120b;
        font-size: 26px;
        font-weight: 900;
        background: radial-gradient(
          circle at 35% 25%,
          #fff3bd,
          var(--gold) 46%,
          #8d5f25 100%
        );
        box-shadow:
          0 10px 28px rgba(216, 180, 106, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.75);
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.7rem, 4vw, 3.3rem);
        letter-spacing: 0.08em;
        line-height: 1;
      }

      .brand p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
        letter-spacing: 0.08em;
      }

      .player-card {
        min-width: 210px;
        border: 1px solid var(--border);
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0.025)
        );
        backdrop-filter: blur(18px);
        border-radius: 22px;
        padding: 14px 16px;
        box-shadow: var(--shadow);
      }

      .player-label {
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .player-name {
        margin-top: 6px;
        font-size: 1.18rem;
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(260px, 330px) minmax(320px, 620px) minmax(
            260px,
            330px
          );
        gap: 22px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--border);
        background:
          linear-gradient(
            160deg,
            rgba(255, 255, 255, 0.09),
            rgba(255, 255, 255, 0.025)
          ),
          var(--panel);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(20px);
        overflow: hidden;
      }

      .panel-inner {
        padding: 20px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .section-title h2,
      .section-title h3 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.12em;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(216, 180, 106, 0.34);
        border-radius: 999px;
        padding: 7px 11px;
        color: var(--gold-strong);
        background: rgba(216, 180, 106, 0.09);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .status-card {
        position: relative;
        padding: 18px;
        border-radius: 22px;
        background:
          radial-gradient(
            circle at 10% 0%,
            rgba(243, 213, 138, 0.18),
            transparent 40%
          ),
          rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .status-card::after {
        content: "";
        position: absolute;
        inset: auto -20% -60% 20%;
        height: 100px;
        background: radial-gradient(
          circle,
          rgba(216, 180, 106, 0.24),
          transparent 70%
        );
        filter: blur(16px);
      }

      #status {
        position: relative;
        z-index: 1;
        min-height: 2.2em;
        margin: 0;
        font-size: 1.05rem;
        font-weight: 900;
        line-height: 1.45;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-top: 14px;
      }

      .stat-box {
        border-radius: 18px;
        padding: 13px;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .stat-value {
        display: block;
        font-size: 1.28rem;
        font-weight: 900;
      }

      .stat-label {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 0.76rem;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .field label {
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      select,
      input {
        width: 100%;
        color: var(--text);
        background: rgba(255, 255, 255, 0.075);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        padding: 12px 14px;
        outline: none;
      }

      select:focus,
      input:focus {
        border-color: rgba(243, 213, 138, 0.65);
        box-shadow: 0 0 0 4px rgba(216, 180, 106, 0.12);
      }

      select option {
        color: #222;
        background: #f7ead2;
      }

      .button-stack {
        display: grid;
        gap: 10px;
      }

      .btn {
        border: 0;
        cursor: pointer;
        border-radius: 17px;
        padding: 13px 15px;
        color: #21160a;
        background: linear-gradient(135deg, #f7dc93, var(--gold) 55%, #a8722e);
        font-weight: 900;
        letter-spacing: 0.08em;
        box-shadow:
          0 12px 30px rgba(216, 180, 106, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.62);
        transition:
          transform 0.2s ease,
          filter 0.2s ease,
          box-shadow 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.06);
        box-shadow:
          0 16px 34px rgba(216, 180, 106, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .btn:active {
        transform: translateY(1px) scale(0.99);
      }

      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        filter: grayscale(0.8);
        transform: none;
      }

      .btn.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: none;
      }

      .btn.danger {
        color: #fff;
        background: linear-gradient(135deg, #8d2d2d, #5d1f1f);
        box-shadow: 0 14px 30px rgba(141, 45, 45, 0.2);
      }

      .board-panel {
        padding: clamp(12px, 2.2vw, 20px);
      }

      .board-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 4px 6px 16px;
      }

      .turn-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 9px 13px;
        background: rgba(0, 0, 0, 0.22);
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .stone-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: inline-block;
        background: radial-gradient(circle at 30% 24%, #5f5f5f, #050505 70%);
        box-shadow: 0 0 18px rgba(255, 255, 255, 0.16);
      }

      #board-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: clamp(22px, 4vw, 34px);
        overflow: hidden;
        background:
          radial-gradient(
            circle at 25% 20%,
            rgba(255, 229, 162, 0.35),
            transparent 20%
          ),
          radial-gradient(
            circle at 80% 75%,
            rgba(73, 39, 12, 0.28),
            transparent 35%
          ),
          repeating-linear-gradient(
            95deg,
            rgba(255, 255, 255, 0.04) 0 2px,
            transparent 2px 11px
          ),
          linear-gradient(135deg, #e0b65b, var(--board-bg) 48%, #9a6025);
        box-shadow:
          0 28px 80px rgba(0, 0, 0, 0.48),
          inset 0 2px 1px rgba(255, 255, 255, 0.36),
          inset 0 -12px 30px rgba(69, 35, 9, 0.28);
        border: 1px solid rgba(255, 237, 178, 0.36);
      }

      #board-wrapper::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: clamp(18px, 3vw, 26px);
        border: 1px solid rgba(59, 35, 12, 0.38);
        pointer-events: none;
        z-index: 3;
      }

      #board-wrapper::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          rgba(255, 255, 255, 0.18),
          transparent 24%,
          transparent 70%,
          rgba(0, 0, 0, 0.12)
        );
        pointer-events: none;
        z-index: 4;
      }

      #board {
        display: grid;
        grid-template-columns: repeat(15, 1fr);
        grid-template-rows: repeat(15, 1fr);
        width: 100%;
        height: 100%;
        position: absolute;
        inset: 0;
        z-index: 6;
        padding: 0;
      }

      .grid-lines {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      .line-h,
      .line-v {
        position: absolute;
        background-color: var(--board-line);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .dot {
        position: absolute;
        width: 7px;
        height: 7px;
        background: radial-gradient(circle, #3b210d, #140b04);
        border-radius: 50%;
        z-index: 3;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 0 2px rgba(255, 231, 180, 0.08);
      }

      .cell {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .cell::before {
        content: "";
        position: absolute;
        width: 72%;
        height: 72%;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.13);
        transform: scale(0.4);
        opacity: 0;
        transition: 0.18s ease;
      }

      .cell:hover::before {
        opacity: 1;
        transform: scale(1);
      }

      .piece {
        width: 76%;
        height: 76%;
        border-radius: 50%;
        z-index: 10;
        position: relative;
        animation: stoneDrop 0.22s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      }

      .piece.black {
        background:
          radial-gradient(
            circle at 30% 23%,
            #787878 0%,
            #252525 24%,
            #030303 72%
          ),
          #000;
        box-shadow:
          0 8px 14px rgba(0, 0, 0, 0.52),
          inset -5px -7px 10px rgba(0, 0, 0, 0.8),
          inset 3px 3px 6px rgba(255, 255, 255, 0.18);
      }

      .piece.white {
        background:
          radial-gradient(
            circle at 28% 22%,
            #ffffff 0%,
            #fff7e6 28%,
            #d6c7ac 78%
          ),
          #f6edda;
        border: 1px solid rgba(82, 65, 43, 0.25);
        box-shadow:
          0 8px 14px rgba(0, 0, 0, 0.32),
          inset -4px -5px 10px rgba(102, 84, 54, 0.2),
          inset 4px 4px 7px rgba(255, 255, 255, 0.95);
      }

      .last-move::after {
        content: "";
        position: absolute;
        width: 34%;
        height: 34%;
        top: 50%;
        left: 50%;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        border: 2px solid rgba(255, 77, 77, 0.95);
        box-shadow: 0 0 14px rgba(255, 77, 77, 0.72);
        animation: pulseRing 1.35s infinite ease-in-out;
      }

      @keyframes stoneDrop {
        from {
          transform: translateY(-10px) scale(0.3);
          opacity: 0;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      @keyframes pulseRing {
        0%,
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(0.9);
        }
        50% {
          opacity: 0.55;
          transform: translate(-50%, -50%) scale(1.25);
        }
      }

      .leader-list {
        display: grid;
        gap: 10px;
      }

      .leader-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .rank-medal {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        color: #21160a;
        font-weight: 950;
        background: linear-gradient(135deg, #f7dc93, var(--gold));
      }

      .leader-name {
        font-weight: 900;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .leader-meta {
        color: var(--muted);
        font-size: 0.76rem;
        margin-top: 3px;
      }

      .leader-steps {
        color: var(--gold-strong);
        font-weight: 950;
        text-align: right;
      }

      .empty-rank {
        padding: 18px;
        border-radius: 18px;
        text-align: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.045);
        border: 1px dashed rgba(255, 255, 255, 0.14);
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 22px;
        background:
          radial-gradient(
            circle at 30% 20%,
            rgba(216, 180, 106, 0.25),
            transparent 30%
          ),
          rgba(0, 0, 0, 0.82);
        backdrop-filter: blur(12px);
      }

      .modal {
        width: min(420px, 100%);
        border-radius: 32px;
        padding: 28px;
        color: var(--text);
        border: 1px solid rgba(255, 231, 180, 0.2);
        background:
          linear-gradient(
            150deg,
            rgba(255, 255, 255, 0.12),
            rgba(255, 255, 255, 0.04)
          ),
          #17110c;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.7);
        text-align: center;
      }

      .modal-logo {
        width: 76px;
        height: 76px;
        margin: 0 auto 18px;
        border-radius: 26px;
        display: grid;
        place-items: center;
        color: #21160a;
        font-size: 36px;
        font-weight: 950;
        background: radial-gradient(
          circle at 32% 25%,
          #fff4bd,
          var(--gold) 50%,
          #8d5f25
        );
      }

      .modal h3 {
        margin: 0;
        font-size: 1.55rem;
        letter-spacing: 0.1em;
      }

      .modal p {
        color: var(--muted);
        margin: 12px 0 20px;
        line-height: 1.7;
      }

      .hidden {
        display: none !important;
      }

      footer {
        margin-top: 28px;
        text-align: center;
        color: rgba(248, 239, 224, 0.42);
        font-size: 12px;
        letter-spacing: 0.08em;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .side-left {
          order: 2;
        }

        .board-panel {
          order: 1;
        }

        .side-right {
          order: 3;
        }
      }

      @media (max-width: 640px) {
        .app-shell {
          padding: 14px;
        }

        .topbar {
          grid-template-columns: 1fr;
        }

        .player-card {
          min-width: 0;
        }

        .brand-mark {
          width: 46px;
          height: 46px;
          border-radius: 16px;
        }

        .brand p {
          font-size: 0.8rem;
        }

        .panel,
        .modal {
          border-radius: 24px;
        }

        .panel-inner {
          padding: 16px;
        }

        .board-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>

  <body>
    <audio
      id="soundPlayer"
      src="5s_sound_stone_player.mp3"
      preload="auto"
    ></audio>
    <audio id="soundAI" src="5s_sound_stone_ai.mp3" preload="auto"></audio>
    <audio id="soundWin" src="5s_sound_win.mp3" preload="auto"></audio>

    <div id="overlay" class="modal-overlay">
      <div class="modal">
        <div class="modal-logo">五</div>
        <h3>五子連珠</h3>
        <p>一子落下，局勢開花。請留下你的棋士名號，準備開局。</p>
        <div class="field">
          <input
            type="text"
            id="nameInput"
            placeholder="請輸入您的暱稱"
            autocomplete="off"
          />
        </div>
        <button class="btn" onclick="saveNameAndStart()" style="width: 100%">
          開始對戰
        </button>
      </div>
    </div>

    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">五</div>
          <div>
            <h1>五子連珠</h1>
            <p>指尖佈局，黑白之間見勝負。</p>
          </div>
        </div>

        <div class="player-card">
          <div class="player-label">Current Player</div>
          <div id="playerNameDisplay" class="player-name">未登入棋士</div>
        </div>
      </header>

      <section class="layout">
        <aside class="panel side-left">
          <div class="panel-inner">
            <div class="section-title">
              <h2>對局控制</h2>
              <span class="badge">LIVE</span>
            </div>

            <div class="status-card">
              <p id="status">準備中...</p>
              <div class="stats-grid">
                <div class="stat-box">
                  <span id="stepCount" class="stat-value">0</span>
                  <span class="stat-label">玩家步數</span>
                </div>
                <div class="stat-box">
                  <span id="moveCount" class="stat-value">0</span>
                  <span class="stat-label">總落子</span>
                </div>
              </div>
            </div>

            <div style="height: 16px"></div>

            <div class="field">
              <label for="difficulty">AI 難度</label>
              <select id="difficulty" onchange="resetGame()">
                <option value="0.5">容易｜新手試煉</option>
                <option value="0.8" selected>普通｜穩健老手</option>
                <option value="1.2">困難｜棋局壓迫</option>
              </select>
            </div>

            <div class="button-stack">
              <button class="btn" onclick="resetGame()">重開一局</button>
              <button class="btn secondary" id="undoBtn" onclick="undoMove()">
                悔棋一次
              </button>
              <button class="btn secondary" onclick="changePlayerName()">
                更換暱稱
              </button>
              <button class="btn danger" onclick="clearRecord()">
                清除本難度紀錄
              </button>
            </div>
          </div>
        </aside>

        <section class="panel board-panel">
          <div class="board-header">
            <div>
              <div class="badge">GOMOKU BOARD</div>
            </div>
            <div class="turn-pill">
              <span class="stone-dot"></span><span id="turnText">黑子先行</span>
            </div>
          </div>

          <div id="board-wrapper">
            <div class="grid-lines" id="gridLines"></div>
            <div id="board"></div>
          </div>
        </section>

        <aside class="panel side-right">
          <div class="panel-inner">
            <div class="section-title">
              <h3>戰績殿堂</h3>
              <span class="badge"><span id="rankTitle">普通</span></span>
            </div>
            <div id="rankBody" class="leader-list"></div>
          </div>
        </aside>
      </section>

      <footer>
        <div class="copyright">© 2025 CaoShuHao 版權所有，請勿抄襲</div>
      </footer>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        query,
        where,
        orderBy,
        limit,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCX5p1hll1sIjR4Gsp6o1_v1wQgvyXWUfo",
        authDomain: "fir-game-64891.firebaseapp.com",
        projectId: "fir-game-64891",
        storageBucket: "fir-game-64891.firebasestorage.app",
        messagingSenderId: "357308899829",
        appId: "1:357308899829:web:b2f90ada9885a3f620c0bc",
        measurementId: "G-NK8C83YYCD",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const SIZE = 15;
      let board = [];
      let isGameOver = false;
      let playerName = "";
      let playerSteps = 0;
      let history = [];
      let aiThinking = false;

      window.onload = () => {
        const savedName = localStorage.getItem("gomoku_user");
        if (savedName) {
          playerName = savedName;
          document.getElementById("overlay").classList.add("hidden");
          initGame();
        } else {
          updatePlayerDisplay();
        }
        updateLeaderboard();
      };

      function saveNameAndStart() {
        const val = document.getElementById("nameInput").value.trim();
        playerName = val || "無名大師";
        localStorage.setItem("gomoku_user", playerName);
        document.getElementById("overlay").classList.add("hidden");
        initGame();
      }

      function changePlayerName() {
        document.getElementById("nameInput").value = playerName || "";
        document.getElementById("overlay").classList.remove("hidden");
      }

      function updatePlayerDisplay() {
        document.getElementById("playerNameDisplay").innerText =
          playerName || "未登入棋士";
      }

      function initGame() {
        board = Array(SIZE)
          .fill(0)
          .map(() => Array(SIZE).fill(0));
        isGameOver = false;
        aiThinking = false;
        playerSteps = 0;
        history = [];
        updatePlayerDisplay();
        setStatus("⚫ 您的回合。黑子先行，氣勢先到。", "黑子先行");
        document.getElementById("undoBtn").disabled = false;
        renderBoard();
        updateStats();
        updateLeaderboard();
      }

      function setStatus(message, turnText) {
        document.getElementById("status").innerText = message;
        if (turnText) document.getElementById("turnText").innerText = turnText;
      }

      function updateStats() {
        document.getElementById("stepCount").innerText = playerSteps;
        document.getElementById("moveCount").innerText = history.length;
      }

      function renderBoard() {
        const boardEl = document.getElementById("board");
        const linesEl = document.getElementById("gridLines");
        boardEl.innerHTML = "";
        linesEl.innerHTML = "";

        for (let i = 0; i < SIZE; i++) {
          const pos = (i + 0.5) * (100 / SIZE);
          const lineLen = 100 - 100 / SIZE;
          const lineStart = 0.5 * (100 / SIZE);

          const hLine = document.createElement("div");
          hLine.className = "line-h";
          hLine.style.top = `${pos}%`;
          hLine.style.left = `${lineStart}%`;
          hLine.style.width = `${lineLen}%`;
          hLine.style.height = "1px";
          linesEl.appendChild(hLine);

          const vLine = document.createElement("div");
          vLine.className = "line-v";
          vLine.style.left = `${pos}%`;
          vLine.style.top = `${lineStart}%`;
          vLine.style.height = `${lineLen}%`;
          vLine.style.width = "1px";
          linesEl.appendChild(vLine);
        }

        const stars = [
          [3, 3],
          [3, 11],
          [7, 7],
          [11, 3],
          [11, 11],
        ];

        stars.forEach(([r, c]) => {
          const dot = document.createElement("div");
          dot.className = "dot";
          dot.style.top = `${(r + 0.5) * (100 / SIZE)}%`;
          dot.style.left = `${(c + 0.5) * (100 / SIZE)}%`;
          linesEl.appendChild(dot);
        });

        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.id = `cell-${r}-${c}`;
            cell.onclick = () => playerMove(r, c);
            boardEl.appendChild(cell);
          }
        }
      }

      function playAudio(id) {
        const audio = document.getElementById(id);
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(() => {});
        }
      }

      function playerMove(r, c) {
        if (isGameOver || aiThinking || board[r][c] !== 0) return;

        placePiece(r, c, 1);
        playerSteps++;
        history.push({ r, c, type: 1 });
        updateStats();
        playAudio("soundPlayer");

        if (checkWin(r, c, 1)) {
          endGame(`🏆 ${playerName} 獲勝！這手棋，漂亮到有點不講武德。`);
          playAudio("soundWin");
          saveResult(playerName, playerSteps);
          return;
        }

        aiThinking = true;
        setStatus("◯ AI 正在推演局勢，棋盤開始有點不安。", "AI 思考中");
        setTimeout(aiMove, 360);
      }

      function placePiece(r, c, type) {
        board[r][c] = type;
        const cell = document.getElementById(`cell-${r}-${c}`);

        const last = document.querySelector(".last-move");
        if (last) last.classList.remove("last-move");

        const p = document.createElement("div");
        p.className = `piece ${type === 1 ? "black" : "white"} last-move`;
        cell.appendChild(p);
      }

      function aiMove() {
        if (isGameOver) return;

        let bestScore = -1;
        let move = { r: 7, c: 7 };
        const diffWeight = parseFloat(
          document.getElementById("difficulty").value,
        );

        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (board[r][c] === 0) {
              let score = evaluate(r, c, 2) + evaluate(r, c, 1) * diffWeight;

              const centerBias = 14 - (Math.abs(r - 7) + Math.abs(c - 7));
              score += centerBias * 0.3;

              if (score > bestScore) {
                bestScore = score;
                move = { r, c };
              }
            }
          }
        }

        placePiece(move.r, move.c, 2);
        history.push({ r: move.r, c: move.c, type: 2 });
        updateStats();
        playAudio("soundAI");
        aiThinking = false;

        if (checkWin(move.r, move.c, 2)) {
          endGame("◯ 電腦獲勝。它沒有感情，但它真的很會堵路。");
        } else {
          setStatus("⚫ 您的回合。棋路未盡，下一手才是靈魂。", "黑子回合");
        }
      }

      function undoMove() {
        if (isGameOver || aiThinking || history.length < 2) return;

        for (let i = 0; i < 2; i++) {
          const last = history.pop();
          board[last.r][last.c] = 0;
          const cell = document.getElementById(`cell-${last.r}-${last.c}`);
          cell.innerHTML = "";
        }

        playerSteps = Math.max(0, playerSteps - 1);

        if (history.length > 0) {
          const prev = history[history.length - 1];
          const prevCell = document.getElementById(`cell-${prev.r}-${prev.c}`);
          if (prevCell.firstChild)
            prevCell.firstChild.classList.add("last-move");
        }

        updateStats();
        setStatus("↩ 已悔棋。這不叫後悔，這叫戰略性重寫命運。", "黑子回合");
      }

      function evaluate(r, c, type) {
        let total = 0;
        const dirs = [
          [1, 0],
          [0, 1],
          [1, 1],
          [1, -1],
        ];

        for (let [dr, dc] of dirs) {
          let count = 1;
          let block = 0;

          for (let i = 1; i < 5; i++) {
            let nr = r + dr * i;
            let nc = c + dc * i;
            if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) {
              block++;
              break;
            }
            if (board[nr][nc] === type) count++;
            else if (board[nr][nc] === 0) break;
            else {
              block++;
              break;
            }
          }

          for (let i = 1; i < 5; i++) {
            let nr = r - dr * i;
            let nc = c - dc * i;
            if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) {
              block++;
              break;
            }
            if (board[nr][nc] === type) count++;
            else if (board[nr][nc] === 0) break;
            else {
              block++;
              break;
            }
          }

          if (count >= 5) total += 100000;
          else if (count === 4) total += block === 0 ? 10000 : 1000;
          else if (count === 3) total += block === 0 ? 1000 : 100;
          else if (count === 2) total += block === 0 ? 100 : 10;
        }

        return total;
      }

      function checkWin(r, c, type) {
        const dirs = [
          [1, 0],
          [0, 1],
          [1, 1],
          [1, -1],
        ];

        for (let [dr, dc] of dirs) {
          let cnt = 1;

          for (let i = 1; i < 5; i++) {
            let nr = r + dr * i;
            let nc = c + dc * i;
            if (
              nr >= 0 &&
              nr < SIZE &&
              nc >= 0 &&
              nc < SIZE &&
              board[nr][nc] === type
            )
              cnt++;
            else break;
          }

          for (let i = 1; i < 5; i++) {
            let nr = r - dr * i;
            let nc = c - dc * i;
            if (
              nr >= 0 &&
              nr < SIZE &&
              nc >= 0 &&
              nc < SIZE &&
              board[nr][nc] === type
            )
              cnt++;
            else break;
          }

          if (cnt >= 5) return true;
        }

        return false;
      }

      function endGame(msg) {
        isGameOver = true;
        aiThinking = false;
        setStatus(msg, "對局結束");
        document.getElementById("undoBtn").disabled = true;
      }

      function getDiffKey() {
        const sel = document.getElementById("difficulty");
        return "gomoku_ranks_" + sel.value;
      }

      async function saveResult(name, steps) {
        await addDoc(collection(db, "gomoku_rankings"), {
          name: name,
          steps: steps,
          difficulty: getDiffKey(),
          dateText: new Date().toLocaleDateString("zh-TW"),
          createdAt: serverTimestamp(),
        });

        await updateLeaderboard();
      }
      async function updateLeaderboard() {
        const sel = document.getElementById("difficulty");
        const rankTitle = sel.options[sel.selectedIndex].text.split("｜")[0];
        document.getElementById("rankTitle").innerText = rankTitle;

        const q = query(
          collection(db, "gomoku_rankings"),
          where("difficulty", "==", getDiffKey()),
          orderBy("steps", "asc"),
          limit(10),
        );

        const snapshot = await getDocs(q);
        const list = [];

        snapshot.forEach((doc) => {
          list.push(doc.data());
        });

        const rankBody = document.getElementById("rankBody");

        if (!list.length) {
          rankBody.innerHTML = `<div class="empty-rank">尚無紀錄。第一個留名的人，通常比較像傳說。</div>`;
          return;
        }

        rankBody.innerHTML = list
          .map((item, i) => {
            const medal =
              i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : i + 1;

            return `
        <div class="leader-item">
          <div class="rank-medal">${medal}</div>
          <div>
            <div class="leader-name">${escapeHtml(item.name)}</div>
            <div class="leader-meta">${item.dateText || ""}</div>
          </div>
          <div class="leader-steps">
            ${item.steps}<br>
            <span style="font-size:.7rem;color:var(--muted);font-weight:700">步</span>
          </div>
        </div>
      `;
          })
          .join("");
      }

      function resetGame() {
        initGame();
      }

      function clearRecord() {
        alert(
          "雲端排行榜不建議讓玩家直接清除。若要刪除紀錄，請到 Firebase Console 管理。",
        );
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      document.oncontextmenu = function () {
        console.warn("系統提示：為了保護排版參數，已禁用右鍵功能。");
        return false;
      };

      document.onkeydown = function (e) {
        if (
          e.keyCode === 123 ||
          (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
          (e.ctrlKey && e.keyCode === 85)
        ) {
          console.warn("系統提示：禁止開啟開發者工具或檢視原始碼。");
          return false;
        }
      };

      (function () {
        const warningStyle =
          "font-size: 20px; color: red; font-weight: bold; background: yellow; padding: 10px;";
        const infoStyle = "font-size: 14px; color: #333;";
        console.log("%c⚠️ 警告：版權所有 ⚠️", warningStyle);
        console.log(
          "%c本程式由 CaoShuHao 開發，專供台南郵局運輸股內部使用。",
          infoStyle,
        );
        console.log(
          "%c未經授權嚴禁複製、修改或轉載原始碼。所有排版參數均受保護。",
          infoStyle,
        );
      })();

      window.onresize = function () {
        if (
          window.outerHeight - window.innerHeight > 260 ||
          window.outerWidth - window.innerWidth > 260
        ) {
          console.warn(
            "偵測到視窗尺寸異常變化。若為開發者工具造成，正式環境可啟用封鎖畫面。",
          );
        }
      };

      const allowedHosts = [
        "shuhaocao.github.io",
        "localhost",
        "127.0.0.1",
        "",
      ];
      if (!allowedHosts.includes(window.location.hostname)) {
        document.documentElement.innerHTML =
          "<h1 style='text-align:center;margin-top:100px;'>授權無效：此工具僅限官方網址使用。</h1>";
        window.stop();
      }

      async function validateAccess() {
        if (window.location.protocol === "file:") return;
        try {
          const resp = await fetch("access.json", { cache: "no-store" });
          const config = await resp.json();
          if (config.status !== "active") {
            throw new Error("系統已停用");
          }
        } catch (e) {
          console.warn(
            "驗證失敗或找不到 access.json。正式部署時請確認檔案存在。",
            e,
          );
        }
      }

      validateAccess();
    </script>
  </body>
