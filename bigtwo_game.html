<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>群星大亂鬥賓果 - 競技版</title>
    <style>
      :root {
        --primary-color: #3498db;
        --secondary-color: #e67e22;
        --bg-color: #f4f7f6;
        --cell-size: 50px;
        --winner-color: #27ae60;
      }

      @media (max-width: 600px) {
        :root {
          --cell-size: 44px;
        }
        .game-container {
          flex-direction: column;
          align-items: center;
        }
        .board-wrapper {
          width: 95%;
          max-width: 320px;
        }
      }

      body {
        font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: var(--bg-color);
        margin: 0;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #message-box {
        width: 90%;
        max-width: 450px;
        margin: 10px 0;
        padding: 15px;
        background: #2c3e50;
        color: white;
        border-radius: 15px;
        font-size: 1.1rem;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        min-height: 1.5em;
      }

      .controls {
        margin-bottom: 15px;
        display: flex;
        gap: 10px;
      }

      .btn {
        padding: 10px 20px;
        font-size: 1rem;
        font-weight: bold;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: 0.1s;
      }

      .btn-reset { background: var(--secondary-color); box-shadow: 0 4px 0 #d35400; }
      .btn-name { background: #95a5a6; box-shadow: 0 4px 0 #7f8c8d; }

      .btn:active {
        transform: translateY(3px);
        box-shadow: none;
      }

      .game-container {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
        width: 100%;
      }

      .board-wrapper {
        background: white;
        padding: 12px;
        border-radius: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        text-align: center;
        border-top: 6px solid #ccc;
        transition: 0.3s;
      }
      .board-wrapper.active {
        border-top-color: var(--primary-color);
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }

      h2 { margin: 5px 0; font-size: 0.95rem; color: #34495e; }

      .board {
        display: grid;
        grid-template-columns: repeat(5, var(--cell-size));
        grid-gap: 5px;
        margin: 10px auto;
      }

      .cell {
        width: var(--cell-size);
        height: var(--cell-size);
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ecf0f1;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        color: #2c3e50;
        -webkit-tap-highlight-color: transparent;
      }
      .cell.marked {
        background: #ff4757;
        color: white;
        animation: pop 0.3s;
      }

      @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }

      .npc-board .cell { cursor: default; }
      .status { margin-top: 8px; font-weight: bold; color: #7f8c8d; font-size: 0.85rem; }

      /* 排行榜樣式 */
      .leaderboard {
        width: 90%;
        max-width: 450px;
        margin-top: 30px;
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      }
      .leaderboard h3 { margin-top: 0; text-align: center; color: #2c3e50; }
      .leaderboard table { width: 100%; border-collapse: collapse; }
      .leaderboard th { border-bottom: 2px solid #eee; padding: 10px; color: #7f8c8d; }
      .leaderboard td { padding: 8px; text-align: center; border-bottom: 1px solid #f9f9f9; }
      .rank-1 { color: #f1c40f; font-weight: bold; }
    </style>
  </head>
  <body>
    <div id="message-box">👋 歡迎來到賓果大賽</div>

    <div class="controls">
      <button class="btn btn-reset" onclick="resetGame()">♻️ 重新配對</button>
      <button class="btn btn-name" onclick="askPlayerName(true)">👤 修改名稱</button>
    </div>

    <div class="game-container">
      <div id="wrapper-0" class="board-wrapper active">
        <h2 id="title-0">載入中...</h2>
        <div id="board-0" class="board"></div>
        <div id="status-0" class="status">連線數: 0</div>
      </div>
      <div id="wrapper-1" class="board-wrapper">
        <h2 id="title-1">載入中...</h2>
        <div id="board-1" class="board npc-board"></div>
        <div id="status-1" class="status">連線數: 0</div>
      </div>
      <div id="wrapper-2" class="board-wrapper">
        <h2 id="title-2">載入中...</h2>
        <div id="board-2" class="board npc-board"></div>
        <div id="status-2" class="status">連線數: 0</div>
      </div>
    </div>

    <div class="leaderboard">
      <h3>🏆 世界前 10 強 (最速獲勝)</h3>
      <table>
        <thead>
          <tr>
            <th>名次</th>
            <th>玩家</th>
            <th>耗時(球數)</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          </tbody>
      </table>
    </div>

    <script>
      const WIN_LINES = 5;
      const funnyNames = ["馬斯克拉", "黃仁勳到家", "賈伯斯斯", "蔡依林時抱佛腳", "周杰倫流轉", "銅鑼灣扛報紙", "汗味戰警", "左青龍右胖虎", "靈車甩尾棺材飛", "九頭龍閃到腰", "善解人衣", "剛好五個字", "打死我也不", "我很會射", "怪很強我先走", "差一元買多多", "不要問你會怕", "你看不見我", "轉角遇到怪", "你點到我了", "網路連線中斷", "你已經死了", "屎亡筆記本", "你在大聲什麼啦", "蒙奇D能兒", "AI人工智障", "悲傷滷肉飯", "憂鬱肉燥飯", "被冰塊燙傷", "麻辣白開水", "鐵拳無敵孫中山", "宇智波多野結衣", "我要打十個"];

      let gameOver = false,
        calledNumbers = new Set(),
        turn = 0,
        participants = [],
        playerName = "";

      class BingoGame {
        constructor(id, displayName, isPlayer = false) {
          this.id = id;
          this.displayName = displayName;
          this.isPlayer = isPlayer;
          this.nums = Array.from({ length: 25 }, (_, i) => i + 1).sort(() => Math.random() - 0.5);
          this.marked = Array(25).fill(false);
          this.render();
        }
        render() {
          document.getElementById(`title-${this.id}`).innerText = this.displayName;
          const boardEl = document.getElementById(`board-${this.id}`);
          boardEl.innerHTML = "";
          this.nums.forEach((num) => {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.innerText = num;
            if (this.isPlayer) cell.onclick = () => handleTurn(num);
            boardEl.appendChild(cell);
          });
        }
        mark(num) {
          const idx = this.nums.indexOf(num);
          if (idx !== -1) {
            this.marked[idx] = true;
            const cell = document.getElementById(`board-${this.id}`).children[idx];
            if(cell) cell.classList.add("marked");
          }
          return this.calcLines();
        }
        calcLines() {
          let lines = 0, m = this.marked;
          for (let i = 0; i < 5; i++) {
            if ([0, 1, 2, 3, 4].every((j) => m[i * 5 + j])) lines++;
            if ([0, 1, 2, 3, 4].every((j) => m[j * 5 + i])) lines++;
          }
          if ([0, 6, 12, 18, 24].every((i) => m[i])) lines++;
          if ([4, 8, 12, 16, 20].every((i) => m[i])) lines++;
          document.getElementById(`status-${this.id}`).innerText = `連線數: ${lines}`;
          return lines;
        }
      }

      function askPlayerName(force = false) {
        let savedName = sessionStorage.getItem("bingo_player_name");
        if (!savedName || force) {
          let input = prompt("請輸入您的勇者名稱：", savedName || "無名英雄");
          if (input) {
            savedName = input;
            sessionStorage.setItem("bingo_player_name", savedName);
          } else if (!savedName) {
            savedName = "神秘玩家";
          }
        }
        playerName = savedName;
        if(participants[0]) {
            participants[0].displayName = `玩家:${playerName}(使用者)`;
            document.getElementById("title-0").innerText = participants[0].displayName;
        }
      }

      function updateLeaderboardUI() {
        const scores = JSON.parse(localStorage.getItem("bingo_scores") || "[]");
        const tbody = document.getElementById("leaderboard-body");
        tbody.innerHTML = scores.length ? "" : '<tr><td colspan="3">尚無資料</td></tr>';
        scores.forEach((item, index) => {
          const row = `<tr>
            <td class="rank-${index+1}">${index+1}</td>
            <td>${item.name}</td>
            <td>${item.balls} 球</td>
          </tr>`;
          tbody.innerHTML += row;
        });
      }

      function saveScore(name, balls) {
        let scores = JSON.parse(localStorage.getItem("bingo_scores") || "[]");
        scores.push({ name, balls, date: new Date().getTime() });
        // 排序：球數越少越前面
        scores.sort((a, b) => a.balls - b.balls);
        // 只取前10名
        scores = scores.slice(0, 10);
        localStorage.setItem("bingo_scores", JSON.stringify(scores));
        updateLeaderboardUI();
      }

      function resetGame() {
        if (!playerName) askPlayerName();
        gameOver = false;
        calledNumbers.clear();
        turn = 0;
        const shuffledNames = [...funnyNames].sort(() => Math.random() - 0.5);

        participants = [
          new BingoGame(0, `玩家:${playerName}(使用者)`, true),
          new BingoGame(1, `玩家:${shuffledNames[0]}(NPC)`),
          new BingoGame(2, `玩家:${shuffledNames[1]}(NPC)`),
        ];

        setTurn(0);
        document.getElementById("message-box").innerText = "🎮 比賽開始，請選號！";
        document.getElementById("message-box").style.background = "#2c3e50";
        updateLeaderboardUI();
      }

      async function handleTurn(num) {
        if (gameOver || calledNumbers.has(num) || turn !== 0) return;
        await play(num);
        if (gameOver) return;

        for (let i = 1; i <= 2; i++) {
          setTurn(i);
          await sleep(600);
          const available = participants[i].nums.filter((n) => !calledNumbers.has(n));
          const npcChoice = available[Math.floor(Math.random() * available.length)];
          await play(npcChoice);
          if (gameOver) return;
        }
        setTurn(0);
      }

      async function play(num) {
        calledNumbers.add(num);
        const currentPlayer = participants[turn];
        document.getElementById("message-box").innerText = `${currentPlayer.displayName.split("(")[0]} 喊了：${num}`;

        let winners = [];
        participants.forEach((p) => {
          if (p.mark(num) >= WIN_LINES) {
            winners.push(p);
          }
        });

        if (winners.length > 0) {
          gameOver = true;
          const winnerNames = winners.map(w => w.displayName.split("(")[0]);
          document.getElementById("message-box").innerText = `🏆 贏家：${winnerNames.join(", ")}`;
          document.getElementById("message-box").style.background = "#27ae60";

          // 如果玩家在贏家名單內，紀錄成績
          const playerWin = winners.find(w => w.isPlayer);
          if (playerWin) {
            saveScore(playerName, calledNumbers.size);
          }
        }
      }

      function setTurn(t) {
        turn = t;
        participants.forEach((_, i) => {
          document.getElementById(`wrapper-${i}`).classList.toggle("active", i === turn);
        });
      }

      function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

      // 啟動遊戲
      resetGame();
    </script>
  </body>
</html>
