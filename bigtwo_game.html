<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>王牌壓制：大老二</title>
    <link rel="stylesheet" href="style_big2.css" />
  </head>
  <body>
    <div id="login-modal" class="modal show">
      <div class="modal-content">
        <h3>王牌壓制：大老二</h3>
        <p>請輸入您的暱稱：</p>
        <input
          type="text"
          id="player-name-input"
          placeholder="名稱..."
          maxlength="10"
          style="
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
          "
        />
        <button
          onclick="savePlayerName()"
          style="background: #4caf50; color: white; width: 100%"
        >
          進入牌局
        </button>
      </div>
    </div>

    <div id="rank-modal" class="modal">
      <div class="modal-content">
        <h3>🏆 榮譽排行榜</h3>
        <div
          id="rank-display"
          style="
            text-align: left;
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
          "
        ></div>
        <button
          onclick="toggleRank(false)"
          style="background: #666; color: white; width: 100%"
        >
          返回遊戲
        </button>
      </div>
    </div>

    <div id="result-modal" class="modal">
      <div class="modal-content">
        <h2 id="result-title">遊戲結束</h2>
        <div id="result-list"></div>
        <button
          onclick="closeResult()"
          style="background: #4caf50; color: white; width: 100%"
        >
          再一局
        </button>
      </div>
    </div>

    <div id="game-board">
      <div class="slot" id="p2">
        <div class="name-tag" id="name-2"></div>
        <div id="hand-2" class="card-row"></div>
      </div>
      <div class="slot" id="p1">
        <div class="name-tag" id="name-1"></div>
        <div id="hand-1" class="card-row"></div>
      </div>

      <div id="table">
        <div class="msg" id="game-msg">請先登入...</div>
        <div id="last-play-area"></div>
        <div class="controls">
          <button id="btn-play" onclick="playerAction()">出牌</button>
          <button id="btn-pass" onclick="playerPass()">過</button>
          <button id="btn-sort" onclick="toggleSort()">大小</button>
          <button
            onclick="toggleRank(true)"
            style="background: #ff9800; color: white"
          >
            榜單
          </button>
          <button
            onclick="confirmReset()"
            style="background: #d32f2f; color: white"
          >
            重開
          </button>
        </div>
      </div>

      <div class="slot" id="p3">
        <div class="name-tag" id="name-3"></div>
        <div id="hand-3" class="card-row"></div>
      </div>

      <div class="slot" id="p0">
        <div
          id="hand-0"
          class="card-row"
          onpointerdown="startSlide(event)"
          onpointermove="moveSlide(event)"
          onpointerup="endSlide(event)"
        ></div>
        <div class="name-tag" id="name-0">載入中...</div>
      </div>
    </div>

    <script src="script_big2.js"></script>
    <footer>
      <div class="copyright">© 2026 CaoShuHao 版權所有</div>
    </footer>
  </body>
</html>
