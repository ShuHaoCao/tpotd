<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>運輸股-班表資料編輯器</title>
    <style>
      :root {
        --primary-color: #4a69bd;
        --secondary-color: #78e08f;
        --accent-color: #fa983a;
        --bg-color: #f1f2f6;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg-color);
        margin: 0;
        padding: 10px;
        color: #2f3542;
      }

      .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      }

      h2 {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 20px;
        font-size: 1.5rem;
      }

      .section {
        background: #ffffff;
        margin-bottom: 15px;
        padding: 15px;
        border: 1px solid #e1e4e8;
        border-radius: 8px;
      }

      .section-title {
        font-weight: bold;
        margin-bottom: 10px;
        display: block;
        color: #57606f;
      }

      /* 檔案讀取區 */
      .file-upload-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* 編輯列響應式設計 */
      .edit-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid #f1f2f6;
      }

      label {
        flex: 0 0 100px;
        font-weight: 500;
        font-size: 0.95rem;
      }

      select,
      input[type="date"] {
        flex: 1;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 6px;
        font-size: 1rem;
        background-color: #fff;
        appearance: none; /* 去除原生箭頭 */
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2724%27%20height%3D%2724%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%20stroke%3D%27%23ccc%27%20stroke-width%3D%272%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%3E%3Cpolyline%20points%3D%276%209%2012%2015%2018%209%27%3E%3C/polyline%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 8px center;
        background-size: 18px;
      }

      /* 手機版調整 */
      @media (max-width: 480px) {
        .edit-row {
          flex-direction: column;
          align-items: flex-start;
        }
        label {
          margin-bottom: 5px;
          flex: none;
          width: 100%;
        }
        select,
        input[type="date"] {
          width: 100%;
          box-sizing: border-box;
        }
        h2 {
          font-size: 1.2rem;
        }
      }

      .btn-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
      }

      .btn {
        padding: 12px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        font-size: 1rem;
        transition: opacity 0.2s;
        text-align: center;
        display: inline-block;
        text-decoration: none;
      }

      .btn:active {
        opacity: 0.7;
      }
      .btn-load {
        background-color: var(--primary-color);
        width: 100%;
      }
      .btn-save {
        background-color: var(--secondary-color);
        color: #1e370a;
      }
      .btn-export {
        background-color: var(--accent-color);
      }

      #status {
        font-size: 0.85rem;
        color: #eb4d4b;
        margin-top: 5px;
      }
      #dateStatus {
        font-size: 0.8rem;
        display: block;
        margin-top: 5px;
      }

      .sticky-footer {
        position: sticky;
        bottom: 0;
        background: white;
        padding: 10px 0;
        border-top: 1px solid #ddd;
        margin-top: 20px;
      }
      footer {
        text-align: center;
        padding: 20px 10px;
        font-size: 0.85em;
        color: #999;
      }
    </style>

      function loadFile() {
        const file = document.getElementById("fileInput").files[0];
        if (!file) return alert("請先選擇 JSON 檔案");

        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            scheduleData = JSON.parse(e.target.result);
            extractAllStaff();
            document.getElementById("editorArea").style.display = "block";
            document.getElementById("status").innerText = "✅ 讀取成功";

            // 預設選取最新的一天
            const dates = Object.keys(scheduleData)
              .filter((k) => k !== "lastUpdated")
              .sort();
            document.getElementById("datePicker").value =
              dates[dates.length - 1];
            loadDateData();
          } catch (err) {
            alert("檔案格式錯誤，請確認是否為正確的 JSON");
          }
        };
        reader.readAsText(file);
      }

      function extractAllStaff() {
        let staffSet = new Set(["-", ""]);
        Object.keys(scheduleData).forEach((date) => {
          if (date === "lastUpdated") return;
          Object.values(scheduleData[date]).forEach((name) => {
            if (name && name !== "#溢出!") staffSet.add(name);
          });
        });
        allStaff = Array.from(staffSet);
      }

      function loadDateData() {
        const selectedDate = document.getElementById("datePicker").value;
        const container = document.getElementById("fieldsContainer");
        const dateStatus = document.getElementById("dateStatus");
        container.innerHTML = "";

        if (!selectedDate) return;

        let dayData = scheduleData[selectedDate];
        const isNew = !dayData;

        if (isNew) {
          dateStatus.innerText = "ℹ️ 此日期無資料，儲存後將新增。";
          dateStatus.style.color = "orange";
          // 抓取最近一天的鍵值作為模板
          const keys = Object.keys(scheduleData).filter(
            (k) => k !== "lastUpdated",
          );
          const template = scheduleData[keys[keys.length - 1]];
          dayData = {};
          Object.keys(template).forEach((k) => (dayData[k] = "-"));
        } else {
          dateStatus.innerText = "✅ 已載入現有資料";
          dateStatus.style.color = "green";
        }

        Object.keys(dayData).forEach((shift) => {
          const div = document.createElement("div");
          div.className = "edit-row";

          const label = document.createElement("label");
          label.innerText = shift;

          const select = document.createElement("select");
          select.dataset.shift = shift;

          let options = staffConfig[shift] ? staffConfig[shift] : allStaff;
          if (!options.includes(dayData[shift]))
            options = [dayData[shift], ...options];

          options.forEach((name) => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.text = name || "(空白)";
            if (name === dayData[shift]) opt.selected = true;
            select.appendChild(opt);
          });

          div.appendChild(label);
          div.appendChild(select);
          container.appendChild(div);
        });
      }

      function saveToMemory() {
        const selectedDate = document.getElementById("datePicker").value;
        const selects = document.querySelectorAll("#fieldsContainer select");
        let newDayData = {};
        selects.forEach((s) => (newDayData[s.dataset.shift] = s.value));

        scheduleData[selectedDate] = newDayData;

        const now = new Date();
        scheduleData.lastUpdated =
          now.getFullYear() +
          "-" +
          (now.getMonth() + 1) +
          "-" +
          now.getDate() +
          " " +
          now.getHours() +
          ":" +
          now.getMinutes();

        alert(
          "已暫存 " + selectedDate + " 的修改內容。記得最後要按匯出下載檔案。",
        );
        loadDateData();
      }

      function exportJSON() {
        const sorted = {};
        if (scheduleData.lastUpdated)
          sorted.lastUpdated = scheduleData.lastUpdated;
        Object.keys(scheduleData)
          .filter((k) => k !== "lastUpdated")
          .sort()
          .forEach((d) => (sorted[d] = scheduleData[d]));

        const blob = new Blob([JSON.stringify(sorted, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "schedule_data.json";
        a.click();
        URL.revokeObjectURL(url);
      }
